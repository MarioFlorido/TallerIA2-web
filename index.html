<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller de IA — Técnicas Avanzadas de Prompting</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
:root {
  --bg: #0e0e12;
  --bg-elevated: #16161d;
  --bg-card: #1c1c26;
  --bg-glass: rgba(28,28,38,0.7);
  --bg-code: #12121a;
  --text: #f0eff4;
  --text-sub: #a8a7b5;
  --text-dim: #65647a;
  --border: rgba(255,255,255,0.07);
  --border-light: rgba(255,255,255,0.12);

  --g1: #f97316;  --g1b: #facc15;   /* amber-orange gradient */
  --g2: #ef4444;  --g2b: #f97316;   /* red-orange */
  --g3: #3b82f6;  --g3b: #8b5cf6;   /* blue-violet */
  --g4: #10b981;  --g4b: #06b6d4;   /* emerald-cyan */

  --phase-1: #f97316;
  --phase-2: #ef4444;
  --phase-3: #6366f1;
  --phase-4: #10b981;

  --radius: 16px;
  --radius-lg: 24px;
  --radius-pill: 100px;
  --font: 'Sora', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scroll-padding-top:90px}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.7;font-size:15px;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:var(--phase-3);color:#fff}

/* ── FLOATING NAV ── */
.fnav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;display:flex;gap:4px;padding:6px;background:var(--bg-glass);backdrop-filter:blur(20px) saturate(1.5);border:1px solid var(--border-light);border-radius:var(--radius-pill);box-shadow:0 8px 32px rgba(0,0,0,.4);transition:opacity .3s,transform .3s}
.fnav.hide{opacity:0;transform:translateX(-50%) translateY(20px);pointer-events:none}
.fnav a{font-size:.65rem;font-weight:600;color:var(--text-dim);text-decoration:none;padding:6px 12px;border-radius:var(--radius-pill);white-space:nowrap;transition:all .25s;letter-spacing:.02em}
.fnav a:hover{color:var(--text);background:rgba(255,255,255,.06)}
.fnav a.active{color:#fff}
.fnav a.active[data-p="1"]{background:var(--phase-1)} .fnav a.active[data-p="2"]{background:var(--phase-2)} .fnav a.active[data-p="3"]{background:var(--phase-3)} .fnav a.active[data-p="4"]{background:var(--phase-4)}
.fnav .sep{width:1px;background:var(--border-light);margin:4px 2px}
@media(max-width:700px){.fnav{bottom:12px;gap:2px;padding:5px}.fnav a{font-size:.58rem;padding:5px 8px}}

/* ── TOP BAR ── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;height:4px;background:var(--bg)}
.topbar-fill{height:100%;width:0%;transition:width .15s;background:linear-gradient(90deg,var(--g1),var(--g2),var(--g3),var(--g4))}

/* ── HERO ── */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 24px 120px;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;overflow:hidden}
.hero-bg .orb{position:absolute;border-radius:50%;filter:blur(80px);animation:float 12s ease-in-out infinite}
.orb-1{width:500px;height:500px;background:var(--phase-1);opacity:.12;top:-10%;left:-10%;animation-delay:0s}
.orb-2{width:400px;height:400px;background:var(--phase-3);opacity:.10;bottom:-5%;right:-5%;animation-delay:-4s}
.orb-3{width:300px;height:300px;background:var(--phase-4);opacity:.08;top:40%;left:50%;animation-delay:-8s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,15px) scale(.95)}}

.hero-content{position:relative;z-index:1;max-width:800px}
.hero-chip{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:8px 20px;border-radius:var(--radius-pill);border:1px solid var(--border-light);background:var(--bg-glass);backdrop-filter:blur(12px);margin-bottom:36px;color:var(--text-sub)}
.hero-chip .dot{width:6px;height:6px;border-radius:50%;background:var(--phase-1);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.hero h1{font-size:clamp(2.8rem,7vw,5.5rem);font-weight:800;line-height:1.05;letter-spacing:-.03em}
.hero h1 .grad{background:linear-gradient(135deg,var(--g1) 0%,var(--g2) 30%,var(--g3) 70%,var(--g4) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:1.1rem;color:var(--text-sub);margin-top:20px;font-weight:400}
.hero-grid{display:flex;gap:10px;margin-top:52px;flex-wrap:wrap;justify-content:center}
.hero-pill{display:flex;align-items:center;gap:8px;padding:12px 22px;border-radius:var(--radius);background:var(--bg-card);border:1px solid var(--border);font-size:.82rem;font-weight:500;color:var(--text-sub);cursor:pointer;text-decoration:none;transition:all .3s}
.hero-pill:hover{border-color:var(--border-light);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.hero-pill .pnum{font-weight:800;font-size:.7rem;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:6px;color:#fff}
.hero-pill[data-p="1"] .pnum{background:var(--phase-1)} .hero-pill[data-p="2"] .pnum{background:var(--phase-2)} .hero-pill[data-p="3"] .pnum{background:var(--phase-3)} .hero-pill[data-p="4"] .pnum{background:var(--phase-4)}

/* ── PHASE SECTION ── */
.phase-sec{padding:80px 0 0;position:relative}
.phase-sec::before{content:'';position:absolute;top:0;left:0;right:0;height:300px}
.phase-sec[data-p="1"]::before{background:linear-gradient(180deg,rgba(249,115,22,.06),transparent)} .phase-sec[data-p="2"]::before{background:linear-gradient(180deg,rgba(239,68,68,.06),transparent)} .phase-sec[data-p="3"]::before{background:linear-gradient(180deg,rgba(99,102,241,.06),transparent)} .phase-sec[data-p="4"]::before{background:linear-gradient(180deg,rgba(16,185,129,.06),transparent)}
.phase-head{max-width:1060px;margin:0 auto;padding:0 24px 48px;position:relative;z-index:1}
.phase-tag{display:inline-flex;align-items:center;gap:6px;font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:6px 14px;border-radius:var(--radius-pill);margin-bottom:16px}
.phase-sec[data-p="1"] .phase-tag{color:var(--phase-1);background:rgba(249,115,22,.12)} .phase-sec[data-p="2"] .phase-tag{color:var(--phase-2);background:rgba(239,68,68,.12)} .phase-sec[data-p="3"] .phase-tag{color:var(--phase-3);background:rgba(99,102,241,.12)} .phase-sec[data-p="4"] .phase-tag{color:var(--phase-4);background:rgba(16,185,129,.12)}
.phase-tag .tdot{width:5px;height:5px;border-radius:50%;background:currentColor}
.phase-name{font-size:clamp(2rem,4.5vw,3rem);font-weight:800;letter-spacing:-.02em;line-height:1.1}
.phase-sub{font-size:1rem;color:var(--text-dim);margin-top:8px;font-weight:400}

/* ── ACTIVITY CARD ── */
.cards{max-width:1060px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
.acard{display:grid;grid-template-columns:1fr 1fr;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:28px;overflow:hidden;transition:all .4s cubic-bezier(.25,.8,.25,1);position:relative}
.acard::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px}
.acard[data-p="1"]::before{background:linear-gradient(180deg,var(--g1),var(--g1b))} .acard[data-p="2"]::before{background:linear-gradient(180deg,var(--g2),var(--g2b))} .acard[data-p="3"]::before{background:linear-gradient(180deg,var(--g3),var(--g3b))} .acard[data-p="4"]::before{background:linear-gradient(180deg,var(--g4),var(--g4b))}
.acard:hover{border-color:var(--border-light);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.25)}
@media(max-width:800px){.acard{grid-template-columns:1fr}}

.acard-img{position:relative;overflow:hidden;min-height:240px;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center}
.acard-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;transition:transform .5s}
.acard:hover .acard-img img{transform:scale(1.04)}
.acard-img .ph{color:var(--text-dim);font-size:.75rem;font-family:var(--mono);padding:10px 18px;border-radius:10px;border:2px dashed var(--border);background:var(--bg-card)}

.acard-body{padding:32px 32px 28px;display:flex;flex-direction:column;gap:6px}
.acard-top{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.acard-num{font-size:2rem;font-weight:800;line-height:1;letter-spacing:-.02em}
.acard[data-p="1"] .acard-num{color:var(--phase-1)} .acard[data-p="2"] .acard-num{color:var(--phase-2)} .acard[data-p="3"] .acard-num{color:var(--phase-3)} .acard[data-p="4"] .acard-num{color:var(--phase-4)}
.acard-tag{font-size:.6rem;font-weight:600;letter-spacing:.06em;padding:4px 12px;border-radius:var(--radius-pill)}
.acard[data-p="1"] .acard-tag{color:var(--phase-1);background:rgba(249,115,22,.12)} .acard[data-p="2"] .acard-tag{color:var(--phase-2);background:rgba(239,68,68,.12)} .acard[data-p="3"] .acard-tag{color:var(--phase-3);background:rgba(99,102,241,.12)} .acard[data-p="4"] .acard-tag{color:var(--phase-4);background:rgba(16,185,129,.12)}
.acard-title{font-size:1.4rem;font-weight:700;letter-spacing:-.01em;margin:6px 0 4px}
.acard-concept{color:var(--text-sub);font-size:.88rem;line-height:1.7;flex-grow:1}
.acard-concept strong{color:var(--text);font-weight:600}

/* ── EXPANDED SECTIONS ── */
.acard-expand{grid-column:1/-1;border-top:1px solid var(--border);padding:28px 32px}
.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-bottom:20px}
@media(max-width:700px){.exp-grid{grid-template-columns:1fr}}
.exp-grid h4{font-size:.82rem;font-weight:700;margin-bottom:8px;letter-spacing:.01em;color:var(--text)}
.exp-grid p,.exp-grid li{color:var(--text-sub);font-size:.87rem;line-height:1.75}
.exp-grid strong{color:var(--text);font-weight:600}

.info-box{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.15);border-radius:12px;padding:18px 22px;margin:16px 0}
.info-box h4{font-size:.75rem;font-weight:700;color:var(--phase-3);margin-bottom:6px;letter-spacing:.03em}
.info-box p,.info-box li{font-size:.84rem;color:var(--text-sub);font-style:italic}
.info-box a{color:var(--phase-3);text-decoration:none;border-bottom:1px solid rgba(99,102,241,.3);transition:all .2s}
.info-box a:hover{border-color:var(--phase-3);background:rgba(99,102,241,.08)}
.info-box ul{padding-left:18px;margin:4px 0;list-style:disc}
.info-box li{margin-bottom:3px}

.prompt-btn{display:flex;align-items:center;gap:8px;font-family:var(--font);font-size:.85rem;font-weight:600;color:var(--text-sub);cursor:pointer;padding:12px 18px;border:1px solid var(--border);border-radius:12px;background:var(--bg-elevated);width:100%;text-align:left;transition:all .25s;margin-top:16px}
.prompt-btn:hover{border-color:var(--border-light);background:var(--bg-card);color:var(--text)}
.prompt-btn .arr{font-size:.7rem;transition:transform .3s}
.prompt-btn.open .arr{transform:rotate(90deg)}
.prompt-slide{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.4,0,.2,1)}
.prompt-slide.open{max-height:8000px}
pre{background:var(--bg-code);border:1px solid var(--border);border-radius:12px;padding:22px;margin:10px 0;overflow-x:auto;font-size:.8rem;line-height:1.7;color:var(--text-sub);font-family:var(--mono);white-space:pre-wrap;word-wrap:break-word}

.bonus-box,.reflect-box{border-radius:12px;padding:18px 22px;margin-top:14px}
.bonus-box{background:rgba(249,115,22,.06);border:1px solid rgba(249,115,22,.12)}
.bonus-box h4{color:var(--phase-1);font-size:.75rem;font-weight:700;margin-bottom:6px}
.bonus-box p{color:var(--text-sub);font-size:.85rem}
.bonus-box strong{color:var(--text)}
.reflect-box{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.12)}
.reflect-box h4{color:var(--phase-4);font-size:.75rem;font-weight:700;margin-bottom:6px}
.reflect-box p{color:var(--text-sub);font-size:.85rem}
.reflect-box strong{color:var(--text)}

/* ── TOGGLE ── */
.acard-toggle{grid-column:1/-1;display:flex;justify-content:center;padding:0 0 6px;border-top:1px solid var(--border)}
.toggle-btn{font-family:var(--font);font-size:.72rem;font-weight:600;color:var(--text-dim);background:none;border:none;cursor:pointer;padding:10px 20px;transition:color .2s;letter-spacing:.03em}
.toggle-btn:hover{color:var(--text-sub)}

/* ── ETHICS ── */
.ethics{max-width:1060px;margin:80px auto 0;padding:0 24px}
.ethics-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:44px;position:relative;overflow:hidden}
.ethics-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--g1),var(--g2),var(--g3),var(--g4))}
.ethics-card h2{font-size:1.7rem;font-weight:800;margin-bottom:6px;letter-spacing:-.02em}
.ethics-card .principle{background:rgba(99,102,241,.06);border-left:3px solid var(--phase-3);padding:16px 20px;border-radius:0 12px 12px 0;margin:20px 0;font-size:.92rem;color:var(--text-sub)}
.ethics-card .principle strong{color:var(--text)}
.ethics-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px}
@media(max-width:700px){.ethics-cols{grid-template-columns:1fr}}
.eco{border-radius:12px;padding:22px}
.eco.do{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.12)}
.eco.dont{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.12)}
.eco.do h4{color:var(--phase-4);font-size:.78rem;font-weight:700;margin-bottom:10px}
.eco.dont h4{color:var(--phase-2);font-size:.78rem;font-weight:700;margin-bottom:10px}
.eco li{font-size:.84rem;color:var(--text-sub);margin-bottom:5px}

/* WARNING */
.warn{max-width:1060px;margin:32px auto 0;padding:0 24px}
.warn-inner{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);border-radius:12px;padding:22px 26px}
.warn-inner h3{color:var(--phase-2);font-size:1rem;font-weight:700;margin-bottom:6px}
.warn-inner p,.warn-inner li{color:var(--text-sub);font-size:.87rem}
.warn-inner ul{padding-left:18px;margin:4px 0}

footer{text-align:center;padding:60px 24px 36px;color:var(--text-dim);font-size:.75rem;letter-spacing:.02em}

/* ANIMATIONS */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .7s cubic-bezier(.25,.8,.25,1),transform .7s cubic-bezier(.25,.8,.25,1)}
.reveal.vis{opacity:1;transform:translateY(0)}
.reveal.d1{transition-delay:.1s}.reveal.d2{transition-delay:.2s}

#loading{display:flex;align-items:center;justify-content:center;min-height:60vh;color:var(--text-sub);gap:12px}
.ldot{width:8px;height:8px;border-radius:50%;animation:ldot .8s ease-in-out infinite alternate}
.ldot:nth-child(1){background:var(--phase-1);animation-delay:0s}
.ldot:nth-child(2){background:var(--phase-2);animation-delay:.15s}
.ldot:nth-child(3){background:var(--phase-3);animation-delay:.3s}
@keyframes ldot{to{opacity:.2;transform:translateY(-6px)}}
</style>
</head>
<body>

<div class="topbar"><div class="topbar-fill" id="progress"></div></div>
<nav class="fnav" id="fnav"></nav>

<section class="hero" id="hero">
  <div class="hero-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
  <div class="hero-content">
    <span class="hero-chip"><span class="dot"></span> Taller 2</span>
    <h1>Actividades Avanzadas de <span class="grad">Inteligencia Artificial</span></h1>
    <p class="hero-sub">Técnicas Avanzadas de Prompting y Pensamiento Crítico</p>
    <div class="hero-grid" id="hero-grid"></div>
  </div>
</section>

<div id="content"><div id="loading"><span class="ldot"></span><span class="ldot"></span><span class="ldot"></span></div></div>

<footer>Taller de IA — Técnicas Avanzadas de Prompting y Pensamiento Crítico</footer>

<script>
const PN={'1':'Fundamentos','2':'Análisis Crítico','3':'Investigación','4':'Producción'};
marked.setOptions({breaks:false,gfm:true});

async function init(){
  try{const r=await fetch('contenido.md');if(!r.ok)throw new Error('HTTP '+r.status);go(await r.text())}
  catch(e){document.getElementById('content').innerHTML=`<div style="text-align:center;padding:20vh 24px;color:var(--text-sub)"><h2 style="color:var(--phase-2);margin-bottom:12px">Error</h2><p>No se pudo cargar <code style="background:var(--bg-card);padding:2px 8px;border-radius:6px;font-family:var(--mono)">contenido.md</code></p><p style="color:var(--text-dim);margin-top:12px;font-size:.85rem">${e.message}</p></div>`}
}

function go(md){
  const lines=md.split('\n'),phases=[];
  let ph=null,act=null,sec=null,buf=[],ethB=null,wB=null,mode='n';
  function flush(){const t=buf.join('\n').trim();buf=[];if(mode==='e'){ethB=(ethB||'')+'\n'+t;return}if(mode==='w'){wB=(wB||'')+'\n'+t;return}if(!sec||!act||!t)return;act.secs.push({type:sec.type,title:sec.title,content:t})}

  for(const l of lines){
    let m=l.match(/^# FASE (\d+):\s*(.+)/i);if(m){flush();mode='n';ph={n:m[1],t:m[2].trim(),sub:'',acts:[]};phases.push(ph);act=null;sec=null;continue}
    if(l.match(/^# ÉTICA/i)){flush();mode='e';ethB='';act=null;sec=null;continue}
    if(l.match(/^# AVISO/i)){flush();mode='w';wB='';act=null;sec=null;continue}
    if(mode==='e'||mode==='w'){buf.push(l);continue}
    m=l.match(/^## (.+)/);if(m&&ph&&!act){ph.sub=m[1].trim();continue}
    if(l.trim()==='---')continue;
    m=l.match(/^### (\d+)\.\s*(.+)/);if(m){flush();act={num:m[1],title:m[2].trim(),tag:'',img:'',secs:[]};if(ph)ph.acts.push(act);sec=null;continue}
    m=l.match(/^>\s*\*\*Tag:\*\*\s*(.+)/);if(m&&act){act.tag=m[1].trim();continue}
    m=l.match(/^>\s*\*\*Imagen:\*\*\s*(.+)/);if(m&&act){act.img=m[1].trim();continue}
    m=l.match(/^#### (.+)/);if(m&&act){flush();const t=m[1].trim();
      if(t==='Objetivo Educacional')sec={type:'obj',title:t};
      else if(t==='Descripción')sec={type:'desc',title:t};
      else if(t.startsWith('Info:'))sec={type:'info',title:t.slice(5).trim()};
      else if(t==='Info')sec={type:'info',title:''};
      else if(t==='Prompt Principal')sec={type:'prompt',title:t};
      else if(t==='Bonus Extra')sec={type:'bonus',title:t};
      else if(t.startsWith('Pregunta de Reflexión'))sec={type:'refl',title:t};
      else sec={type:'x',title:t};continue}
    buf.push(l);
  }
  flush();render(phases,(ethB||'').trim(),(wB||'').trim());
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function render(phases,ethMd,wMd){
  // Hero grid
  let hg='';
  phases.forEach(p=>{hg+=`<a href="#phase${p.n}" class="hero-pill" data-p="${p.n}"><span class="pnum">${p.n}</span>${PN[p.n]||p.t}</a>`});
  document.getElementById('hero-grid').innerHTML=hg;

  // Floating nav
  let nv='';
  phases.forEach(p=>{
    nv+=`<div class="sep"></div>`;
    p.acts.forEach(a=>{
      const s=a.title.length>10?a.title.substring(0,10)+'…':a.title;
      nv+=`<a href="#act${a.num}" data-p="${p.n}">${a.num}. ${s}</a>`;
    });
  });
  document.getElementById('fnav').innerHTML=nv;

  // Content
  let h='';
  phases.forEach(p=>{
    h+=`<section class="phase-sec" data-p="${p.n}" id="phase${p.n}">
      <div class="phase-head">
        <span class="phase-tag reveal"><span class="tdot"></span> Fase ${p.n}</span>
        <h2 class="phase-name reveal d1">${p.t}</h2>
        <p class="phase-sub reveal d2">${p.sub}</p>
      </div><div class="cards">`;

    p.acts.forEach(a=>{
      const pad=a.num.padStart(2,'0');
      let img='';
      if(a.img)img=`<img src="${a.img}" alt="Actividad ${pad}" onerror="this.parentElement.innerHTML='<span class=ph>${esc(a.img)}</span>'">`;
      else img=`<span class="ph">img/${pad}-*.jpg</span>`;

      let obj='',desc='',infos=[],prm='',bonus='',refl='';
      a.secs.forEach(s=>{
        const htm=marked.parse(s.content);
        switch(s.type){case'obj':obj=htm;break;case'desc':desc=htm;break;case'info':infos.push({t:s.title,h:htm});break;case'prompt':prm=s.content;break;case'bonus':bonus=htm;break;case'refl':refl=htm;break}
      });
      let code=prm;const cm=prm.match(/```[\s\S]*?\n([\s\S]*?)```/);if(cm)code=cm[1].trimEnd();
      const infoH=infos.map(i=>`<div class="info-box">${i.t?`<h4>${i.t}</h4>`:''}${i.h}</div>`).join('');

      h+=`<article class="acard reveal" data-p="${p.n}" id="act${a.num}">
        <div class="acard-img">${img}</div>
        <div class="acard-body">
          <div class="acard-top">
            <span class="acard-num">${pad}</span>
            ${a.tag?`<span class="acard-tag">${a.tag}</span>`:''}
          </div>
          <h3 class="acard-title">${a.title}</h3>
          <div class="acard-concept">${desc}</div>
        </div>
        <div class="acard-expand" style="display:none">
          <div class="exp-grid">
            <div><h4>Objetivo Educacional</h4>${obj}</div>
            <div><h4>Descripción completa</h4>${desc}</div>
          </div>
          ${infoH}
          ${prm?`<button class="prompt-btn" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')"><span class="arr">▸</span> Prompt Principal</button><div class="prompt-slide"><pre>${esc(code)}</pre></div>`:''}
          ${bonus?`<div class="bonus-box"><h4>Bonus Extra</h4>${bonus}</div>`:''}
          ${refl?`<div class="reflect-box"><h4>Pregunta de Reflexión</h4>${refl}</div>`:''}
        </div>
        <div class="acard-toggle"><button class="toggle-btn" onclick="toggleCard(this)">Ver más ▾</button></div>
      </article>`;
    });
    h+='</div></section>';
  });

  // Ethics
  if(ethMd){
    const ep=new DOMParser().parseFromString('<div>'+marked.parse(ethMd)+'</div>','text/html').body.firstChild;
    let ti='',pr='',doL='',dnL='',cH='';
    for(const n of ep.children){if(n.tagName==='H2')ti=n.textContent;else if(n.tagName==='H3')cH=n.textContent;else if(n.tagName==='P'&&cH.includes('Principio')){pr=n.innerHTML;cH=''}else if(n.tagName==='UL'){if(cH.includes('USA'))doL=n.outerHTML;else if(cH.includes('NO'))dnL=n.outerHTML}}
    h+=`<div class="ethics"><div class="ethics-card reveal"><h2>${ti}</h2><div class="principle">${pr}</div><div class="ethics-cols"><div class="eco do"><h4>USA LA IA PARA:</h4>${doL}</div><div class="eco dont"><h4>NO LA USES PARA:</h4>${dnL}</div></div></div></div>`;
  }
  if(wMd){h+=`<div class="warn"><div class="warn-inner reveal">${marked.parse(wMd).replace(/<h2>/g,'<h3>').replace(/<\/h2>/g,'</h3>')}</div></div>`}

  document.getElementById('content').innerHTML=h;
  wire();
}

function toggleCard(btn){
  const exp=btn.closest('.acard').querySelector('.acard-expand');
  const open=exp.style.display!=='none';
  exp.style.display=open?'none':'block';
  btn.textContent=open?'Ver más ▾':'Ocultar ▴';
}

function wire(){
  // Reveal on scroll
  const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis')}),{threshold:.05});
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));

  // Progress bar
  window.addEventListener('scroll',()=>{
    const h=document.documentElement.scrollHeight-window.innerHeight;
    document.getElementById('progress').style.width=(window.scrollY/h*100)+'%';
  });

  // Floating nav visibility & active
  const fnav=document.getElementById('fnav');
  const acts=document.querySelectorAll('.acard');
  const navLinks=fnav.querySelectorAll('a');
  window.addEventListener('scroll',()=>{
    fnav.classList.toggle('hide',window.scrollY<400);
    let cur='';
    acts.forEach(a=>{if(window.scrollY>=a.offsetTop-200)cur=a.id});
    navLinks.forEach(l=>l.classList.toggle('active',l.getAttribute('href')==='#'+cur));
  });
}

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taller IA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

<style>
:root{
  --bg:#0b0f19;
  --panel:#ffffff;
  --card:#111827;
  --text:#f9fafb;
  --muted:#9ca3af;
  --accent:#6366f1;
}

.light{
  --bg:#f4f4f5;
  --panel:#ffffff;
  --card:#ffffff;
  --text:#111;
  --muted:#6b7280;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* MAIN */
.main{
  padding:60px;
  max-width:1400px;
  margin:auto;
}

/* HERO */
.hero h1{
  font-size:clamp(4rem,7vw,6rem);
  font-weight:900;
  letter-spacing:-0.03em;
}

.hero p{
  font-size:1.2rem;
  color:var(--muted);
}

/* PHASE */
.phase-title{
  font-size:2.8rem;
  color:var(--accent);
  margin-top:70px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:28px;
  margin-top:20px;
}

/* CARD */
.card{
  background:var(--card);
  padding:22px;
  border-radius:14px;
  cursor:pointer;
  transition:.25s;
  border:2px solid transparent;
}

.card:hover{
  transform:translateY(-3px);
  border-color:var(--accent);
}

.card.active{
  border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(99,102,241,0.2);
}

.card.completed{
  border-color:#22c55e;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

.card h3{
  font-size:1.4rem;
  margin-top:10px;
}

.tag{
  font-size:.85rem;
  font-weight:600;
  color:var(--accent);
  margin-bottom:10px;
}

.card p{
  color:var(--muted);
  line-height:1.6;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.4);
  display:none;
}

.overlay.open{display:block}

/* PANEL */
.panel{
  position:fixed;
  right:0;
  top:0;
  width:50%;
  height:100%;
  background:var(--panel);
  color:#111;
  transform:translateX(100%);
  transition:.35s cubic-bezier(.4,0,.2,1);
  padding:50px;
  overflow:auto;
  box-shadow:-30px 0 80px rgba(0,0,0,0.25);
}

.panel.open{transform:translateX(0)}

@media(max-width:768px){
  .panel{width:95%}
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
  font-size:1.5rem;
}

/* PANEL CONTENT */
.panel h2{
  font-size:2.2rem;
}

.panel-section{
  margin-top:36px;
}

.panel-section h4{
  font-size:.85rem;
  color:#6b7280;
  margin-bottom:10px;
  text-transform:uppercase;
}

.panel-section pre{
  background:#111827;
  color:#f9fafb;
  padding:18px;
  border-radius:10px;
  font-family:'JetBrains Mono';
  font-size:.85rem;
}

/* BUTTON */
.controls{
  position:fixed;
  top:20px;
  right:20px;
}

button{
  padding:8px 16px;
  background:var(--accent);
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

/* PROGRESS */
.card.completed::after{
  content:'✓';
  position:absolute;
  top:12px;
  right:12px;
  background:#22c55e;
  color:white;
  width:26px;
  height:26px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<div class="main">

<div class="controls">
  <button onclick="toggleTheme()">🌙/☀️</button>
</div>

<section class="hero">
  <h1>Taller IA</h1>
  <p>Aprendizaje activo con inteligencia artificial</p>
</section>

<div id="content"></div>

</div>

<div id="overlay" class="overlay" onclick="closePanel()"></div>
<div id="panel" class="panel"></div>

<script>
const STORAGE_KEY="progress";
let lastScroll=0;

function toggleTheme(){
  document.body.classList.toggle("light");
}

function saveProgress(id){
  let data=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
  data[id]=true;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

function isDone(id){
  let data=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
  return data[id];
}

async function load(){
  const res=await fetch('contenido.md');
  const md=await res.text();
  parse(md);
}

function parse(md){
  const lines=md.split('\n');
  let phases=[],phase=null,act=null,sec=null,buf=[];

  function flush(){
    const t=buf.join('\n').trim();
    buf=[];
    if(!sec||!act||!t)return;
    act.sections.push({type:sec.type,title:sec.title,content:t});
  }

  for(const line of lines){
    let m=line.match(/^# FASE (\d+): (.+)/);
    if(m){
      flush();
      phase={num:m[1],title:m[2],acts:[]};
      phases.push(phase);
      continue;
    }

    m=line.match(/^### (\d+)\. (.+)/);
    if(m){
      flush();
      act={id:m[1],title:m[2],tag:'',img:'',sections:[]};
      phase.acts.push(act);
      continue;
    }

    m=line.match(/Tag:\*\* (.+)/);
    if(m)act.tag=m[1];

    m=line.match(/Imagen:\*\* (.+)/);
    if(m)act.img=m[1];

    m=line.match(/^#### (.+)/);
    if(m){
      flush();
      sec={title:m[1],type:m[1]};
      continue;
    }

    if(sec)buf.push(line);
  }
  flush();

  render(phases);
}

function openPanel(a,el){
  lastScroll=window.scrollY;

  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');

  document.getElementById("overlay").classList.add("open");

  document.getElementById("panel").innerHTML=`
    <div class="close" onclick="closePanel()">✕</div>
    <h2>${a.title}</h2>

    ${a.sections
      .filter(s=>!s.title.includes('Descripción'))
      .map(s=>`
      <div class="panel-section">
        <h4>${s.title}</h4>
        ${s.title.includes('Prompt')
          ? `<pre>${s.content.replace(/```/g,'')}</pre>`
          : marked.parse(s.content)}
      </div>`).join('')}

    <button onclick="markDone('${a.id}')">✔ Marcar completado</button>
  `;

  document.getElementById("panel").classList.add("open");
}

function closePanel(){
  document.getElementById("panel").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
  window.scrollTo({top:lastScroll});
}

function markDone(id){
  saveProgress(id);
  document.querySelector(`[data-id="${id}"]`).classList.add("completed");
  closePanel();
}

function render(phases){
  let html='';

  phases.forEach(p=>{
    html+=`<h2 class="phase-title">${p.title}</h2><div class="grid">`;

    p.acts.forEach(a=>{
      const desc=a.sections.find(s=>s.title.includes('Descripción'));

      html+=`
      <div class="card ${isDone(a.id)?'completed':''}" data-id="${a.id}" onclick='openPanel(${JSON.stringify(a).replace(/'/g,"&apos;")},this)'>
        ${a.img?`<img src="${a.img}">`:''}
        <h3>${a.title}</h3>
        <div class="tag">${a.tag||''}</div>
        ${desc?marked.parse(desc.content):''}
      </div>`;
    });

    html+='</div>';
  });

  document.getElementById("content").innerHTML=html;
}

load();
</script>

</body>
</html>

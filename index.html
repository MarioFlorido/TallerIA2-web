<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller IA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

<style>
:root{
  --bg:#f8fafc;
  --panel:#ffffff;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --accent:#7c3aed;
  --accent-soft:rgba(124,58,237,0.08);
  --border:rgba(0,0,0,0.08);
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.main{
  padding:60px 40px;
  max-width:1300px;
  margin:auto;
}

.hero h1{
  font-size:clamp(3.5rem,6vw,5rem);
  font-weight:900;
  letter-spacing:-1px;
  animation:fadeUp .6s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

.hero h1::after{
  content:'';
  display:block;
  width:80px;
  height:4px;
  margin-top:18px;
  background:var(--accent);
  border-radius:2px;
}

.hero p{
  margin-top:16px;
  font-size:1.25rem;
  color:var(--muted);
  max-width:720px;
  line-height:1.6;
}

.hero-badge{
  display:inline-block;
  margin-top:20px;
  font-size:.85rem;
  font-weight:600;
  color:var(--accent);
  background:var(--accent-soft);
  padding:6px 12px;
  border-radius:999px;
}

.phase-title{
  font-size:2.4rem;
  margin-top:80px;
  font-weight:800;
}

.phase-title span{color:var(--accent)}

.phase-subtitle{
  color:var(--muted);
  margin-bottom:28px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:26px;
}

.card{
  color:var(--text);
  background:var(--card);
  padding:20px;
  border-radius:16px;
  cursor:pointer;
  transition:.25s;
  border:1px solid var(--border);
  position:relative;
}

.card:hover{
  transform:translateY(-4px);
  border-color:var(--accent);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.card h3{
  font-size:1.6rem;
  margin-top:12px;
}

.tag{
  display:inline-block;
  font-size:1rem;
  font-weight:700;
  padding:6px 10px;
  border-radius:999px;
  background:var(--accent-soft);
  color:var(--accent);
  margin-top:10px;
}

.card p{
  margin-top:10px;
  color:var(--muted);
  font-size:.95rem;
  line-height:1.2;
}

.overlay{
  position:fixed;
  inset:0;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:100;
}

.overlay.open{display:block}

.panel{
  position:fixed;
  right:0;
  top:0;
  width:50%;
  height:100vh;
  background:var(--panel);
  color:#111;
  transform:translateX(100%);
  transition:.35s;
  padding:50px;
  padding-bottom:120px;
  overflow-y:auto;
  box-sizing:border-box;
  z-index:101;
}

.panel.open{transform:translateX(0)}

.panel h2{
  font-size:2.4rem;
  font-weight:800;
}

.panel-section{
  margin-top:32px;
}

.panel-section h4{
  font-size:1.05rem;
  font-weight:700;
  color:var(--accent);
  margin-bottom:10px;
}

.panel-section pre{
  background:#020617;
  color:#f9fafb;
  padding:18px;
  border-radius:10px;
  font-family:'JetBrains Mono', monospace;
  font-size:.85rem;
  line-height:1.6;
  white-space:pre-wrap;
  word-break:break-word;
  overflow-x:hidden;
  position:relative;
  border-left:3px solid var(--accent);
}

/* WRAPPER + BOTÓN COPIAR */
.code-wrapper{
  position:relative;
}

.code-copy{
  position:absolute;
  top:10px;
  right:10px;
  font-size:.75rem;
  background:rgba(255,255,255,0.08);
  color:#fff;
  border:1px solid rgba(255,255,255,0.15);
  padding:4px 8px;
  border-radius:6px;
  cursor:pointer;
  opacity:0;
  transition:.2s;
}

.code-wrapper:hover .code-copy{
  opacity:1;
}

.prompt-toggle-btn{
  width:100%;
  background:var(--muted);
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  font-size:.95rem;
  display:flex;
  align-items:center;
  gap:10px;
}

.prompt-code{
  max-height:0;
  overflow:hidden;
  transition:max-height .4s ease;
}

.prompt-code.open{
  max-height:3000px;
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
  font-size:1.5rem;
  width:32px;
  height:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:rgba(0,0,0,.05);
}
</style>
</head>

<body>

<div class="main">
<section class="hero">
  <h1>Taller avanzado de IA</h1>
  <p><strong>Aprendizaje activo</strong> con inteligencia artificial</p>
</section>

<div id="content"></div>
</div>

<div id="overlay" class="overlay" onclick="closePanel()"></div>
<div id="panel" class="panel"></div>

<script>
const STORAGE_KEY="progress";

function getProgress(){
  return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
}

function saveProgress(id){
  let data=getProgress();
  data[id]=true;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

function isDone(id){
  return !!getProgress()[id];
}

async function load(){
  const res=await fetch('contenido.md');
  const md=await res.text();
  parse(md);
}

function parse(md){
  const lines=md.split('\n');
  let phases=[],phase=null,act=null,sec=null,buf=[];

  function flush(){
    const t=buf.join('\n').trim();
    buf=[];
    if(!sec||!act||!t) return;
    act.sections.push({title:sec.title,content:t});
  }

  for(const line of lines){
    let m=line.match(/^# FASE (\d+): (.+)/);
    if(m){phase={num:m[1],title:m[2],acts:[]};phases.push(phase);continue}

    m=line.match(/^### (\d+)\. (.+)/);
    if(m){act={id:m[1],title:m[2],sections:[]};if(phase)phase.acts.push(act);continue}

    m=line.match(/^#### (.+)/);
    if(m){if(act){flush();sec={title:m[1]}}continue}

    if(line.trim()===''){continue;}

    if(sec&&act)buf.push(line);
  }

  flush();
  render(phases);
}

function copyCode(btn){
  const pre = btn.parentElement.querySelector('pre');
  navigator.clipboard.writeText(pre.innerText).then(()=>{
    const old = btn.textContent;
    btn.textContent='Copiado';
    setTimeout(()=>btn.textContent=old,1200);
  });
}

function render(phases){
  let html='';

  phases.forEach(p=>{
    html+=`<h2>${p.title}</h2><div class="grid">`;

    p.acts.forEach(a=>{
      html+=`<div class="card" onclick="openPanel('${a.id}')">
        <h3>${a.title}</h3>
      </div>`;
    });

    html+='</div>';
  });

  document.getElementById("content").innerHTML=html;
}

function openPanel(id){
  document.getElementById("panel").classList.add("open");
  document.getElementById("overlay").classList.add("open");

  document.getElementById("panel").innerHTML=`
    <div class="close" onclick="closePanel()">✕</div>
    <h2>Actividad ${id}</h2>

    <div class="panel-section">
      <h4>Prompt</h4>
      <button class="prompt-toggle-btn" onclick="this.nextElementSibling.classList.toggle('open')">
        Ver Prompt
      </button>

      <div class="prompt-code">
        <div class="code-wrapper">
          <button class="code-copy" onclick="copyCode(this)">Copiar</button>
          <pre>Ejemplo de prompt aquí...</pre>
        </div>
      </div>
    </div>
  `;
}

function closePanel(){
  document.getElementById("panel").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

load();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller de IA — Técnicas Avanzadas de Prompting y Pensamiento Crítico</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
:root {
  --bg: #f7f6f3;
  --bg-card: #ffffff;
  --bg-code: #f0eeea;
  --bg-nav: rgba(247,246,243,0.94);
  --text: #1a1a1f;
  --text-muted: #4a4a55;
  --text-dim: #7a7a88;
  --accent-1: #b8860b;
  --accent-2: #1a78b0;
  --accent-3: #c0392b;
  --accent-4: #1e8a52;
  --phase-1: #b8860b;
  --phase-2: #c0392b;
  --phase-3: #1a78b0;
  --phase-4: #1e8a52;
  --border: #ddd9d2;
  --radius: 12px;
  --radius-lg: 20px;
  --font-display: 'DM Serif Display', Georgia, serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; scroll-padding-top:80px; }
body { font-family:var(--font-body); background:var(--bg); color:var(--text); line-height:1.7; font-size:16px; -webkit-font-smoothing:antialiased; }
::selection { background:var(--accent-1); color:#fff; }

nav { position:fixed; top:0; left:0; right:0; z-index:100; background:var(--bg-nav); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); transition:transform .3s; }
nav.hidden { transform:translateY(-100%); }
.nav-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; gap:8px; padding:0 24px; height:64px; overflow-x:auto; scrollbar-width:none; }
.nav-inner::-webkit-scrollbar { display:none; }
.nav-brand { font-family:var(--font-display); font-size:1.1rem; color:var(--accent-1); white-space:nowrap; margin-right:16px; text-decoration:none; }
.nav-link { font-size:.78rem; font-weight:500; letter-spacing:.03em; color:var(--text-muted); text-decoration:none; padding:6px 12px; border-radius:6px; white-space:nowrap; transition:all .2s; }
.nav-link:hover,.nav-link.active { color:var(--text); background:rgba(0,0,0,.05); }
.nav-phase { font-size:.65rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; padding:4px 10px; border-radius:4px; margin-left:8px; white-space:nowrap; }
.nav-phase[data-phase="1"]{ color:var(--phase-1); background:rgba(184,134,11,.1); }
.nav-phase[data-phase="2"]{ color:var(--phase-2); background:rgba(192,57,43,.1); }
.nav-phase[data-phase="3"]{ color:var(--phase-3); background:rgba(26,120,176,.1); }
.nav-phase[data-phase="4"]{ color:var(--phase-4); background:rgba(30,138,82,.1); }

.hero { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:120px 24px 80px; position:relative; overflow:hidden; }
.hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 600px 400px at 30% 40%,rgba(184,134,11,.06),transparent),radial-gradient(ellipse 500px 500px at 70% 60%,rgba(26,120,176,.05),transparent); }
.hero-badge { font-size:.75rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--accent-1); background:rgba(184,134,11,.1); border:1px solid rgba(184,134,11,.25); padding:8px 20px; border-radius:100px; margin-bottom:32px; position:relative; }
.hero h1 { font-family:var(--font-display); font-size:clamp(2.4rem,6vw,4.5rem); line-height:1.1; max-width:800px; position:relative; color:var(--text); }
.hero h1 em { font-style:italic; background:linear-gradient(135deg,var(--accent-1),var(--accent-3)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.hero-sub { font-size:1.15rem; color:var(--text-muted); max-width:560px; margin-top:24px; position:relative; line-height:1.8; }
.hero-phases { display:flex; gap:12px; margin-top:48px; flex-wrap:wrap; justify-content:center; position:relative; }
.hero-phase { display:flex; align-items:center; gap:8px; padding:10px 18px; border-radius:10px; background:var(--bg-card); border:1px solid var(--border); font-size:.82rem; font-weight:500; color:var(--text-muted); cursor:pointer; text-decoration:none; transition:all .25s; }
.hero-phase:hover { border-color:var(--text-dim); transform:translateY(-2px); }
.hero-phase .dot { width:8px; height:8px; border-radius:50%; }

.container { max-width:1000px; margin:0 auto; padding:0 24px; }
.phase-header { padding:100px 24px 48px; text-align:center; position:relative; }
.phase-header::before { content:''; position:absolute; left:50%; top:60px; transform:translateX(-50%); width:60px; height:3px; border-radius:2px; }
.phase-header[data-phase="1"]::before{background:var(--phase-1)} .phase-header[data-phase="2"]::before{background:var(--phase-2)} .phase-header[data-phase="3"]::before{background:var(--phase-3)} .phase-header[data-phase="4"]::before{background:var(--phase-4)}
.phase-label { font-size:.72rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase; margin-bottom:12px; display:block; }
.phase-header[data-phase="1"] .phase-label{color:var(--phase-1)} .phase-header[data-phase="2"] .phase-label{color:var(--phase-2)} .phase-header[data-phase="3"] .phase-label{color:var(--phase-3)} .phase-header[data-phase="4"] .phase-label{color:var(--phase-4)}
.phase-title { font-family:var(--font-display); font-size:clamp(1.8rem,4vw,2.6rem); color:var(--text); }

.activity { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); margin-bottom:32px; overflow:hidden; transition:border-color .3s; }
.activity:hover { border-color:#c0bdb6; }
.activity-img { width:100%; height:260px; border-bottom:1px solid var(--border); overflow:hidden; position:relative; background:linear-gradient(135deg,var(--bg) 0%,var(--bg-code) 100%); display:flex; align-items:center; justify-content:center; }
.activity-img img { width:100%; height:100%; object-fit:cover; display:block; }
.activity-img .img-placeholder { color:var(--text-dim); font-size:.82rem; font-family:var(--font-mono); padding:12px 20px; border-radius:8px; border:2px dashed var(--border); background:var(--bg-card); }
.activity-head { padding:32px 36px 28px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; gap:20px; }
.activity-num { font-family:var(--font-display); font-size:2.4rem; line-height:1; min-width:48px; }
.activity[data-phase="1"] .activity-num{color:var(--phase-1)} .activity[data-phase="2"] .activity-num{color:var(--phase-2)} .activity[data-phase="3"] .activity-num{color:var(--phase-3)} .activity[data-phase="4"] .activity-num{color:var(--phase-4)}
.activity-head-text h2 { font-family:var(--font-display); font-size:1.6rem; margin-bottom:4px; }
.activity-tag { display:inline-block; font-size:.72rem; font-weight:600; letter-spacing:.06em; padding:4px 10px; border-radius:5px; margin-top:6px; }
.activity[data-phase="1"] .activity-tag{color:var(--phase-1);background:rgba(184,134,11,.1)} .activity[data-phase="2"] .activity-tag{color:var(--phase-2);background:rgba(192,57,43,.1)} .activity[data-phase="3"] .activity-tag{color:var(--phase-3);background:rgba(26,120,176,.1)} .activity[data-phase="4"] .activity-tag{color:var(--phase-4);background:rgba(30,138,82,.1)}
.activity-body { padding:32px 36px; }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:32px; margin-bottom:28px; }
@media(max-width:700px){ .two-col{grid-template-columns:1fr} }
.activity-body h3 { font-family:var(--font-display); font-size:1.05rem; margin-bottom:10px; color:var(--text); }
.activity-body p,.activity-body li { color:var(--text-muted); font-size:.92rem; line-height:1.75; }
.activity-body strong { color:var(--text); font-weight:600; }
.activity-body em { font-style:italic; }
.activity-body ul,.activity-body ol { padding-left:20px; margin:8px 0; }
.activity-body li { margin-bottom:4px; }

.info-box { background:rgba(26,120,176,.05); border:1px solid rgba(26,120,176,.15); border-radius:var(--radius); padding:20px 24px; margin:20px 0; }
.info-box h4 { font-size:.82rem; font-weight:600; color:var(--accent-2); margin-bottom:8px; }
.info-box p,.info-box li { font-size:.88rem; color:var(--text-muted); font-style:italic; }
.info-box a { color:var(--accent-2); text-decoration:none; border-bottom:1px solid rgba(26,120,176,.35); transition:border-color .2s; }
.info-box a:hover { border-color:var(--accent-2); }
.info-box ul { padding-left:20px; margin:6px 0; list-style:disc; }
.info-box li { margin-bottom:4px; }

.prompt-section { margin-top:28px; }
.prompt-toggle { display:flex; align-items:center; gap:10px; font-family:var(--font-display); font-size:1.05rem; color:var(--text); cursor:pointer; padding:12px 0; border:none; background:none; width:100%; text-align:left; }
.prompt-toggle .arrow { display:inline-flex; width:24px; height:24px; align-items:center; justify-content:center; border-radius:6px; background:rgba(0,0,0,.06); font-size:.8rem; transition:transform .3s; }
.prompt-toggle.open .arrow { transform:rotate(90deg); }
.prompt-content { max-height:0; overflow:hidden; transition:max-height .5s cubic-bezier(.4,0,.2,1); }
.prompt-content.open { max-height:8000px; }
pre { background:var(--bg-code); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin:12px 0; overflow-x:auto; font-size:.84rem; line-height:1.7; color:#3a3a48; font-family:var(--font-mono); white-space:pre-wrap; word-wrap:break-word; }

.bonus-section,.reflection-section { border-radius:var(--radius); padding:20px 24px; margin-top:20px; }
.bonus-section { background:rgba(184,134,11,.05); border:1px solid rgba(184,134,11,.15); }
.bonus-section h4 { color:var(--accent-1); font-size:.82rem; font-weight:600; margin-bottom:8px; }
.bonus-section p { color:var(--text-muted); font-size:.9rem; }
.bonus-section strong { color:var(--text); }
.reflection-section { background:rgba(30,138,82,.05); border:1px solid rgba(30,138,82,.15); }
.reflection-section h4 { color:var(--accent-4); font-size:.82rem; font-weight:600; margin-bottom:8px; }
.reflection-section p { color:var(--text-muted); font-size:.9rem; }
.reflection-section strong { color:var(--text); }

.ethics-section { max-width:1000px; margin:80px auto 0; padding:0 24px; }
.ethics-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-lg); padding:48px; }
.ethics-card h2 { font-family:var(--font-display); font-size:1.8rem; margin-bottom:8px; }
.ethics-card .principle { background:rgba(26,120,176,.06); border-left:3px solid var(--accent-2); padding:16px 20px; border-radius:0 var(--radius) var(--radius) 0; margin:24px 0; font-size:.95rem; color:var(--text-muted); }
.ethics-card .principle strong { color:var(--text); }
.ethics-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-top:28px; }
@media(max-width:700px){ .ethics-grid{grid-template-columns:1fr} }
.ethics-do { border-radius:var(--radius); padding:24px; background:rgba(30,138,82,.05); border:1px solid rgba(30,138,82,.15); }
.ethics-dont { border-radius:var(--radius); padding:24px; background:rgba(192,57,43,.05); border:1px solid rgba(192,57,43,.15); }
.ethics-do h4 { color:var(--accent-4); font-size:.85rem; font-weight:700; margin-bottom:12px; }
.ethics-dont h4 { color:var(--accent-3); font-size:.85rem; font-weight:700; margin-bottom:12px; }
.ethics-do li,.ethics-dont li { font-size:.88rem; color:var(--text-muted); margin-bottom:6px; }

.warning-banner { max-width:1000px; margin:40px auto 0; padding:0 24px; }
.warning-inner { background:rgba(192,57,43,.06); border:1px solid rgba(192,57,43,.2); border-radius:var(--radius); padding:24px 28px; }
.warning-inner h3 { color:var(--accent-3); font-family:var(--font-display); font-size:1.1rem; margin-bottom:8px; }
.warning-inner p { color:var(--text-muted); font-size:.9rem; }
.warning-inner ul { padding-left:20px; margin:6px 0; }
.warning-inner li { color:var(--text-muted); font-size:.9rem; margin-bottom:4px; }

footer { text-align:center; padding:64px 24px 40px; color:var(--text-dim); font-size:.8rem; }
.fade-in { opacity:0; transform:translateY(24px); transition:opacity .6s,transform .6s; }
.fade-in.visible { opacity:1; transform:translateY(0); }
.divider { height:1px; background:var(--border); max-width:1000px; margin:0 auto; }

#loading { display:flex; align-items:center; justify-content:center; min-height:60vh; color:var(--text-muted); font-size:1rem; }
#loading .spinner { width:24px; height:24px; border:3px solid var(--border); border-top-color:var(--accent-1); border-radius:50%; animation:spin .6s linear infinite; margin-right:12px; }
@keyframes spin { to{transform:rotate(360deg)} }
#error-box { max-width:600px; margin:20vh auto; padding:40px; text-align:center; }
#error-box code { background:var(--bg-code); padding:2px 8px; border-radius:4px; font-family:var(--font-mono); font-size:.9rem; }
</style>
</head>
<body>

<nav id="navbar"><div class="nav-inner" id="nav-links"></div></nav>

<section class="hero" id="hero">
  <span class="hero-badge">Taller 2</span>
  <h1>Actividades Avanzadas de <em>Inteligencia Artificial</em></h1>
  <p class="hero-sub">Técnicas Avanzadas de Prompting y Pensamiento Crítico</p>
  <div class="hero-phases" id="hero-phases"></div>
</section>

<div id="content">
  <div id="loading"><span class="spinner"></span> Cargando contenido…</div>
</div>

<footer>Taller de IA — Técnicas Avanzadas de Prompting y Pensamiento Crítico</footer>

<script>
const PHASE_NAMES = {'1':'Fundamentos','2':'Análisis Crítico','3':'Investigación','4':'Producción'};

marked.setOptions({ breaks: false, gfm: true });

async function loadContent() {
  try {
    const res = await fetch('contenido.md');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    parseAndRender(await res.text());
  } catch(e) {
    document.getElementById('content').innerHTML = `<div id="error-box">
      <h2 style="font-family:var(--font-display);margin-bottom:12px;color:var(--accent-3)">No se pudo cargar el contenido</h2>
      <p style="color:var(--text-muted)">Asegúrate de que <code>contenido.md</code> está en la misma carpeta que <code>index.html</code></p>
      <p style="color:var(--text-dim);font-size:.85rem;margin-top:16px">${e.message}</p>
    </div>`;
  }
}

function parseAndRender(md) {
  const lines = md.split('\n');
  const phases = [];
  let phase = null, act = null, sec = null, buf = [];
  let ethicsBuf = null, warnBuf = null, mode = 'normal'; // normal|ethics|warning

  function flush() {
    const t = buf.join('\n').trim();
    buf = [];
    if (mode === 'ethics') { ethicsBuf = (ethicsBuf||'') + '\n' + t; return; }
    if (mode === 'warning') { warnBuf = (warnBuf||'') + '\n' + t; return; }
    if (!sec || !act || !t) return;
    act.sections.push({ type: sec.type, title: sec.title, content: t });
  }

  for (const line of lines) {
    // # FASE
    let m = line.match(/^# FASE (\d+):\s*(.+)/i);
    if (m) { flush(); mode='normal'; phase={num:m[1],title:m[2].trim(),subtitle:'',activities:[]}; phases.push(phase); act=null; sec=null; continue; }

    if (line.match(/^# ÉTICA/i)) { flush(); mode='ethics'; ethicsBuf=''; act=null; sec=null; continue; }
    if (line.match(/^# AVISO/i)) { flush(); mode='warning'; warnBuf=''; act=null; sec=null; continue; }
    if (mode==='ethics'||mode==='warning') { buf.push(line); continue; }

    // ## subtitle
    m = line.match(/^## (.+)/);
    if (m && phase && !act) { phase.subtitle=m[1].trim(); continue; }

    if (line.trim()==='---') continue;

    // ### activity
    m = line.match(/^### (\d+)\.\s*(.+)/);
    if (m) { flush(); act={num:m[1],title:m[2].trim(),tag:'',image:'',sections:[]}; if(phase) phase.activities.push(act); sec=null; continue; }

    // metadata
    m = line.match(/^>\s*\*\*Tag:\*\*\s*(.+)/);
    if (m && act) { act.tag=m[1].trim(); continue; }
    m = line.match(/^>\s*\*\*Imagen:\*\*\s*(.+)/);
    if (m && act) { act.image=m[1].trim(); continue; }

    // #### sections
    m = line.match(/^#### (.+)/);
    if (m && act) {
      flush();
      const t = m[1].trim();
      if (t==='Objetivo Educacional') sec={type:'objetivo',title:t};
      else if (t==='Descripción') sec={type:'descripcion',title:t};
      else if (t.startsWith('Info:')) sec={type:'info',title:t.slice(5).trim()};
      else if (t==='Info') sec={type:'info',title:''};
      else if (t==='Prompt Principal') sec={type:'prompt',title:t};
      else if (t==='Bonus Extra') sec={type:'bonus',title:t};
      else if (t.startsWith('Pregunta de Reflexión')) sec={type:'reflexion',title:t};
      else sec={type:'generic',title:t};
      continue;
    }
    buf.push(line);
  }
  flush();

  render(phases, (ethicsBuf||'').trim(), (warnBuf||'').trim());
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render(phases, ethicsMd, warningMd) {
  // Nav
  const nav = document.getElementById('nav-links');
  let nh = '<a href="#hero" class="nav-brand">Taller IA</a>';
  let hh = '';
  phases.forEach(p => {
    nh += `<span class="nav-phase" data-phase="${p.num}">Fase ${p.num}</span>`;
    hh += `<a href="#phase${p.num}" class="hero-phase"><span class="dot" style="background:var(--phase-${p.num})"></span> ${PHASE_NAMES[p.num]||p.title}</a>`;
    p.activities.forEach(a => {
      const short = a.title.length>14 ? a.title.substring(0,14)+'…' : a.title;
      nh += `<a href="#act${a.num}" class="nav-link">${a.num}. ${short}</a>`;
    });
  });
  nav.innerHTML = nh;
  document.getElementById('hero-phases').innerHTML = hh;

  // Content
  let html = '';
  phases.forEach((p, pi) => {
    html += `<div class="phase-header" data-phase="${p.num}" id="phase${p.num}">
      <span class="phase-label">Fase ${p.num}: ${p.title}</span>
      <h2 class="phase-title">${p.subtitle}</h2></div><div class="container">`;

    p.activities.forEach(a => {
      const pad = a.num.padStart(2,'0');
      let img = '';
      if (a.image) img = `<div class="activity-img"><img src="${a.image}" alt="Actividad ${pad}" onerror="this.parentElement.innerHTML='<span class=img-placeholder>📷 ${esc(a.image)}</span>'"></div>`;

      let obj='', desc='', infos=[], promptTxt='', bonus='', refl='';
      a.sections.forEach(s => {
        const h = marked.parse(s.content);
        switch(s.type) {
          case 'objetivo': obj=h; break;
          case 'descripcion': desc=h; break;
          case 'info': infos.push({title:s.title,html:h}); break;
          case 'prompt': promptTxt=s.content; break;
          case 'bonus': bonus=h; break;
          case 'reflexion': refl=h; break;
        }
      });

      // Extract code from prompt
      let code = promptTxt;
      const cm = promptTxt.match(/```[\s\S]*?\n([\s\S]*?)```/);
      if (cm) code = cm[1].trimEnd();

      const infosH = infos.map(i => `<div class="info-box">${i.title?`<h4>${i.title}</h4>`:''}${i.html}</div>`).join('');

      html += `<article class="activity fade-in" data-phase="${p.num}" id="act${a.num}">
        ${img}
        <div class="activity-head">
          <span class="activity-num">${pad}</span>
          <div class="activity-head-text">
            <h2>${a.title}</h2>
            ${a.tag?`<span class="activity-tag">${a.tag}</span>`:''}
          </div>
        </div>
        <div class="activity-body">
          <div class="two-col">
            <div><h3>Objetivo Educacional</h3>${obj}</div>
            <div><h3>Descripción</h3>${desc}</div>
          </div>
          ${infosH}
          ${promptTxt?`<div class="prompt-section">
            <button class="prompt-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
              <span class="arrow">▸</span> Prompt Principal
            </button>
            <div class="prompt-content"><pre>${esc(code)}</pre></div>
          </div>`:''}
          ${bonus?`<div class="bonus-section"><h4>Bonus Extra</h4>${bonus}</div>`:''}
          ${refl?`<div class="reflection-section"><h4>Pregunta de Reflexión</h4>${refl}</div>`:''}
        </div>
      </article>`;
    });

    html += '</div>';
    if (pi < phases.length-1) html += '<div class="divider"></div>';
  });

  // Ethics
  if (ethicsMd) {
    const ep = new DOMParser().parseFromString('<div>'+marked.parse(ethicsMd)+'</div>','text/html').body.firstChild;
    let title='', principle='', doL='', dontL='', curH='';
    for (const n of ep.children) {
      if (n.tagName==='H2') title=n.textContent;
      else if (n.tagName==='H3') curH=n.textContent;
      else if (n.tagName==='P'&&curH.includes('Principio')) { principle=n.innerHTML; curH=''; }
      else if (n.tagName==='UL') { if(curH.includes('USA')) doL=n.outerHTML; else if(curH.includes('NO')) dontL=n.outerHTML; }
    }
    html += `<div class="ethics-section"><div class="ethics-card">
      <h2>${title}</h2>
      <div class="principle">${principle}</div>
      <div class="ethics-grid">
        <div class="ethics-do"><h4>USA LA IA PARA:</h4>${doL}</div>
        <div class="ethics-dont"><h4>NO LA USES PARA:</h4>${dontL}</div>
      </div></div></div>`;
  }

  // Warning
  if (warningMd) {
    const wh = marked.parse(warningMd);
    html += `<div class="warning-banner"><div class="warning-inner">${wh.replace(/<h2>/g,'<h3>').replace(/<\/h2>/g,'</h3>')}</div></div>`;
  }

  document.getElementById('content').innerHTML = html;

  // Animations
  const obs = new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); }),{threshold:.08});
  document.querySelectorAll('.fade-in').forEach(el => obs.observe(el));

  let lastY=0;
  window.addEventListener('scroll',()=>{
    const y=window.scrollY;
    document.getElementById('navbar').classList.toggle('hidden',y>lastY&&y>200);
    lastY=y;
  });

  const secs=document.querySelectorAll('.activity'), lnks=document.querySelectorAll('.nav-link');
  window.addEventListener('scroll',()=>{
    let cur='';
    secs.forEach(s=>{if(window.scrollY>=s.offsetTop-120)cur=s.id});
    lnks.forEach(l=>l.classList.toggle('active',l.getAttribute('href')==='#'+cur));
  });
}

loadContent();
</script>
</body>
</html>

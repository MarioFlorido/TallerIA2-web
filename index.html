<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller IA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

<style>
:root{
  --bg:#f8fafc;
  --panel:#ffffff;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --accent:#7c3aed;
  --accent-soft:rgba(124,58,237,0.08);
  --border:rgba(0,0,0,0.08);
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.main{
  padding:60px 40px;
  max-width:1300px;
  margin:auto;
}

.hero h1{
  font-size:clamp(3.5rem,6vw,5rem);
  font-weight:900;
  letter-spacing:-1px;
  animation:fadeUp .6s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

.hero h1::after{
  content:'';
  display:block;
  width:80px;
  height:4px;
  margin-top:18px;
  background:var(--accent);
  border-radius:2px;
}

.hero p{
  margin-top:16px;
  font-size:1.25rem;
  color:var(--muted);
  max-width:720px;
  line-height:1.6;
}

.hero-badge{
  display:inline-block;
  margin-top:20px;
  font-size:.85rem;
  font-weight:600;
  color:var(--accent);
  background:var(--accent-soft);
  padding:6px 12px;
  border-radius:999px;
}

.phase-title{
  font-size:2.4rem;
  margin-top:80px;
  font-weight:800;
}

.phase-title span{color:var(--accent)}

.phase-subtitle{
  color:var(--muted);
  margin-bottom:28px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:26px;
}

.card{
  color:var(--text);
  background:var(--card);
  padding:20px;
  border-radius:16px;
  cursor:pointer;
  transition:.25s;
  border:1px solid var(--border);
  position:relative;
}

.card:hover{
  transform:translateY(-4px);
  border-color:var(--accent);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.card h3{
  font-size:1.6rem;
  margin-top:12px;
}

.tag{
  display:inline-block;
  font-size:1rem;
  font-weight:700;
  padding:6px 10px;
  border-radius:999px;
  background:var(--accent-soft);
  color:var(--accent);
  margin-top:10px;
}

.card p{
  margin-top:10px;
  color:var(--muted);
  font-size:.95rem;
  line-height:1.2;
}

.card.done{
  border-color:rgba(34,197,94,0.6);
  background:linear-gradient(135deg, var(--card), rgba(34,197,94,0.06));
}

.card.done .done-label{
  display:flex;
}

.done-label{
  display:none;
  align-items:center;
  gap:6px;
  margin-top:14px;
  font-size:.8rem;
  font-weight:600;
  color:#22c55e;
}

.done-label svg{
  width:18px;
  height:18px;
  flex-shrink:0;
}

.overlay{
  position:fixed;
  inset:0;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:100;
}

.overlay.open{display:block}

.panel{
  position:fixed;
  right:0;
  top:0;
  width:50%;
  height:100vh;
  background:var(--panel);
  color:#111;
  transform:translateX(100%);
  transition:.35s;
  padding:50px;
  padding-bottom:120px;
  overflow-y:auto;
  box-sizing:border-box;
  z-index:101;
}

.panel.open{transform:translateX(0)}

.panel h2{
  font-size:2.4rem;
  font-weight:800;
}

.panel-section{
  margin-top:32px;
}

.panel-section h4{
  font-size:1.05rem;
  font-weight:700;
  color:var(--accent);
  margin-bottom:10px;
}

.panel-section p{
  line-height:1.7;
  color:#333;
}

.panel-section pre{
  background:#020617;
  color:#f9fafb;
  padding:18px;
  border-radius:10px;
  font-family:'JetBrains Mono', monospace;
  font-size:.85rem;
  line-height:1.6;
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: anywhere;
  overflow-x:hidden;
  position:relative;
  border-left:3px solid var(--accent);
}

/* PROMPT */
.prompt-toggle-btn{
  width:100%;
  background:var(--muted);
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  font-size:.95rem;
  display:flex;
  align-items:center;
  gap:10px;
}

.prompt-code{
  max-height:0;
  overflow:hidden;
  transition:max-height .4s ease;
}

.prompt-code.open{
  max-height:3000px;
}

/* BOTÓN COPIAR */
.code-wrapper{
  position:relative;
}

.code-copy{
  position:absolute;
  top:10px;
  right:10px;
  font-size:.75rem;
  background:rgba(255,255,255,0.08);
  color:#fff;
  border:1px solid rgba(255,255,255,0.15);
  padding:4px 8px;
  border-radius:6px;
  cursor:pointer;
  opacity:0;
  transition:.2s;
}

.code-wrapper:hover .code-copy{
  opacity:1;
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
  font-size:1.5rem;
  width:32px;
  height:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:rgba(0,0,0,.05);
}

.panel-footer{
  margin-top:40px;
  display:flex;
  justify-content:center;
}

button.done-btn{
  max-width:300px;
  padding:10px 24px;
  border:2px solid #22c55e;
  background:transparent;
  border-radius:8px;
  color:#22c55e;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="main">

<section class="hero">
  <h1>Taller avanzado de IA</h1>
  <p><strong>Aprendizaje activo</strong> con inteligencia artificial</p>
  <div class="hero-badge">Metodología · Pensamiento crítico · IA aplicada</div>
</section>

<div id="content"></div>

</div>

<div id="overlay" class="overlay" onclick="closePanel()"></div>
<div id="panel" class="panel"></div>

<script>
const STORAGE_KEY="progress";

function getProgress(){
  return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
}

function isDone(id){
  return !!getProgress()[id];
}

function copyCode(btn){
  const pre = btn.parentElement.querySelector('pre');
  const text = pre.textContent.trim();

  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(()=>{
      btn.textContent="Copiado";
      setTimeout(()=>btn.textContent="Copiar",1200);
    });
  } else {
    const ta=document.createElement("textarea");
    ta.value=text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    ta.remove();

    btn.textContent="Copiado";
    setTimeout(()=>btn.textContent="Copiar",1200);
  }
}

function togglePrompt(btn){
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
}

</script>

</body>
</html>

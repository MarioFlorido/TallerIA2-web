<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller de IA — Técnicas Avanzadas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

<style>
:root {
  --bg: #fafafa;
  --bg-card: #ffffff;
  --text: #111;
  --text-muted: #6b7280;
  --border: #e5e7eb;
  --accent: #2563eb;

  --radius: 14px;

  --font: 'Inter', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  line-height:1.7;
}

/* HERO */
.hero{
  padding:100px 24px 60px;
  text-align:center;
  background:#fff;
  border-bottom:1px solid var(--border);
}

.hero h1{
  font-size:clamp(2.5rem,5vw,4rem);
  font-weight:800;
  letter-spacing:-0.03em;
}

.hero p{
  margin-top:16px;
  color:var(--text-muted);
}

/* NAV PHASES */
.hero-phases{
  margin-top:40px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.hero-phase{
  padding:8px 16px;
  border-radius:999px;
  background:#f3f4f6;
  font-size:.85rem;
  text-decoration:none;
  color:#374151;
  transition:.2s;
}

.hero-phase:hover{
  background:#e5e7eb;
}

/* LAYOUT */
.container{
  max-width:900px;
  margin:0 auto;
  padding:60px 24px;
}

/* PHASE */
.phase-header{
  margin-bottom:40px;
}

.phase-title{
  font-size:2rem;
  font-weight:700;
  letter-spacing:-0.02em;
}

/* ACTIVITY */
.activity{
  margin-bottom:60px;
}

.activity-img{
  width:100%;
  height:180px;
  border-radius:var(--radius);
  overflow:hidden;
  margin-bottom:20px;
}

.activity-img img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.activity-head{
  display:flex;
  gap:12px;
  align-items:center;
  margin-bottom:10px;
}

.activity-num{
  font-size:1.8rem;
  font-weight:800;
  color:#9ca3af;
}

.activity h2{
  font-size:1.5rem;
  font-weight:700;
}

/* TEXT */
.activity-body h3{
  font-size:.8rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:#9ca3af;
  margin-top:24px;
  margin-bottom:10px;
}

.activity-body p,
.activity-body li{
  color:#4b5563;
  font-size:.95rem;
}

/* INFO */
.info-box{
  margin:20px 0;
  padding-left:16px;
  border-left:3px solid var(--border);
}

/* PROMPT */
.prompt-toggle{
  margin-top:20px;
  width:100%;
  text-align:left;
  padding:14px;
  background:#111;
  color:#fff;
  border:none;
  border-radius:var(--radius);
  cursor:pointer;
}

.prompt-content{
  max-height:0;
  overflow:hidden;
  transition:max-height .4s ease;
}

.prompt-content.open{
  max-height:2000px;
}

pre{
  background:#111;
  color:#e5e7eb;
  padding:20px;
  border-radius:var(--radius);
  margin-top:10px;
  font-family:var(--mono);
  font-size:.85rem;
}

/* BONUS / REFLEXION */
.bonus-section,
.reflection-section{
  margin-top:20px;
  padding-left:16px;
  border-left:3px solid var(--border);
}

/* FOOTER */
footer{
  padding:40px;
  text-align:center;
  font-size:.8rem;
  color:#9ca3af;
}
</style>
</head>

<body>

<section class="hero">
  <h1>Taller de Inteligencia Artificial</h1>
  <p>Técnicas avanzadas de prompting y pensamiento crítico</p>
  <div class="hero-phases" id="hero-phases"></div>
</section>

<div id="content">
  <div style="padding:60px;text-align:center;color:#999">Cargando…</div>
</div>

<footer>
  Mario Florido · Taller de IA
</footer>

<script>
const PHASE_NAMES = {'1':'Fundamentos','2':'Análisis','3':'Investigación','4':'Producción'};
marked.setOptions({ breaks: false, gfm: true });

async function loadContent() {
  try {
    const res = await fetch('contenido.md');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    parseAndRender(await res.text());
  } catch(e) {
    document.getElementById('content').innerHTML = "Error cargando contenido";
  }
}

function parseAndRender(md) {
  const lines = md.split('\n');
  const phases = [];
  let phase=null, act=null, sec=null, buf=[];

  function flush() {
    const t=buf.join('\n').trim(); buf=[];
    if(!sec||!act||!t)return;
    act.sections.push({type:sec.type,title:sec.title,content:t});
  }

  for(const line of lines){
    let m=line.match(/^# FASE (\d+):\s*(.+)/i);
    if(m){flush();phase={num:m[1],title:m[2],activities:[]};phases.push(phase);act=null;continue}

    m=line.match(/^### (\d+)\.\s*(.+)/);
    if(m){flush();act={num:m[1],title:m[2],image:'',sections:[]};phase.activities.push(act);continue}

    m=line.match(/^>\s*\*\*Imagen:\*\*\s*(.+)/);
    if(m&&act){act.image=m[1];continue}

    m=line.match(/^#### (.+)/);
    if(m){flush();sec={type:m[1].toLowerCase(),title:m[1]};continue}

    buf.push(line);
  }
  flush();

  render(phases);
}

function render(phases){
  let html='';
  let nav='';

  phases.forEach(p=>{
    nav+=`<a href="#p${p.num}" class="hero-phase">${PHASE_NAMES[p.num]}</a>`;

    html+=`<div class="container" id="p${p.num}">
      <div class="phase-header">
        <h2 class="phase-title">${p.title}</h2>
      </div>`;

    p.activities.forEach(a=>{
      html+=`
      <div class="activity">

        ${a.image?`<div class="activity-img"><img src="${a.image}"></div>`:''}

        <div class="activity-head">
          <div class="activity-num">${a.num}</div>
          <h2>${a.title}</h2>
        </div>

        <div class="activity-body">
          ${a.sections.map(s=>{
            if(s.type.includes('prompt')){
              return `
              <button class="prompt-toggle" onclick="this.nextElementSibling.classList.toggle('open')">
                Mostrar prompt
              </button>
              <div class="prompt-content">
                <pre>${s.content.replace(/```/g,'')}</pre>
              </div>`;
            }

            return `<h3>${s.title}</h3>${marked.parse(s.content)}`;
          }).join('')}
        </div>

      </div>`;
    });

    html+='</div>';
  });

  document.getElementById('content').innerHTML=html;
  document.getElementById('hero-phases').innerHTML=nav;
}

loadContent();
</script>

</body>
</html>

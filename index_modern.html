<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller de IA — Técnicas Avanzadas de Prompting</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
:root {
  --bg: #f5f4f0;
  --bg-card: #ffffff;
  --bg-elevated: #edecea;
  --bg-glass: rgba(255,255,255,0.82);
  --bg-code: #f0efeb;
  --text: #1a1a22;
  --text-sub: #484856;
  --text-dim: #9090a0;
  --border: rgba(0,0,0,0.08);
  --border-md: rgba(0,0,0,0.12);
  --shadow-sm: 0 2px 8px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.03);
  --shadow-md: 0 4px 20px rgba(0,0,0,.06),0 12px 40px rgba(0,0,0,.04);
  --shadow-lg: 0 8px 30px rgba(0,0,0,.08),0 24px 60px rgba(0,0,0,.05);

  --g1: #f97316; --g1b: #facc15;
  --g2: #ef4444; --g2b: #f97316;
  --g3: #6366f1; --g3b: #8b5cf6;
  --g4: #10b981; --g4b: #06b6d4;

  --phase-1: #e07b0c;
  --phase-2: #dc3535;
  --phase-3: #5558e6;
  --phase-4: #0d9668;

  --p1-bg: rgba(249,115,22,.08); --p1-bdr: rgba(249,115,22,.2);
  --p2-bg: rgba(239,68,68,.08);  --p2-bdr: rgba(239,68,68,.2);
  --p3-bg: rgba(99,102,241,.08); --p3-bdr: rgba(99,102,241,.2);
  --p4-bg: rgba(16,185,129,.08); --p4-bdr: rgba(16,185,129,.2);

  --radius: 16px;
  --radius-lg: 22px;
  --pill: 100px;
  --font: 'Sora', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scroll-padding-top:90px}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.7;font-size:15px;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:var(--phase-3);color:#fff}

/* ── PROGRESS ── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:300;height:4px;background:transparent}
.topbar-fill{height:100%;width:0%;transition:width .15s;background:linear-gradient(90deg,var(--g1),var(--g2),var(--g3),var(--g4))}

/* ── FLOATING NAV ── */
.fnav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;display:flex;gap:4px;padding:6px;background:var(--bg-glass);backdrop-filter:blur(20px) saturate(1.6);border:1px solid var(--border-md);border-radius:var(--pill);box-shadow:var(--shadow-lg);transition:opacity .3s,transform .3s}
.fnav.hide{opacity:0;transform:translateX(-50%) translateY(16px);pointer-events:none}
.fnav a{font-size:.64rem;font-weight:600;color:var(--text-dim);text-decoration:none;padding:6px 11px;border-radius:var(--pill);white-space:nowrap;transition:all .25s}
.fnav a:hover{color:var(--text);background:rgba(0,0,0,.05)}
.fnav a.active{color:#fff}
.fnav a.active[data-p="1"]{background:var(--phase-1)} .fnav a.active[data-p="2"]{background:var(--phase-2)} .fnav a.active[data-p="3"]{background:var(--phase-3)} .fnav a.active[data-p="4"]{background:var(--phase-4)}
.fnav .sep{width:1px;background:var(--border-md);margin:4px 2px}
@media(max-width:700px){.fnav{bottom:10px;gap:2px;padding:5px}.fnav a{font-size:.56rem;padding:5px 7px}}

/* ── HERO ── */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px 100px;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;overflow:hidden}
.hero-bg .orb{position:absolute;border-radius:50%;filter:blur(100px);animation:float 14s ease-in-out infinite}
.orb-1{width:500px;height:500px;background:var(--g1);opacity:.10;top:-10%;left:-8%;animation-delay:0s}
.orb-2{width:450px;height:450px;background:var(--g3);opacity:.08;bottom:-8%;right:-6%;animation-delay:-5s}
.orb-3{width:300px;height:300px;background:var(--g4);opacity:.07;top:50%;left:55%;animation-delay:-9s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,15px) scale(.95)}}

.hero-content{position:relative;z-index:1;max-width:820px}
.hero-chip{display:inline-flex;align-items:center;gap:6px;font-size:.68rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:8px 20px;border-radius:var(--pill);border:1px solid var(--border-md);background:var(--bg-glass);backdrop-filter:blur(12px);margin-bottom:36px;color:var(--text-sub)}
.hero-chip .dot{width:6px;height:6px;border-radius:50%;background:var(--phase-1);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.hero h1{font-size:clamp(2.6rem,7vw,5.2rem);font-weight:800;line-height:1.06;letter-spacing:-.03em;color:var(--text)}
.hero h1 .grad{background:linear-gradient(135deg,var(--g1) 0%,var(--g2) 30%,var(--g3) 70%,var(--g4) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:1.08rem;color:var(--text-sub);margin-top:18px;font-weight:400}
.hero-grid{display:flex;gap:10px;margin-top:48px;flex-wrap:wrap;justify-content:center}
.hero-pill{display:flex;align-items:center;gap:8px;padding:11px 20px;border-radius:var(--radius);background:var(--bg-card);border:1px solid var(--border);font-size:.82rem;font-weight:500;color:var(--text-sub);text-decoration:none;transition:all .3s;box-shadow:var(--shadow-sm)}
.hero-pill:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--border-md)}
.hero-pill .pnum{font-weight:800;font-size:.68rem;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:6px;color:#fff}
.hero-pill[data-p="1"] .pnum{background:var(--phase-1)} .hero-pill[data-p="2"] .pnum{background:var(--phase-2)} .hero-pill[data-p="3"] .pnum{background:var(--phase-3)} .hero-pill[data-p="4"] .pnum{background:var(--phase-4)}

/* ── PHASE ── */
.phase-sec{padding:72px 0 0;position:relative}
.phase-sec::before{content:'';position:absolute;top:0;left:0;right:0;height:280px;border-radius:0 0 50% 50%/0 0 80px 80px}
.phase-sec[data-p="1"]::before{background:linear-gradient(180deg,var(--p1-bg),transparent)} .phase-sec[data-p="2"]::before{background:linear-gradient(180deg,var(--p2-bg),transparent)} .phase-sec[data-p="3"]::before{background:linear-gradient(180deg,var(--p3-bg),transparent)} .phase-sec[data-p="4"]::before{background:linear-gradient(180deg,var(--p4-bg),transparent)}
.phase-head{max-width:1040px;margin:0 auto;padding:0 24px 44px;position:relative;z-index:1}
.phase-tag{display:inline-flex;align-items:center;gap:6px;font-size:.64rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:6px 16px;border-radius:var(--pill);margin-bottom:14px}
.phase-sec[data-p="1"] .phase-tag{color:var(--phase-1);background:var(--bg-card);border:1px solid var(--p1-bdr)} .phase-sec[data-p="2"] .phase-tag{color:var(--phase-2);background:var(--bg-card);border:1px solid var(--p2-bdr)} .phase-sec[data-p="3"] .phase-tag{color:var(--phase-3);background:var(--bg-card);border:1px solid var(--p3-bdr)} .phase-sec[data-p="4"] .phase-tag{color:var(--phase-4);background:var(--bg-card);border:1px solid var(--p4-bdr)}
.phase-tag .tdot{width:5px;height:5px;border-radius:50%;background:currentColor}
.phase-name{font-size:clamp(1.9rem,4.5vw,2.8rem);font-weight:800;letter-spacing:-.02em;line-height:1.1}
.phase-sub{font-size:.95rem;color:var(--text-dim);margin-top:6px}

/* ── CARD: vertical, image 16:9 on top ── */
.cards{max-width:1040px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
.acard{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:30px;overflow:hidden;transition:all .4s cubic-bezier(.25,.8,.25,1);box-shadow:var(--shadow-sm);position:relative}
.acard::after{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.acard[data-p="1"]::after{background:linear-gradient(90deg,var(--g1),var(--g1b))} .acard[data-p="2"]::after{background:linear-gradient(90deg,var(--g2),var(--g2b))} .acard[data-p="3"]::after{background:linear-gradient(90deg,var(--g3),var(--g3b))} .acard[data-p="4"]::after{background:linear-gradient(90deg,var(--g4),var(--g4b))}
.acard:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--border-md)}

/* Image: 16:9 horizontal banner */
.acard-img{position:relative;width:100%;aspect-ratio:16/7;overflow:hidden;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center}
.acard-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s}
.acard:hover .acard-img img{transform:scale(1.03)}
.acard-img .ph{color:var(--text-dim);font-size:.75rem;font-family:var(--mono);padding:10px 18px;border-radius:10px;border:2px dashed var(--border-md);background:var(--bg-card)}

.acard-body{padding:28px 32px 24px}
.acard-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.acard-num{font-size:1.8rem;font-weight:800;line-height:1;letter-spacing:-.02em}
.acard[data-p="1"] .acard-num{color:var(--phase-1)} .acard[data-p="2"] .acard-num{color:var(--phase-2)} .acard[data-p="3"] .acard-num{color:var(--phase-3)} .acard[data-p="4"] .acard-num{color:var(--phase-4)}
.acard-tag{font-size:.6rem;font-weight:600;letter-spacing:.05em;padding:4px 12px;border-radius:var(--pill)}
.acard[data-p="1"] .acard-tag{color:var(--phase-1);background:var(--p1-bg);border:1px solid var(--p1-bdr)} .acard[data-p="2"] .acard-tag{color:var(--phase-2);background:var(--p2-bg);border:1px solid var(--p2-bdr)} .acard[data-p="3"] .acard-tag{color:var(--phase-3);background:var(--p3-bg);border:1px solid var(--p3-bdr)} .acard[data-p="4"] .acard-tag{color:var(--phase-4);background:var(--p4-bg);border:1px solid var(--p4-bdr)}
.acard-title{font-size:1.35rem;font-weight:700;letter-spacing:-.01em;margin-bottom:8px}
.acard-desc{color:var(--text-sub);font-size:.88rem;line-height:1.75}
.acard-desc strong{color:var(--text);font-weight:600}
.acard-desc em{font-style:italic}

/* Expand */
.acard-expand{border-top:1px solid var(--border);padding:28px 32px;display:none}
.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-bottom:20px}
@media(max-width:700px){.exp-grid{grid-template-columns:1fr}}
.exp-grid h4{font-size:.82rem;font-weight:700;margin-bottom:8px;color:var(--text)}
.exp-grid p,.exp-grid li{color:var(--text-sub);font-size:.87rem;line-height:1.75}
.exp-grid strong{color:var(--text);font-weight:600}
.exp-grid em{font-style:italic}
.exp-grid ul,.exp-grid ol{padding-left:18px;margin:6px 0}
.exp-grid li{margin-bottom:3px}

.info-box{background:var(--p3-bg);border:1px solid var(--p3-bdr);border-radius:12px;padding:18px 22px;margin:14px 0}
.info-box h4{font-size:.75rem;font-weight:700;color:var(--phase-3);margin-bottom:6px}
.info-box p,.info-box li{font-size:.84rem;color:var(--text-sub);font-style:italic}
.info-box a{color:var(--phase-3);text-decoration:none;border-bottom:1px solid var(--p3-bdr);transition:all .2s}
.info-box a:hover{border-color:var(--phase-3);background:var(--p3-bg)}
.info-box ul{padding-left:18px;margin:4px 0;list-style:disc}
.info-box li{margin-bottom:3px}

.prompt-btn{display:flex;align-items:center;gap:8px;font-family:var(--font);font-size:.84rem;font-weight:600;color:var(--text-sub);cursor:pointer;padding:12px 18px;border:1px solid var(--border);border-radius:12px;background:var(--bg);width:100%;text-align:left;transition:all .25s;margin-top:14px}
.prompt-btn:hover{border-color:var(--border-md);background:var(--bg-elevated);color:var(--text)}
.prompt-btn .arr{font-size:.7rem;transition:transform .3s}
.prompt-btn.open .arr{transform:rotate(90deg)}
.prompt-slide{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.4,0,.2,1)}
.prompt-slide.open{max-height:8000px}
pre{background:var(--bg-code);border:1px solid var(--border);border-radius:12px;padding:22px;margin:10px 0;overflow-x:auto;font-size:.8rem;line-height:1.7;color:var(--text-sub);font-family:var(--mono);white-space:pre-wrap;word-wrap:break-word}

.bonus-box,.reflect-box{border-radius:12px;padding:18px 22px;margin-top:14px}
.bonus-box{background:var(--p1-bg);border:1px solid var(--p1-bdr)}
.bonus-box h4{color:var(--phase-1);font-size:.75rem;font-weight:700;margin-bottom:6px}
.bonus-box p{color:var(--text-sub);font-size:.85rem}
.bonus-box strong{color:var(--text)}
.reflect-box{background:var(--p4-bg);border:1px solid var(--p4-bdr)}
.reflect-box h4{color:var(--phase-4);font-size:.75rem;font-weight:700;margin-bottom:6px}
.reflect-box p{color:var(--text-sub);font-size:.85rem}
.reflect-box strong{color:var(--text)}

/* Toggle */
.acard-toggle{border-top:1px solid var(--border);display:flex;justify-content:center}
.toggle-btn{font-family:var(--font);font-size:.72rem;font-weight:600;color:var(--text-dim);background:none;border:none;cursor:pointer;padding:10px 20px;transition:color .2s;letter-spacing:.03em}
.toggle-btn:hover{color:var(--text-sub)}

/* ── ETHICS ── */
.ethics{max-width:1040px;margin:72px auto 0;padding:0 24px}
.ethics-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:44px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.ethics-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--g1),var(--g2),var(--g3),var(--g4))}
.ethics-card h2{font-size:1.6rem;font-weight:800;margin-bottom:6px;letter-spacing:-.02em}
.ethics-card .principle{background:var(--p3-bg);border-left:3px solid var(--phase-3);padding:16px 20px;border-radius:0 12px 12px 0;margin:20px 0;font-size:.9rem;color:var(--text-sub)}
.ethics-card .principle strong{color:var(--text)}
.ethics-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px}
@media(max-width:700px){.ethics-cols{grid-template-columns:1fr}}
.eco{border-radius:12px;padding:22px}
.eco.do{background:var(--p4-bg);border:1px solid var(--p4-bdr)}
.eco.dont{background:var(--p2-bg);border:1px solid var(--p2-bdr)}
.eco.do h4{color:var(--phase-4);font-size:.78rem;font-weight:700;margin-bottom:10px}
.eco.dont h4{color:var(--phase-2);font-size:.78rem;font-weight:700;margin-bottom:10px}
.eco li{font-size:.84rem;color:var(--text-sub);margin-bottom:5px}

.warn{max-width:1040px;margin:28px auto 0;padding:0 24px}
.warn-inner{background:var(--p2-bg);border:1px solid var(--p2-bdr);border-radius:12px;padding:22px 26px}
.warn-inner h3{color:var(--phase-2);font-size:.95rem;font-weight:700;margin-bottom:6px}
.warn-inner p,.warn-inner li{color:var(--text-sub);font-size:.85rem}
.warn-inner ul{padding-left:18px;margin:4px 0}

footer{text-align:center;padding:56px 24px 32px;color:var(--text-dim);font-size:.73rem;letter-spacing:.02em}

/* ANIM */
.reveal{opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.25,.8,.25,1),transform .7s cubic-bezier(.25,.8,.25,1)}
.reveal.vis{opacity:1;transform:translateY(0)}
.reveal.d1{transition-delay:.1s}.reveal.d2{transition-delay:.2s}

#loading{display:flex;align-items:center;justify-content:center;min-height:60vh;gap:10px}
.ldot{width:8px;height:8px;border-radius:50%;animation:ldot .8s ease-in-out infinite alternate}
.ldot:nth-child(1){background:var(--phase-1);animation-delay:0s}
.ldot:nth-child(2){background:var(--phase-2);animation-delay:.15s}
.ldot:nth-child(3){background:var(--phase-3);animation-delay:.3s}
@keyframes ldot{to{opacity:.2;transform:translateY(-6px)}}
</style>
</head>
<body>

<div class="topbar"><div class="topbar-fill" id="progress"></div></div>
<nav class="fnav hide" id="fnav"></nav>

<section class="hero" id="hero">
  <div class="hero-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
  <div class="hero-content">
    <span class="hero-chip"><span class="dot"></span> Taller 2</span>
    <h1>Actividades Avanzadas de <span class="grad">Inteligencia Artificial</span></h1>
    <p class="hero-sub">Técnicas Avanzadas de Prompting y Pensamiento Crítico</p>
    <div class="hero-grid" id="hero-grid"></div>
  </div>
</section>

<div id="content"><div id="loading"><span class="ldot"></span><span class="ldot"></span><span class="ldot"></span></div></div>

<footer>Taller de IA — Técnicas Avanzadas de Prompting y Pensamiento Crítico</footer>

<script>
const PN={'1':'Fundamentos','2':'Análisis Crítico','3':'Investigación','4':'Producción'};
marked.setOptions({breaks:false,gfm:true});

async function init(){
  try{const r=await fetch('contenido.md');if(!r.ok)throw new Error('HTTP '+r.status);go(await r.text())}
  catch(e){document.getElementById('content').innerHTML=`<div style="text-align:center;padding:20vh 24px"><h2 style="color:var(--phase-2);margin-bottom:12px;font-weight:800">Error</h2><p style="color:var(--text-sub)">No se pudo cargar <code style="background:var(--bg-elevated);padding:2px 8px;border-radius:6px;font-family:var(--mono)">contenido.md</code></p><p style="color:var(--text-dim);margin-top:12px;font-size:.85rem">${e.message}</p></div>`}
}

function go(md){
  const lines=md.split('\n'),phases=[];
  let ph=null,act=null,sec=null,buf=[],ethB=null,wB=null,mode='n';
  function flush(){const t=buf.join('\n').trim();buf=[];if(mode==='e'){ethB=(ethB||'')+'\n'+t;return}if(mode==='w'){wB=(wB||'')+'\n'+t;return}if(!sec||!act||!t)return;act.secs.push({type:sec.type,title:sec.title,content:t})}
  for(const l of lines){
    let m=l.match(/^# FASE (\d+):\s*(.+)/i);if(m){flush();mode='n';ph={n:m[1],t:m[2].trim(),sub:'',acts:[]};phases.push(ph);act=null;sec=null;continue}
    if(l.match(/^# ÉTICA/i)){flush();mode='e';ethB='';act=null;sec=null;continue}
    if(l.match(/^# AVISO/i)){flush();mode='w';wB='';act=null;sec=null;continue}
    if(mode==='e'||mode==='w'){buf.push(l);continue}
    m=l.match(/^## (.+)/);if(m&&ph&&!act){ph.sub=m[1].trim();continue}
    if(l.trim()==='---')continue;
    m=l.match(/^### (\d+)\.\s*(.+)/);if(m){flush();act={num:m[1],title:m[2].trim(),tag:'',img:'',secs:[]};if(ph)ph.acts.push(act);sec=null;continue}
    m=l.match(/^>\s*\*\*Tag:\*\*\s*(.+)/);if(m&&act){act.tag=m[1].trim();continue}
    m=l.match(/^>\s*\*\*Imagen:\*\*\s*(.+)/);if(m&&act){act.img=m[1].trim();continue}
    m=l.match(/^#### (.+)/);if(m&&act){flush();const t=m[1].trim();
      if(t==='Objetivo Educacional')sec={type:'obj',title:t};
      else if(t==='Descripción')sec={type:'desc',title:t};
      else if(t.startsWith('Info:'))sec={type:'info',title:t.slice(5).trim()};
      else if(t==='Info')sec={type:'info',title:''};
      else if(t==='Prompt Principal')sec={type:'prompt',title:t};
      else if(t==='Bonus Extra')sec={type:'bonus',title:t};
      else if(t.startsWith('Pregunta de Reflexión'))sec={type:'refl',title:t};
      else sec={type:'x',title:t};continue}
    buf.push(l);}
  flush();render(phases,(ethB||'').trim(),(wB||'').trim());
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function render(phases,ethMd,wMd){
  let hg='';phases.forEach(p=>{hg+=`<a href="#phase${p.n}" class="hero-pill" data-p="${p.n}"><span class="pnum">${p.n}</span>${PN[p.n]||p.t}</a>`});
  document.getElementById('hero-grid').innerHTML=hg;
  let nv='';phases.forEach(p=>{nv+=`<div class="sep"></div>`;p.acts.forEach(a=>{const s=a.title.length>10?a.title.substring(0,10)+'…':a.title;nv+=`<a href="#act${a.num}" data-p="${p.n}">${a.num}. ${s}</a>`})});
  document.getElementById('fnav').innerHTML=nv;

  let h='';
  phases.forEach(p=>{
    h+=`<section class="phase-sec" data-p="${p.n}" id="phase${p.n}"><div class="phase-head"><span class="phase-tag reveal"><span class="tdot"></span> Fase ${p.n}</span><h2 class="phase-name reveal d1">${p.t}</h2><p class="phase-sub reveal d2">${p.sub}</p></div><div class="cards">`;
    p.acts.forEach(a=>{
      const pad=a.num.padStart(2,'0');
      let img=a.img?`<img src="${a.img}" alt="Actividad ${pad}" onerror="this.parentElement.innerHTML='<span class=ph>${esc(a.img)}</span>'">`:`<span class="ph">img/${pad}-*.jpg</span>`;
      let obj='',desc='',infos=[],prm='',bonus='',refl='';
      a.secs.forEach(s=>{const htm=marked.parse(s.content);switch(s.type){case'obj':obj=htm;break;case'desc':desc=htm;break;case'info':infos.push({t:s.title,h:htm});break;case'prompt':prm=s.content;break;case'bonus':bonus=htm;break;case'refl':refl=htm;break}});
      let code=prm;const cm=prm.match(/```[\s\S]*?\n([\s\S]*?)```/);if(cm)code=cm[1].trimEnd();
      const infoH=infos.map(i=>`<div class="info-box">${i.t?`<h4>${i.t}</h4>`:''}${i.h}</div>`).join('');

      h+=`<article class="acard reveal" data-p="${p.n}" id="act${a.num}">
        <div class="acard-img">${img}</div>
        <div class="acard-body">
          <div class="acard-top"><span class="acard-num">${pad}</span>${a.tag?`<span class="acard-tag">${a.tag}</span>`:''}</div>
          <h3 class="acard-title">${a.title}</h3>
          <div class="acard-desc">${desc}</div>
        </div>
        <div class="acard-expand">
          <div class="exp-grid"><div><h4>Objetivo Educacional</h4>${obj}</div><div><h4>Descripción completa</h4>${desc}</div></div>
          ${infoH}
          ${prm?`<button class="prompt-btn" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')"><span class="arr">▸</span> Prompt Principal</button><div class="prompt-slide"><pre>${esc(code)}</pre></div>`:''}
          ${bonus?`<div class="bonus-box"><h4>Bonus Extra</h4>${bonus}</div>`:''}
          ${refl?`<div class="reflect-box"><h4>Pregunta de Reflexión</h4>${refl}</div>`:''}
        </div>
        <div class="acard-toggle"><button class="toggle-btn" onclick="toggleCard(this)">Ver más ▾</button></div>
      </article>`;
    });
    h+='</div></section>';
  });

  if(ethMd){
    const ep=new DOMParser().parseFromString('<div>'+marked.parse(ethMd)+'</div>','text/html').body.firstChild;
    let ti='',pr='',doL='',dnL='',cH='';
    for(const n of ep.children){if(n.tagName==='H2')ti=n.textContent;else if(n.tagName==='H3')cH=n.textContent;else if(n.tagName==='P'&&cH.includes('Principio')){pr=n.innerHTML;cH=''}else if(n.tagName==='UL'){if(cH.includes('USA'))doL=n.outerHTML;else if(cH.includes('NO'))dnL=n.outerHTML}}
    h+=`<div class="ethics"><div class="ethics-card reveal"><h2>${ti}</h2><div class="principle">${pr}</div><div class="ethics-cols"><div class="eco do"><h4>USA LA IA PARA:</h4>${doL}</div><div class="eco dont"><h4>NO LA USES PARA:</h4>${dnL}</div></div></div></div>`;
  }
  if(wMd)h+=`<div class="warn"><div class="warn-inner reveal">${marked.parse(wMd).replace(/<h2>/g,'<h3>').replace(/<\/h2>/g,'</h3>')}</div></div>`;

  document.getElementById('content').innerHTML=h;wire();
}

function toggleCard(btn){
  const exp=btn.closest('.acard').querySelector('.acard-expand');
  const open=exp.style.display==='block';
  exp.style.display=open?'none':'block';
  btn.textContent=open?'Ver más ▾':'Ocultar ▴';
}

function wire(){
  const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('vis')}),{threshold:.05});
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
  window.addEventListener('scroll',()=>{
    const h=document.documentElement.scrollHeight-window.innerHeight;
    document.getElementById('progress').style.width=h>0?(window.scrollY/h*100)+'%':'0%';
  });
  const fnav=document.getElementById('fnav'),acts=document.querySelectorAll('.acard'),nls=fnav.querySelectorAll('a');
  window.addEventListener('scroll',()=>{
    fnav.classList.toggle('hide',window.scrollY<400);
    let cur='';acts.forEach(a=>{if(window.scrollY>=a.offsetTop-200)cur=a.id});
    nls.forEach(l=>l.classList.toggle('active',l.getAttribute('href')==='#'+cur));
  });
}
init();
</script>
</body>
</html>

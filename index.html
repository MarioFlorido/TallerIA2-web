<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller IA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

<style>
:root{
  --bg:#f6f8fb;
  --panel:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --accent:#7c3aed;
  --border:rgba(0,0,0,0.06);
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HERO FULL WIDTH */
.hero{
  width:100%;
  background:var(--accent);
  color:white;
  padding:80px 60px;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(3.5rem,7vw,6rem);
  line-height:1;
  margin:0;
}

.hero p{
  margin-top:20px;
  font-size:1.2rem;
  opacity:.9;
}

/* CONTENIDO */
.main{
  padding:60px 40px;
  max-width:1200px;
  margin:auto;
}

/* TITULOS FASE */
.phase-title{
  font-family:'Playfair Display',serif;
  font-size:2.6rem;
  margin-top:100px;
}

.phase-title span{
  color:var(--accent);
}

.phase-subtitle{
  color:var(--muted);
  margin-bottom:30px;
}

/* BASE ACTIVIDAD */
.card{
  margin-bottom:30px;
  padding-bottom:20px;
  border-bottom:1px solid var(--border);
}

/* BOTÓN */
.open-btn{
  margin-top:12px;
  background:transparent;
  border:1px solid var(--accent);
  color:var(--accent);
  padding:6px 14px;
  border-radius:6px;
  cursor:pointer;
  font-size:.85rem;
}

.open-btn:hover{
  background:var(--accent);
  color:white;
}

/* DONE */
.card.done{
  opacity:.6;
}

.done-label{
  display:none;
  margin-top:10px;
  font-size:.8rem;
  color:#22c55e;
  font-weight:600;
}

.card.done .done-label{
  display:block;
}

/* ===== FASE 1 (EDITORIAL HORIZONTAL) ===== */
.phase-1 .card{
  display:flex;
  gap:20px;
  align-items:flex-start;
}

.phase-1 img{
  width:140px;
  height:100px;
  object-fit:cover;
  border-radius:8px;
}

/* ===== FASE 2 (TARJETAS) ===== */
.phase-2{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:24px;
}

.phase-2 .card{
  border:1px solid var(--border);
  padding:16px;
  border-radius:12px;
}

.phase-2 img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:8px;
}

/* ===== FASE 3 (IMAGEN CIRCULAR) ===== */
.phase-3 .card{
  display:flex;
  gap:20px;
  align-items:center;
}

.phase-3 img{
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
}

/* ===== FASE 4 (MINIMAL) ===== */
.phase-4 img{
  width:100%;
  height:80px;
  object-fit:cover;
  opacity:.85;
}

/* PANEL */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  display:none;
}

.overlay.open{display:block}

.panel{
  position:fixed;
  right:0;
  top:0;
  width:50%;
  height:100vh;
  background:white;
  transform:translateX(100%);
  transition:.3s;
  padding:40px;
  overflow:auto;
}

.panel.open{transform:translateX(0)}

.panel h2{
  font-family:'Playfair Display',serif;
  font-size:2rem;
}

.panel-section{
  margin-top:24px;
}

.panel-section h4{
  color:var(--accent);
}

.prompt-toggle-btn{
  margin-top:10px;
  background:#555;
  color:white;
  border:none;
  padding:8px;
  cursor:pointer;
}

.prompt-code{
  max-height:0;
  overflow:hidden;
  transition:.3s;
}

.prompt-code.open{
  max-height:2000px;
}

.panel-footer{
  margin-top:40px;
  text-align:center;
}

.done-btn{
  border:2px solid #22c55e;
  background:none;
  padding:10px 20px;
  color:#22c55e;
  cursor:pointer;
}

.done-btn.completed{
  background:#22c55e;
  color:white;
}

.footer{
  margin-top:100px;
  text-align:center;
  color:var(--muted);
}

@media(max-width:768px){
  .panel{width:95%}
  .hero{padding:60px 30px}
}
</style>
</head>

<body>

<section class="hero">
  <h1>Taller avanzado de IA</h1>
  <p>Aprendizaje activo con inteligencia artificial</p>
</section>

<div class="main">
<div id="content"></div>

<footer class="footer">
  <p>Taller avanzado de inteligencia artificial</p>
  <p><a href="mailto:mario.florido@ua.es">mario.florido@ua.es</a></p>
  <p>Universidad de Alicante • 2025</p>
</footer>
</div>

<div id="overlay" class="overlay" onclick="closePanel()"></div>
<div id="panel" class="panel"></div>

<script>
const STORAGE_KEY="progress";

function getSectionOrder(title){
  if(title==='Objetivo Educacional') return 1;
  if(title.startsWith('Info')) return 2;
  if(title==='Prompt Principal') return 3;
  if(title==='Para profundizar') return 4;
  return 99;
}

let lastScroll=0;

function getProgress(){
  return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
}

function saveProgress(id){
  let data=getProgress();
  data[id]=true;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

function removeProgress(id){
  let data=getProgress();
  delete data[id];
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

function isDone(id){
  return !!getProgress()[id];
}

async function load(){
  const res=await fetch('contenido.md');
  const md=await res.text();
  parse(md);
}

function parse(md){
  const lines=md.split('\n');
  let phases=[],phase=null,act=null,sec=null,buf=[];

  function flush(){
    const t=buf.join('\n').trim();
    buf=[];
    if(!sec||!act||!t) return;
    act.sections.push({title:sec.title,content:t});
  }

  for(const line of lines){
    let m=line.match(/^# FASE (\d+): (.+)/);
    if(m){flush();phase={num:m[1],title:m[2],subtitle:'',acts:[]};phases.push(phase);continue}

    if(phase && !phase.acts.length && line.match(/^## /)){
      m=line.match(/^## (.+)/);
      phase.subtitle=m[1];continue}

    m=line.match(/^### (\d+)\. (.+)/);
    if(m){flush();act={id:m[1],title:m[2],tag:'',img:'',sections:[]};phase.acts.push(act);continue}

    m=line.match(/\*\*Tag:\*\*\s*(.+)/);
    if(m && act){act.tag=m[1];continue}

    m=line.match(/\*\*Imagen:\*\*\s*(.+)/);
    if(m && act){act.img=m[1];continue}

    m=line.match(/^#### (.+)/);
    if(m){flush();sec={title:m[1]};continue}

    if(line.trim()===''){
      if(sec&&act)buf.push('');
      continue;
    }

    if(sec&&act)buf.push(line);
  }

  flush();

  phases.forEach(p=>p.acts.forEach(a=>{
    a.sections.sort((x,y)=>getSectionOrder(x.title)-getSectionOrder(y.title));
  }));

  render(phases);
}

function openPanel(a){
  lastScroll=window.scrollY;
  document.body.style.overflow='hidden';
  document.getElementById("overlay").classList.add("open");

  let sectionsHtml='';
  a.sections.forEach(s=>{
    if(s.title.includes('Prompt')){
      sectionsHtml+=`
      <div class="panel-section">
        <h4>${s.title}</h4>
        <button class="prompt-toggle-btn" onclick="event.stopPropagation();togglePrompt(this)">Ver Prompt</button>
        <div class="prompt-code"><pre>${s.content.replace(/```/g,'')}</pre></div>
      </div>`;
    } else {
      sectionsHtml+=`
      <div class="panel-section">
        <h4>${s.title}</h4>
        ${marked.parse(s.content)}
      </div>`;
    }
  });

  const done=isDone(a.id);

  document.getElementById("panel").innerHTML=`
    <h2>${a.title}</h2>
    ${sectionsHtml}
    <div class="panel-footer">
      <button class="done-btn${done?' completed':''}" onclick="toggleDone('${a.id}')">
        ${done?'✓ Completada':'Marcar completada'}
      </button>
    </div>
  `;

  document.getElementById("panel").classList.add("open");
}

function closePanel(){
  document.body.style.overflow='auto';
  document.getElementById("panel").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
  window.scrollTo({top:lastScroll});
}

function toggleDone(id){
  if(isDone(id)) removeProgress(id);
  else saveProgress(id);
  location.reload();
}

function togglePrompt(btn){
  btn.nextElementSibling.classList.toggle('open');
}

function render(phases){
  let html='';

  phases.forEach(p=>{
    html+=`<h2 class="phase-title"><span>FASE ${p.num}:</span> ${p.title}</h2>`;
    html+=p.subtitle?`<p class="phase-subtitle">${p.subtitle}</p>`:'';

    html+=`<div class="phase-${p.num}">`;

    p.acts.forEach(a=>{
      const desc=a.sections.find(s=>s.title.includes('Descripción'));
      const done=isDone(a.id);

      html+=`
      <div class="card${done?' done':''}">
        ${a.img?`<img src="${a.img}">`:''}
        <div>
          <div class="tag">${a.tag||''}</div>
          <h3>${a.title}</h3>
          ${desc?marked.parse(desc.content):''}
          <button class="open-btn" onclick='openPanel(${JSON.stringify(a).replace(/'/g,"&apos;")})'>
            Ver actividad
          </button>
          <div class="done-label">✓ Actividad completada</div>
        </div>
      </div>`;
    });

    html+='</div>';
  });

  document.getElementById("content").innerHTML=html;
}

load();
</script>

</body>
</html>

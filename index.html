<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taller IA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

<style>
:root{
  --bg:#0b0f19;
  --card:#111827;
  --glass:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --text:#f9fafb;
  --muted:#9ca3af;
  --accent:#6366f1;
  --radius:16px;
  --font:'Inter',sans-serif;
  --mono:'JetBrains Mono',monospace;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:var(--font);
  background:radial-gradient(circle at 20% 20%, #1f2937, #020617 70%);
  color:var(--text);
}

/* HERO */
.hero{
  padding:100px 20px 60px;
  text-align:center;
}

.hero h1{
  font-size:clamp(2.5rem,6vw,5rem);
  font-weight:900;
  background:linear-gradient(90deg,#fff,#a5b4fc);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  margin-top:16px;
  color:var(--muted);
}

/* NAV */
.hero-phases{
  margin-top:40px;
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}

.hero-phase{
  padding:10px 18px;
  border-radius:999px;
  background:var(--glass);
  border:1px solid var(--border);
  color:var(--text);
  text-decoration:none;
  transition:.3s;
}

.hero-phase:hover{
  background:var(--accent);
}

/* GRID */
.container{
  max-width:1200px;
  margin:auto;
  padding:40px 20px 80px;
}

/* PHASE */
.phase-title{
  font-size:2rem;
  margin-bottom:30px;
  font-weight:700;
}

/* GRID ACTIVIDADES */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:24px;
}

/* CARD */
.card{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  backdrop-filter:blur(12px);
  transition:.3s;
  position:relative;
  overflow:hidden;
}

.card:hover{
  transform:translateY(-6px);
  border-color:rgba(255,255,255,0.2);
}

/* IMAGE */
.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:15px;
}

/* HEADER */
.card-header{
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:10px;
}

.num{
  font-size:1.4rem;
  font-weight:800;
  color:#818cf8;
}

.card h2{
  font-size:1.2rem;
  font-weight:600;
}

/* TEXT */
.card p{
  color:var(--muted);
  font-size:.9rem;
}

/* BUTTON */
.btn{
  margin-top:15px;
  display:inline-block;
  padding:8px 14px;
  background:var(--accent);
  border-radius:8px;
  cursor:pointer;
  font-size:.85rem;
}

/* PANEL */
.panel{
  margin-top:15px;
  background:#020617;
  border:1px solid var(--border);
  border-radius:12px;
  padding:15px;
  display:none;
}

.panel.open{display:block}

pre{
  font-family:var(--mono);
  font-size:.8rem;
  color:#e5e7eb;
  white-space:pre-wrap;
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px;
  color:var(--muted);
}
</style>
</head>

<body>

<section class="hero">
  <h1>Taller de IA</h1>
  <p>Aprende IA de forma activa</p>
  <div id="hero-phases" class="hero-phases"></div>
</section>

<div id="content"></div>

<footer>Mario Florido · Taller IA</footer>

<script>
const PHASE_NAMES={'1':'Fundamentos','2':'Análisis','3':'Investigación','4':'Producción'};
marked.setOptions({gfm:true});

async function loadContent(){
  const res=await fetch('contenido.md');
  const md=await res.text();
  parse(md);
}

function parse(md){
  const lines=md.split('\n');
  let phases=[],phase=null,act=null;

  for(let l of lines){
    let m=l.match(/^# FASE (\d+): (.+)/);
    if(m){phase={num:m[1],title:m[2],acts:[]};phases.push(phase);continue}

    m=l.match(/^### (\d+)\. (.+)/);
    if(m){act={num:m[1],title:m[2],img:'',desc:'',prompt:''};phase.acts.push(act);continue}

    m=l.match(/Imagen:\*\* (.+)/);
    if(m&&act){act.img=m[1];continue}

    if(l.startsWith('#### Descripción')){act.mode='desc';continue}
    if(l.startsWith('#### Prompt')){act.mode='prompt';continue}

    if(act&&act.mode==='desc'){act.desc+=l+'\n'}
    if(act&&act.mode==='prompt'){act.prompt+=l+'\n'}
  }

  render(phases);
}

function render(phases){
  let html='',nav='';

  phases.forEach(p=>{
    nav+=`<a href="#p${p.num}" class="hero-phase">${PHASE_NAMES[p.num]}</a>`;

    html+=`<div class="container" id="p${p.num}">
      <h2 class="phase-title">${p.title}</h2>
      <div class="grid">`;

    p.acts.forEach(a=>{
      html+=`
      <div class="card">

        ${a.img?`<img src="${a.img}">`:''}

        <div class="card-header">
          <div class="num">${a.num}</div>
          <h2>${a.title}</h2>
        </div>

        <p>${a.desc.slice(0,180)}...</p>

        <div class="btn" onclick="this.nextElementSibling.classList.toggle('open')">
          Ver Prompt
        </div>

        <div class="panel">
          <pre>${a.prompt.replace(/```/g,'')}</pre>
        </div>

      </div>`;
    });

    html+='</div></div>';
  });

  document.getElementById('content').innerHTML=html;
  document.getElementById('hero-phases').innerHTML=nav;
}

loadContent();
</script>

</body>
</html>

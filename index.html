<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taller IA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

<style>
:root{
  --bg:#06080f;
  --panel:#0b1220;
  --card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --text:#f8fafc;
  --muted:#94a3b8;
  --accent:#6366f1;
  --radius:18px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at 20% 20%, #111827, #020617 70%);
  color:var(--text);
}

/* HERO */
.hero{
  padding:120px 20px 60px;
  text-align:center;
}

.hero h1{
  font-size:clamp(3rem,6vw,5rem);
  font-weight:900;
  background:linear-gradient(90deg,#fff,#818cf8);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  margin-top:15px;
  color:var(--muted);
}

/* NAV */
.hero-phases{
  margin-top:40px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}

.hero-phase{
  padding:10px 18px;
  border-radius:999px;
  background:var(--card);
  border:1px solid var(--border);
  cursor:pointer;
  transition:.3s;
}

.hero-phase:hover{
  background:var(--accent);
}

/* LAYOUT */
.container{
  max-width:1200px;
  margin:auto;
  padding:40px 20px 80px;
}

/* PHASE */
.phase-title{
  font-size:2rem;
  margin-bottom:25px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:24px;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  backdrop-filter:blur(10px);
  cursor:pointer;
  transition:.3s;
}

.card:hover{
  transform:translateY(-6px);
  border-color:rgba(255,255,255,0.2);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:15px;
}

.card-header{
  display:flex;
  gap:10px;
  align-items:center;
}

.num{
  font-weight:800;
  color:#818cf8;
}

.card h3{
  font-size:1.2rem;
}

/* EXPAND PANEL */
.detail{
  margin-top:15px;
  display:none;
  animation:fade .3s ease;
}

.detail.open{display:block}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1}
}

/* SECTIONS */
.section{
  margin-top:18px;
  padding:16px;
  background:var(--panel);
  border-radius:12px;
  border:1px solid var(--border);
}

.section h4{
  font-size:.75rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--muted);
  margin-bottom:10px;
}

.section p,
.section li{
  font-size:.9rem;
  color:#cbd5f5;
}

/* PROMPT */
pre{
  font-family:'JetBrains Mono',monospace;
  font-size:.8rem;
  white-space:pre-wrap;
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px;
  color:var(--muted);
}
</style>
</head>

<body>

<section class="hero">
  <h1>Taller IA</h1>
  <p>Aprendizaje activo con inteligencia artificial</p>
  <div id="hero-phases" class="hero-phases"></div>
</section>

<div id="content"></div>

<footer>Mario Florido · Taller IA</footer>

<script>
const PHASE_NAMES={'1':'Fundamentos','2':'Análisis','3':'Investigación','4':'Producción'};
marked.setOptions({gfm:true});

async function load(){
  const res=await fetch('contenido.md');
  const md=await res.text();
  parse(md);
}

function parse(md){
  const lines=md.split('\n');

  let phases=[],phase=null,act=null,section=null;

  for(let l of lines){

    let m=l.match(/^# FASE (\d+): (.+)/);
    if(m){phase={num:m[1],title:m[2],acts:[]};phases.push(phase);continue}

    m=l.match(/^### (\d+)\. (.+)/);
    if(m){act={num:m[1],title:m[2],img:'',sections:[]};phase.acts.push(act);continue}

    m=l.match(/Imagen:\*\* (.+)/);
    if(m&&act){act.img=m[1];continue}

    m=l.match(/^#### (.+)/);
    if(m){section={title:m[1],content:''};act.sections.push(section);continue}

    if(section){section.content+=l+'\n'}
  }

  render(phases);
}

function render(phases){

  let html='',nav='';

  phases.forEach(p=>{
    nav+=`<a href="#p${p.num}" class="hero-phase">${PHASE_NAMES[p.num]}</a>`;

    html+=`<div class="container" id="p${p.num}">
      <h2 class="phase-title">${p.title}</h2>
      <div class="grid">`;

    p.acts.forEach(a=>{
      html+=`
      <div class="card" onclick="this.querySelector('.detail').classList.toggle('open')">

        ${a.img?`<img src="${a.img}">`:''}

        <div class="card-header">
          <div class="num">${a.num}</div>
          <h3>${a.title}</h3>
        </div>

        <div class="detail">

          ${a.sections.map(s=>`
            <div class="section">
              <h4>${s.title}</h4>
              ${s.title.includes('Prompt') 
                ? `<pre>${s.content.replace(/```/g,'')}</pre>`
                : marked.parse(s.content)}
            </div>
          `).join('')}

        </div>

      </div>`;
    });

    html+='</div></div>';
  });

  document.getElementById('content').innerHTML=html;
  document.getElementById('hero-phases').innerHTML=nav;
}

load();
</script>

</body>
</html>

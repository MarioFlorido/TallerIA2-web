<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller IA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

<style>
:root{
  --bg:#ffffff;
  --panel:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --accent:#7c3aed;
  --border:rgba(0,0,0,0.08);
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.main{
  padding:60px 40px;
  max-width:1300px;
  margin:auto;
}

/* HERO */
.hero{
  width:100%;
  background:var(--accent);
  color:white;
  padding:90px 40px;
}

.hero-inner{
  max-width:1300px;
  margin:auto;
  display:grid;
  grid-template-columns:1.6fr 1fr;
  gap:40px;
  align-items:center;
}

.hero-content h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(4rem,9vw,7rem);
  line-height:.95;
  margin:20px 0 0;
}

.hero-badge{
  display:inline-block;
  padding:8px 16px;
  border-radius:999px;
  background:rgba(255,255,255,.2);
  font-size:.75rem;
  letter-spacing:2px;
  text-transform:uppercase;
}

.hero-content p{
  margin-top:20px;
  font-size:1.1rem;
  opacity:.9;
}

/* FASES */
.phase-block{
  opacity:0;
  transform:translateY(50px);
  transition:.8s ease;
}

.phase-block.visible{
  opacity:1;
  transform:translateY(0);
}

.phase-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.6rem,4vw,3.5rem);
  margin-top:100px;
}

.phase-title span{
  color:var(--accent);
  font-style:italic;
}

.phase-subtitle{
  color:var(--muted);
  margin-bottom:40px;
}

/* GRID NORMAL */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:60px 40px;
}

/* GRID FASE 3 */
.phase-3-grid{
  display:grid;
  grid-template-columns:repeat(12,minmax(0,1fr));
  gap:50px 40px;
}

.phase-3-grid .card{
  grid-column:span 6;
}

.phase-3-grid .card:nth-child(3n){
  grid-column:1/-1;
}

/* CARD */
.card{
  border-bottom:1px solid var(--border);
  padding-bottom:35px;
  display:flex;
  flex-direction:column;
  transition:.35s ease;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
  margin-bottom:20px;
  transition:.4s ease;
}

.card:hover img{
  transform:scale(1.02);
}

.card h3{
  font-family:'Playfair Display',serif;
  font-size:1.8rem;
  margin:10px 0;
}

.tag{
  color:var(--accent);
  font-size:.75rem;
  letter-spacing:2px;
  text-transform:uppercase;
  font-weight:700;
}

.card p{
  color:var(--muted);
  line-height:1.6;
}

/* CTA ROW */
.card-actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:auto;
  padding-top:20px;
}

/* EXPLORAR */
.activity-cta{
  background:none;
  border:none;
  color:var(--accent);
  font-weight:700;
  cursor:pointer;
  text-transform:uppercase;
  font-size:.85rem;
}

/* COMPLETAR */
.complete-btn{
  background:none;
  border:none;
  color:#16a34a;
  font-weight:600;
  cursor:pointer;
  font-size:.85rem;
}

.complete-btn:hover{
  opacity:.8;
}

/* COMPLETADA */
.done-label{
  color:#16a34a;
  font-size:.85rem;
  font-weight:600;
  cursor:pointer;
}

.card.done{
  opacity:.65;
}

.card.done img{
  filter:grayscale(40%);
}

.done-label:hover{
  opacity:.8;
}

/* PANEL */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  z-index:100;
}

.overlay.open{
  display:block;
}

.panel{
  position:fixed;
  right:0;
  top:0;
  width:50%;
  height:100vh;
  background:white;
  transform:translateX(100%);
  transition:.35s;
  padding:50px;
  overflow:auto;
  z-index:101;
}

.panel.open{
  transform:translateX(0);
}

.panel h2{
  font-family:'Playfair Display',serif;
  font-size:2.5rem;
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
}

.panel-section{
  margin-top:30px;
}

.panel-section h4{
  color:var(--accent);
}

.prompt-toggle-btn{
  width:100%;
  padding:12px;
  background:#475569;
  color:white;
  border:none;
  cursor:pointer;
}

.prompt-code{
  max-height:0;
  overflow:hidden;
  transition:.4s ease;
}

.prompt-code.open{
  max-height:3000px;
}

.prompt-code pre{
  background:#020617;
  color:white;
  padding:20px;
  overflow:auto;
}

/* FOOTER */
.footer{
  margin-top:100px;
  padding:40px;
  text-align:center;
  border-top:1px solid var(--border);
  color:var(--muted);
}

@media(max-width:900px){
  .phase-3-grid{
    grid-template-columns:1fr;
  }

  .phase-3-grid .card,
  .phase-3-grid .card:nth-child(3n){
    grid-column:auto;
  }

  .panel{
    width:95%;
  }

  .hero-inner{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-inner">
    <div class="hero-content">
      <span class="hero-badge">Universidad de Alicante · 2025</span>
      <h1>Taller avanzado<br>de IA</h1>
      <p>Aprendizaje activo con inteligencia artificial</p>
    </div>
  </div>
</section>

<div class="main">
  <div id="content"></div>

  <footer class="footer">
    <p>Taller avanzado de inteligencia artificial</p>
    <p>Universidad de Alicante • 2025</p>
  </footer>
</div>

<div id="overlay" class="overlay" onclick="closePanel()"></div>
<div id="panel" class="panel"></div>

<script>
const STORAGE_KEY="progress";

function getProgress(){
  return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
}

function saveProgress(id){
  let data=getProgress();
  data[id]=true;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

function removeProgress(id){
  let data=getProgress();
  delete data[id];
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

function isDone(id){
  return !!getProgress()[id];
}

async function load(){
  const res=await fetch('contenido.md');
  const md=await res.text();
  parse(md);
}

function parse(md){
  const lines=md.split('\n');
  let phases=[],phase=null,act=null,sec=null,buf=[];

  function flush(){
    const t=buf.join('\n').trim();
    buf=[];
    if(!sec||!act||!t) return;
    act.sections.push({title:sec.title,content:t});
  }

  for(const line of lines){
    let m=line.match(/^# FASE (\d+): (.+)/);
    if(m){
      flush();
      phase={num:m[1],title:m[2],subtitle:'',acts:[]};
      phases.push(phase);
      continue;
    }

    if(phase && !phase.acts.length && line.match(/^## /)){
      phase.subtitle=line.replace(/^## /,'');
      continue;
    }

    m=line.match(/^### (\d+)\. (.+)/);
    if(m){
      flush();
      act={id:m[1],title:m[2],tag:'',img:'',sections:[]};
      phase.acts.push(act);
      continue;
    }

    m=line.match(/\*\*Tag:\*\*\s*(.+)/);
    if(m && act){act.tag=m[1];continue;}

    m=line.match(/\*\*Imagen:\*\*\s*(.+)/);
    if(m && act){act.img=m[1];continue;}

    m=line.match(/^#### (.+)/);
    if(m){
      flush();
      sec={title:m[1]};
      continue;
    }

    if(sec && act){
      buf.push(line);
    }
  }

  flush();
  render(phases);
}

function openPanel(a){
  document.body.style.overflow='hidden';
  document.getElementById("overlay").classList.add("open");

  let sectionsHtml='';

  a.sections
    .filter(s=>!s.title.includes('Descripción'))
    .forEach(s=>{
      if(s.title.includes('Prompt')){
        sectionsHtml+=`
        <div class="panel-section">
          <h4>${s.title}</h4>
          <button class="prompt-toggle-btn" onclick="togglePrompt(this)">
            Ver Prompt
          </button>
          <div class="prompt-code">
            <pre>${s.content.replace(/```/g,'')}</pre>
          </div>
        </div>`;
      }else{
        sectionsHtml+=`
        <div class="panel-section">
          <h4>${s.title}</h4>
          ${marked.parse(s.content)}
        </div>`;
      }
    });

  document.getElementById("panel").innerHTML=`
    <div class="close" onclick="closePanel()">✕</div>
    <h2>${a.title}</h2>
    ${sectionsHtml}
  `;

  document.getElementById("panel").classList.add("open");
}

function closePanel(){
  document.body.style.overflow='auto';
  document.getElementById("panel").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

function toggleDone(id){
  if(isDone(id)){
    removeProgress(id);
  }else{
    saveProgress(id);
  }
  load();
}

function togglePrompt(btn){
  btn.nextElementSibling.classList.toggle('open');
}

function render(phases){
  let html='';

  phases.forEach(p=>{
    html+=`<section class="phase-block">`;

    html+=`
      <h2 class="phase-title">
        <span>FASE ${p.num}:</span> ${p.title}
      </h2>
    `;

    if(p.subtitle){
      html+=`<p class="phase-subtitle">${p.subtitle}</p>`;
    }

    html+=`<div class="${p.num == 3 ? 'phase-3-grid' : 'grid'}">`;

    p.acts.forEach(a=>{
      const desc=a.sections.find(s=>s.title.includes('Descripción'));
      const done=isDone(a.id);
      const jsonData=JSON.stringify(a).replace(/'/g,"&apos;");

      html+=`
      <div class="card ${done ? 'done' : ''}">
        ${a.img ? `<img src="${a.img}">` : ''}
        <div class="tag">${a.tag}</div>
        <h3>${a.title}</h3>
        ${desc ? marked.parse(desc.content) : ''}

        <div class="card-actions">
          <button class="activity-cta" onclick='openPanel(${jsonData})'>
            Explorar →
          </button>

          ${
            done
            ? `<div class="done-label" onclick="toggleDone('${a.id}')">
                ✓ Actividad completada
              </div>`
            : `<button class="complete-btn" onclick="toggleDone('${a.id}')">
                Marcar completada
              </button>`
          }
        </div>
      </div>
      `;
    });

    html+='</div></section>';
  });

  document.getElementById("content").innerHTML=html;
  initPhaseReveal();
}

function initPhaseReveal(){
  const phases=document.querySelectorAll('.phase-block');

  const observer=new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add('visible');
      }
    });
  },{
    threshold:.15
  });

  phases.forEach(p=>{
    observer.observe(p);
  });
}

document.addEventListener('keydown',e=>{
  if(e.key==="Escape") closePanel();
});

load();
</script>

</body>
</html>

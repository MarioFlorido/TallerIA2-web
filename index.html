<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taller IA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

<style>
:root{
  --bg:#0b0f19;
  --panel:#ffffff;
  --card:#111827;
  --text:#f9fafb;
  --muted:#9ca3af;
  --accent:#6366f1;
}

.light{
  --bg:#f4f4f5;
  --panel:#ffffff;
  --card:#ffffff;
  --text:#111;
  --muted:#6b7280;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.2);
  padding:20px;
  backdrop-filter:blur(10px);
}

.sidebar a{
  display:block;
  margin-bottom:10px;
  color:var(--muted);
  text-decoration:none;
  transition:.2s;
}

.sidebar a:hover{
  color:var(--accent);
}

/* MAIN */
.main{
  flex:1;
  padding:40px;
  max-width:1400px;
}

/* HERO */
.hero h1{
  font-size:4rem;
  font-weight:900;
}

.hero p{color:var(--muted)}

/* PHASE */
.phase-title{
  font-size:2.4rem;
  color:var(--accent);
  margin-top:40px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:24px;
  margin-bottom:60px;
}

/* CARD */
.card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  cursor:pointer;
  position:relative;
  transition:.2s;
  border:2px solid transparent;
}

.card:hover{
  transform:translateY(-2px);
  border-color:var(--accent);
}

.card.completed{
  border-color:#22c55e;
}

.card.completed::after{
  content:'✓';
  position:absolute;
  top:10px;
  right:10px;
  background:#22c55e;
  color:white;
  width:24px;
  height:24px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.9rem;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:12px;
}

.card h3{
  margin:0 0 8px 0;
  font-size:1.1rem;
}

.tag{
  font-size:.7rem;
  color:var(--accent);
  margin-bottom:8px;
  display:inline-block;
}

.card p{
  color:var(--muted);
  font-size:.9rem;
  line-height:1.6;
}

/* OVERLAY & PANEL */
.overlay{
  position:fixed;
  inset:0;
  backdrop-filter:blur(8px);
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:100;
}

.overlay.open{display:block}

.panel{
  position:fixed;
  right:0;
  top:0;
  width:50%;
  height:100%;
  background:var(--panel);
  color:#111;
  transform:translateX(100%);
  transition:.3s;
  padding:40px;
  overflow:auto;
  z-index:101;
}

@media(max-width:768px){
  .panel{width:90%}
}

.panel.open{transform:translateX(0)}

.close{
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
  font-size:1.5rem;
  background:rgba(0,0,0,.1);
  width:32px;
  height:32px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.close:hover{
  background:rgba(0,0,0,.2);
}

.panel h2{
  margin-top:0;
  font-size:2rem;
}

.panel-section{
  margin-top:30px;
}

.panel-section h4{
  font-size:.85rem;
  text-transform:uppercase;
  letter-spacing:.05em;
  color:#6b7280;
  margin-bottom:12px;
}

.panel-section pre{
  background:#1f2937;
  color:#f9fafb;
  padding:20px;
  border-radius:8px;
  overflow-x:auto;
  font-family:'JetBrains Mono',monospace;
  font-size:.85rem;
  line-height:1.6;
}

.info-box{
  background:#f3f4f6;
  border-left:3px solid var(--accent);
  padding:16px;
  border-radius:6px;
  margin:12px 0;
}

.info-box h4{
  margin-top:0;
  color:#374151;
}

.bonus-box{
  background:#fef3c7;
  border-left:3px solid #f59e0b;
  padding:16px;
  border-radius:6px;
  margin:12px 0;
}

.reflection-box{
  background:#d1fae5;
  border-left:3px solid #10b981;
  padding:16px;
  border-radius:6px;
  margin:12px 0;
}

/* BUTTONS */
.controls{
  position:fixed;
  top:20px;
  right:20px;
  z-index:50;
}

button{
  margin-left:10px;
  padding:8px 16px;
  cursor:pointer;
  background:var(--accent);
  color:white;
  border:none;
  border-radius:6px;
  font-weight:600;
  transition:.2s;
}

button:hover{
  opacity:.9;
}

.mark-done{
  background:#22c55e;
  margin-top:30px;
  padding:12px 24px;
  font-size:1rem;
}

/* PROMPT COLAPSABLE */
.prompt-toggle-btn{
  background:var(--accent);
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:6px;
  cursor:pointer;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:8px;
  width:100%;
  transition:.2s;
}

.prompt-toggle-btn:hover{
  opacity:.9;
}

.prompt-toggle-btn .arrow{
  transition:transform .3s;
  display:inline-block;
}

.prompt-toggle-btn.open .arrow{
  transform:rotate(90deg);
}

.prompt-code{
  max-height:0;
  overflow:hidden;
  transition:max-height .3s ease;
}

.prompt-code.open{
  max-height:2000px;
}

.prompt-code pre{
  margin-top:12px;
}

/* BOTÓN STICKY */
.sticky-footer{
  position:sticky;
  bottom:0;
  background:linear-gradient(to top, var(--panel) 70%, transparent);
  padding:20px 0;
  margin-top:30px;
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar"></div>

<div class="main">
  <div class="controls">
    <button onclick="toggleTheme()">🌙/☀️</button>
  </div>

  <section class="hero">
    <h1>Taller IA</h1>
    <p>Aprendizaje activo con inteligencia artificial</p>
  </section>

  <div id="content"></div>
</div>

<div id="overlay" class="overlay" onclick="closePanel()"></div>
<div id="panel" class="panel"></div>

<script>
const STORAGE_KEY="progress";
marked.setOptions({ breaks: false, gfm: true });

function toggleTheme(){
  document.body.classList.toggle("light");
}

function saveProgress(id){
  let data=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
  data[id]=true;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

function isDone(id){
  let data=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
  return data[id];
}

async function load(){
  const res=await fetch('contenido.md');
  const md=await res.text();
  parse(md);
}

function parse(md){
  const lines=md.split('\n');
  let phases=[],phase=null,act=null,sec=null,buf=[];
  let ethicsContent='',inEthics=false;
  
  function flush(){
    const t=buf.join('\n').trim();
    buf=[];
    if(!sec||!act||!t)return;
    act.sections.push({type:sec.type,title:sec.title,content:t});
  }

  for(const line of lines){
    // Capturar inicio de sección de Ética
    if(line.match(/^# (ÉTICA|GUÍA DE USO ÉTICO)/i)){
      flush();
      inEthics=true;
      phase=null;act=null;sec=null;
      ethicsContent+=line+'\n';
      continue;
    }
    
    // Si estamos en sección de ética, capturar todo
    if(inEthics){
      ethicsContent+=line+'\n';
      continue;
    }
    
    let m=line.match(/^# FASE (\d+):\s*(.+)/i);
    if(m){
      flush();
      phase={num:m[1],title:m[2].trim(),subtitle:'',acts:[]};
      phases.push(phase);
      act=null;sec=null;
      continue;
    }
    
    m=line.match(/^## (.+)/);
    if(m&&phase&&!act){
      phase.subtitle=m[1].trim();
      continue;
    }
    
    if(line.trim()==='---')continue;

    m=line.match(/^### (\d+)\.\s*(.+)/);
    if(m){
      flush();
      act={id:m[1],title:m[2].trim(),tag:'',img:'',sections:[]};
      if(phase)phase.acts.push(act);
      sec=null;
      continue;
    }

    m=line.match(/^>\s*\*\*Tag:\*\*\s*(.+)/);
    if(m&&act){act.tag=m[1].trim();continue}
    
    m=line.match(/^>\s*\*\*Imagen:\*\*\s*(.+)/);
    if(m&&act){act.img=m[1].trim();continue}

    m=line.match(/^#### (.+)/);
    if(m&&act){
      flush();
      const t=m[1].trim();
      if(t==='Objetivo Educacional')sec={type:'objetivo',title:t};
      else if(t==='Descripción Breve'||t==='Descripción')sec={type:'descripcion',title:t};
      else if(t.startsWith('Info:'))sec={type:'info',title:t.slice(5).trim()};
      else if(t.startsWith('Info'))sec={type:'info',title:t.replace(/^Info\s*/,'')};
      else if(t==='Prompt Principal')sec={type:'prompt',title:t};
      else if(t==='Bonus Extra'||t.startsWith('Terminología'))sec={type:'bonus',title:t};
      else if(t.startsWith('Pregunta de Reflexión'))sec={type:'reflexion',title:t};
      else sec={type:'generic',title:t};
      continue;
    }
    buf.push(line);
  }
  flush();
  render(phases, ethicsContent);
}

function openPanel(a){
  document.getElementById("overlay").classList.add("open");
  
  let obj='',desc='',infos='',prompt='',bonus='',refl='';
  
  a.sections.forEach(s=>{
    const html=marked.parse(s.content);
    switch(s.type){
      case 'objetivo':
        obj=`<div class="panel-section"><h4>Objetivo Educacional</h4>${html}</div>`;
        break;
      case 'descripcion':
        desc=`<div class="panel-section"><h4>Descripción</h4>${html}</div>`;
        break;
      case 'info':
        infos+=`<div class="info-box"><h4>${s.title||'Información'}</h4>${html}</div>`;
        break;
      case 'prompt':
        const code=s.content.match(/```[\s\S]*?\n([\s\S]*?)```/);
        const promptCode=code?code[1].trim():s.content;
        prompt=`<div class="panel-section">
          <h4>Prompt Principal</h4>
          <button class="prompt-toggle-btn" onclick="event.stopPropagation();togglePrompt(this)">
            <span class="arrow">▸</span>
            <span>Ver Prompt</span>
          </button>
          <div class="prompt-code">
            <pre>${promptCode.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>
          </div>
        </div>`;
        break;
      case 'bonus':
        bonus+=`<div class="bonus-box"><h4>${s.title}</h4>${html}</div>`;
        break;
      case 'reflexion':
        refl=`<div class="reflection-box"><h4>Pregunta de Reflexión</h4>${html}</div>`;
        break;
    }
  });

  document.getElementById("panel").innerHTML=`
    <div class="close" onclick="closePanel()">✕</div>
    <h2>${a.title}</h2>
    ${a.tag?`<div class="tag">${a.tag}</div>`:''}
    ${obj}
    ${desc}
    ${infos}
    ${prompt}
    ${bonus}
    ${refl}
    <div class="sticky-footer">
      <button class="mark-done" onclick="markDone('${a.id}')">✔ Marcar completado</button>
    </div>
  `;

  document.getElementById("panel").classList.add("open");
}

function togglePrompt(btn){
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
  btn.querySelector('span:last-child').textContent = 
    btn.classList.contains('open') ? 'Ocultar Prompt' : 'Ver Prompt';
}

function closePanel(){
  document.getElementById("panel").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

function markDone(id){
  saveProgress(id);
  document.querySelectorAll(`[data-id="${id}"]`).forEach(el=>{
    el.classList.add("completed");
  });
  closePanel();
}

function render(phases, ethicsContent){
  let html='',sidebar='';

  phases.forEach(p=>{
    sidebar+=`<a href="#p${p.num}">${p.title}</a>`;

    html+=`<div id="p${p.num}">
      <h2 class="phase-title">${p.title}</h2>
      <div class="grid">`;

    p.acts.forEach(a=>{
      const desc=a.sections.find(s=>s.type==='descripcion');
      const descHtml=desc?marked.parse(desc.content):'';

      html+=`
      <div class="card ${isDone(a.id)?'completed':''}" data-id="${a.id}" onclick='openPanel(${JSON.stringify(a).replace(/'/g,"&apos;")})'>
        ${a.img?`<img src="${a.img}" alt="${a.title}">`:''}
        <h3>${a.title}</h3>
        ${a.tag?`<div class="tag">${a.tag}</div>`:''}
        ${descHtml}
      </div>`;
    });

    html+='</div></div>';
  });
  
  // Agregar sección de Ética si existe
  if(ethicsContent){
    sidebar+=`<a href="#ethics" style="margin-top:20px;color:#f59e0b">Ética y Uso Responsable</a>`;
    html+=`<div id="ethics" style="margin-top:60px">
      <h2 class="phase-title" style="color:#f59e0b">Ética y Uso Responsable</h2>
      <div style="background:var(--card);padding:30px;border-radius:12px;border-left:4px solid #f59e0b">
        ${marked.parse(ethicsContent)}
      </div>
    </div>`;
  }

  document.getElementById("content").innerHTML=html;
  document.getElementById("sidebar").innerHTML=sidebar;
}

// Cerrar panel con ESC
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') closePanel();
});

load();
</script>

</body>
</html>

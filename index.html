<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller IA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

<style>
:root{
  --bg:#ffffff;              /* fondo general */
  --panel:#ffffff;           /* panel blanco */
  --card:#ffffff;            /* tarjetas blancas */
  --text:#0f172a;            /* texto principal oscuro */
  --muted:#64748b;           /* texto secundario */
  --accent:#7c3aed;          /* lo mantienes igual */
  --accent-soft:rgba(124,58,237,0.08);
  --border:rgba(0,0,0,0.08); /* bordes suaves en claro */
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.main{
  padding:60px 40px;
  max-width:1300px;
  margin:auto;
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* --- HERO: ancho completo con bloque púrpura --- */
.hero{
  width:100%;
  background:var(--accent);
  color:white;
  padding:90px 40px;
  animation:fadeUp .6s ease;
  box-sizing:border-box;
}

.hero-inner{
  max-width:1300px;
  margin:0 auto;
  display:grid;
  grid-template-columns:1.6fr 1fr;
  gap:40px;
  align-items:center;
}

.hero-content h1{
  font-family:'Playfair Display', serif;
  font-size:clamp(4rem,9vw,7.5rem);
  font-weight:900;
  letter-spacing:-2.5px;
  line-height:0.95;
  color:white;
  margin:22px 0 0;
}

.hero-content p{
  margin-top:22px;
  font-size:1.2rem;
  color:rgba(255,255,255,0.88);
  max-width:none;
  line-height:1.5;
  font-family:'Inter',sans-serif;
}

.hero-content p strong{
  color:white;
  font-weight:700;
}

.hero-badge{
  display:inline-block;
  font-size:.72rem;
  font-weight:700;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:white;
  background:rgba(255,255,255,0.18);
  padding:8px 16px;
  border-radius:999px;
}

.hero-meta{
  display:flex;
  gap:14px;
  margin-top:32px;
  font-size:.9rem;
  color:rgba(255,255,255,0.8);
  flex-wrap:wrap;
  letter-spacing:.5px;
}

.hero-illustration{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.hero-illustration svg{
  width:100%;
  max-width:380px;
  height:auto;
}

@media(max-width:768px){
  .hero{
    padding:60px 28px;
  }
  .hero-inner{
    grid-template-columns:1fr;
    gap:10px;
  }
  .hero-illustration{
    max-height:200px;
  }
}

.phase-title{
  font-family:'Playfair Display', serif;
  font-size:clamp(2.6rem,4.8vw,3.6rem);
  margin-top:110px;
  margin-bottom:8px;
  font-weight:800;
  letter-spacing:-1px;
  line-height:1.05;
}

.phase-title span{
  color:var(--accent);
  font-style:italic;
  font-weight:700;
}

.phase-subtitle{
  color:var(--muted);
  margin-bottom:48px;
  font-size:1.05rem;
  max-width:640px;
  line-height:1.5;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:60px 44px;
}

/* --- ACTIVIDAD EDITORIAL (sin tarjeta) --- */
.card{
  color:var(--text);
  background:transparent;
  padding:0 0 36px;
  border:none;
  border-bottom:1px solid rgba(0,0,0,0.1);
  border-radius:0;
  box-shadow:none;
  position:relative;
  display:flex;
  flex-direction:column;
  cursor:default;
  transition:none;
}

.card:hover{
  transform:none;
  border-color:rgba(0,0,0,0.1);
  box-shadow:none;
}

.card:hover img{
  transform:scale(1.02);
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:2px;
  margin-bottom:24px;
  transition:transform .5s ease;
}

.tag{
  display:inline-block;
  font-size:.72rem;
  font-weight:700;
  padding:0;
  background:none;
  color:var(--accent);
  letter-spacing:2.5px;
  text-transform:uppercase;
  margin:0 0 12px;
  border-radius:0;
}

.card h3{
  font-family:'Playfair Display', serif;
  font-size:1.85rem;
  font-weight:700;
  line-height:1.1;
  margin:0 0 14px;
  letter-spacing:-0.5px;
}

.card p{
  margin:0 0 22px;
  color:var(--muted);
  font-size:.98rem;
  line-height:1.55;
}

/* --- Botón CTA --- */
.activity-cta{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:none;
  border:none;
  padding:0 0 4px;
  font-family:'Inter',sans-serif;
  font-size:.88rem;
  font-weight:700;
  color:var(--accent);
  cursor:pointer;
  margin-top:auto;
  margin-right:auto;
  letter-spacing:.5px;
  text-transform:uppercase;
  border-bottom:1.5px solid var(--accent);
  transition:.25s;
  align-self:flex-start;
}

.activity-cta .arrow{
  transition:transform .3s ease;
  display:inline-block;
  font-size:1.1rem;
}

.activity-cta:hover{
  gap:14px;
}

.activity-cta:hover .arrow{
  transform:translateX(4px);
}

/* --- Card completada (estilo editorial) --- */
.card.done{
  background:transparent;
  border-color:rgba(0,0,0,0.1);
  opacity:.7;
}

.card.done img{
  filter:grayscale(40%);
}

.card.done .done-label{
  display:flex;
}

.done-label{
  display:none;
  align-items:center;
  gap:6px;
  margin-top:14px;
  font-size:.8rem;
  font-weight:600;
  color:#22c55e;
}

.done-label svg{
  width:18px;
  height:18px;
  flex-shrink:0;
}

/* --- Panel lateral --- */
.overlay{
  position:fixed;
  inset:0;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:100;
}

.overlay.open{display:block}

.panel{
  position:fixed;
  right:0;
  top:0;
  width:50%;
  height:100vh;
  background:var(--panel);
  color:#111;
  transform:translateX(100%);
  transition:.35s;
  padding:50px;
  padding-bottom:120px;
  overflow-y:auto;
  box-sizing:border-box;
  z-index:101;
}

.panel.open{transform:translateX(0)}

.panel h2{
  font-family:'Playfair Display', serif;
  font-size:2.8rem;
  font-weight:800;
  letter-spacing:-1px;
  line-height:1.1;
  margin:0 0 8px;
}

.panel-section{
  margin-top:32px;
}

.panel-section h4{
  font-size:1.05rem;
  font-weight:700;
  color:var(--accent);
  margin-bottom:10px;
}

.panel-section p{
  line-height:1.7;
  color:#333;
}

.panel-section pre{
  background:#020617;
  color:#f9fafb;
  padding:18px;
  border-radius:10px;
  font-family:'JetBrains Mono', monospace;
  font-size:.85rem;
  line-height:1.6;
  white-space: pre-wrap;
  word-break: break-word;
  overflow-wrap: anywhere;
  overflow-x:hidden;
}

/* --- PROMPT COLAPSABLE --- */
.prompt-toggle-btn{
  width:100%;
  background:var(--muted);
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  font-size:.95rem;
  display:flex;
  align-items:center;
  gap:10px;
  transition:.2s;
  font-family:'Inter',sans-serif;
}

.prompt-toggle-btn:hover{
  opacity:.9;
}

.prompt-toggle-btn .arrow{
  transition:transform .3s;
  font-size:1.1rem;
}

.prompt-toggle-btn.open .arrow{
  transform:rotate(90deg);
}

.prompt-code{
  max-height:0;
  overflow:hidden;
  transition:max-height .4s ease;
}

.prompt-code.open{
  max-height:3000px;
}

.prompt-code pre{
  margin-top:12px;
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
  font-size:1.5rem;
  width:32px;
  height:32px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:rgba(0,0,0,.05);
  transition:.2s;
}

.close:hover{
  background:rgba(0,0,0,.1);
}

/* --- BOTÓN AL FINAL DEL PANEL --- */
.panel-footer{
  margin-top:40px;
  padding-top:20px;
  display:flex;
  justify-content:center;
}

button.done-btn{
  max-width:300px;
  padding:10px 24px;
  background:transparent;
  border:2px solid #22c55e;
  border-radius:8px;
  color:#22c55e;
  cursor:pointer;
  font-size:.9rem;
  font-weight:600;
  transition:.2s;
  font-family:'Inter',sans-serif;
}

button.done-btn:hover{
  background:rgba(34,197,94,0.1);
}

button.done-btn.completed{
  background:#22c55e;
  color:white;
}

/* --- SECCIÓN ESPECIAL (ÉTICA) DESTACADA --- */
.special-section{
  margin-top:80px;
  border-radius:16px;
  border:1px solid var(--border);
  max-width:100%;
  overflow:hidden;
  background:rgba(100,100,100,0.05);
}

.special-toggle{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:24px 28px;
  background:rgba(100,100,100,0.08);
  border:none;
  color:var(--muted);
  font-family:'Playfair Display', serif;
  font-size:1.7rem;
  font-weight:700;
  letter-spacing:-.3px;
  cursor:pointer;
  transition:.2s;
}

.special-toggle:hover{
  background:rgba(0,0,0,0.12);
}

.special-toggle .chevron{
  transition:transform .3s;
  font-size:1.4rem;
  color:var(--accent);
}

.special-section.open .chevron{
  transform:rotate(180deg);
}

.special-body{
  max-height:0;
  overflow:hidden;
  transition:max-height .4s ease;
  padding:0 28px;
  color:var(--bg);
}

.special-section.open .special-body{
  max-height:2000px;
  padding:0 28px 28px;
}

.special-body h2{
  color:var(--accent);
  font-size:1.4rem;
  margin-top:24px;
}

.special-body h3{
  color:var(--text);
  font-size:1.1rem;
  margin-top:20px;
}

.special-body ul{
  color:var(--muted);
  line-height:1.8;
}

.special-body p{
  color:var(--muted);
  line-height:1.5;
}

/* --- ESTILOS PARA TABLAS --- */
.special-body table{
  width:80%;
  border-collapse:collapse;
  margin:24px auto;
  background:rgba(0,0,0,0.05);
  border-radius:8px;
  overflow:hidden;
}

.special-body table th{
  background:rgba(124,58,237,0.1);
  color:var(--accent);
  font-weight:700;
  text-align:left;
  padding:16px 20px;
  font-size:1.05rem;
  border-bottom:2px solid var(--accent);
}

.special-body table td{
  padding:8px 20px;
  color:var(--muted);
  line-height:1.3;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.special-body table tr:last-child td{
  border-bottom:none;
}

.special-body table tr:hover{
  background:rgba(124,58,237,0.05);
}

/* --- FOOTER --- */
.footer{
  margin-top:100px;
  padding:40px 28px;
  border-top:1px solid var(--border);
  text-align:center;
}

.footer p{
  color:var(--muted);
  line-height:1.8;
  margin:0;
  font-size:.95rem;
}

.footer p a{
  color:var(--accent);
  text-decoration:none;
}

.footer p a:hover{
  opacity:.8;
}

@media(max-width:768px){
  .panel{width:95%}
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-inner">
    <div class="hero-content">
      <span class="hero-badge">Universidad de Alicante · 2025</span>
      <h1>Taller avanzado<br>de IA</h1>
      <p><strong>Aprendizaje activo</strong> con inteligencia artificial</p>
      <div class="hero-meta">
        <span>Metodología</span>
        <span>·</span>
        <span>Pensamiento crítico</span>
        <span>·</span>
        <span>IA aplicada</span>
      </div>
    </div>
    <div class="hero-illustration" aria-hidden="true">
      <svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#eff7ee" stroke-width="0.8" opacity="0.45" fill="none">
          <line x1="25" y1="35" x2="95" y2="65"/>
          <line x1="25" y1="35" x2="80" y2="120"/>
          <line x1="25" y1="90" x2="95" y2="65"/>
          <line x1="25" y1="90" x2="80" y2="120"/>
          <line x1="25" y1="145" x2="80" y2="120"/>
          <line x1="95" y1="65" x2="170" y2="55"/>
          <line x1="95" y1="65" x2="170" y2="110"/>
          <line x1="80" y1="120" x2="170" y2="110"/>
          <line x1="80" y1="120" x2="170" y2="150"/>
        </g>
        <g fill="#eff7ee">
          <circle cx="25" cy="35" r="5"/>
          <circle cx="25" cy="90" r="5"/>
          <circle cx="25" cy="145" r="5"/>
          <circle cx="95" cy="65" r="7"/>
          <circle cx="80" cy="120" r="7"/>
          <circle cx="170" cy="55" r="5"/>
          <circle cx="170" cy="110" r="6"/>
          <circle cx="170" cy="150" r="5"/>
        </g>
      </svg>
    </div>
  </div>
</section>

<div class="main">

<div id="content"></div>

<footer class="footer">
  <p>Taller avanzado de inteligencia artificial</p>
  <p><a href="mailto:mario.florido@ua.es">mario.florido@ua.es</a></p>
  <p>Universidad de Alicante • 2025</p>
</footer>

</div>

<div id="overlay" class="overlay" onclick="closePanel()"></div>
<div id="panel" class="panel"></div>

<script>
const STORAGE_KEY="progress";

function getSectionOrder(title){
  if(title==='Objetivo Educacional') return 1;
  if(title.startsWith('Info')) return 2;
  if(title==='Prompt Principal') return 3;
  if(title==='Para profundizar') return 4;
  return 99;
}

let lastScroll=0;

function getProgress(){
  return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
}

function saveProgress(id){
  let data=getProgress();
  data[id]=true;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

function removeProgress(id){
  let data=getProgress();
  delete data[id];
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

function isDone(id){
  return !!getProgress()[id];
}

async function load(){
  const res=await fetch('contenido.md');
  const md=await res.text();
  parse(md);
}

function parse(md){
  const lines=md.split('\n');
  let phases=[],phase=null,act=null,sec=null,buf=[];
  let specialSections=[],currentSpecial=null;

  function flush(){
    const t=buf.join('\n').trim();
    buf=[];
    if(!sec||!act||!t) return;
    act.sections.push({title:sec.title,content:t});
  }

  function flushSpecialContent(){
    const t=buf.join('\n').trim();
    buf=[];
    if(!currentSpecial||!t) return;
    currentSpecial.content+='\n'+t;
  }

  for(const line of lines){
    let m=line.match(/^# FASE (\d+): (.+)/);
    if(m){flush();phase={num:m[1],title:m[2],subtitle:'',acts:[]};phases.push(phase);continue}

    if(phase && !phase.acts.length && line.match(/^## /)){
      m=line.match(/^## (.+)/);
      phase.subtitle=m[1];continue}

    m=line.match(/^# (.+)$/);
    if(m && !m[1].includes('FASE')){
      if(currentSpecial)flushSpecialContent();else flush();
      sec=null;act=null;
      currentSpecial={title:m[1],content:''};
      specialSections.push(currentSpecial);
      phase=null;continue}

    m=line.match(/^### (\d+)\. (.+)/);
    if(m){flush();act={id:m[1],title:m[2],tag:'',img:'',sections:[]};if(phase)phase.acts.push(act);continue}

    m=line.match(/\*\*Tag:\*\*\s*(.+)/);
    if(m && act){act.tag=m[1];continue}

    m=line.match(/\*\*Imagen:\*\*\s*(.+)/);
    if(m && act){act.img=m[1];continue}

    m=line.match(/^#### (.+)/);
    if(m){if(act){flush();sec={title:m[1]}}else if(currentSpecial){flushSpecialContent();currentSpecial.content+='\n### '+m[1]+'\n'}continue}

    if(line.trim()===''){
      if((sec&&act)||currentSpecial)buf.push('');
      continue;
    }

    if(sec&&act)buf.push(line);
    else if(currentSpecial)buf.push(line);
  }

  if(currentSpecial)flushSpecialContent();else flush();

  phases.forEach(p=>p.acts.forEach(a=>{
    a.sections.sort((x,y)=>{
      return getSectionOrder(x.title) - getSectionOrder(y.title);
    });
  }));

  render(phases,specialSections);
}

function togglePrompt(btn){
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
  const text = btn.querySelector('.prompt-text');
  text.textContent = btn.classList.contains('open') ? 'Ocultar Prompt' : 'Ver Prompt';
}

function openPanel(a){
  lastScroll=window.scrollY;
  document.body.style.overflow='hidden';

  const done=isDone(a.id);

  document.getElementById("overlay").classList.add("open");

  let sectionsHtml = '';
  a.sections
    .filter(s=>!s.title.includes('Descripción'))
    .forEach(s=>{
      if(s.title.includes('Prompt')){
        // Prompt colapsable
        const promptContent = s.content.replace(/```/g,'');
        sectionsHtml += `
        <div class="panel-section">
          <h4>${s.title}</h4>
          <button class="prompt-toggle-btn" onclick="event.stopPropagation();togglePrompt(this)">
            <span class="arrow">▸</span>
            <span class="prompt-text">Ver Prompt</span>
          </button>
          <div class="prompt-code">
            <pre>${promptContent}</pre>
          </div>
        </div>`;
      } else {
        sectionsHtml += `
        <div class="panel-section">
          <h4>${s.title}</h4>
          ${marked.parse(s.content)}
        </div>`;
      }
    });

  document.getElementById("panel").innerHTML=`
    <div class="close" onclick="closePanel()">✕</div>
    <h2>${a.title}</h2>
    ${sectionsHtml}
    <div class="panel-footer">
      <button class="done-btn${done?' completed':''}" id="doneBtn" onclick="toggleDone('${a.id}')">
        ${done?'✓ Completada':'Marcar completada'}
      </button>
    </div>
  `;

  document.getElementById("panel").classList.add("open");
}

function closePanel(){
  document.body.style.overflow='auto';
  document.getElementById("panel").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
  window.scrollTo({top:lastScroll});
}

function toggleDone(id){
  const currentlyDone = isDone(id);
  
  if(currentlyDone){
    // Desmarcar
    removeProgress(id);
    
    const btn=document.getElementById('doneBtn');
    if(btn){
      btn.classList.remove('completed');
      btn.textContent='Marcar completada';
    }
    
    const card=document.querySelector(`.card[data-id="${id}"]`);
    if(card) card.classList.remove('done');
  } else {
    // Marcar
    saveProgress(id);
    
    const btn=document.getElementById('doneBtn');
    if(btn){
      btn.classList.add('completed');
      btn.textContent='✓ Completada';
    }
    
    const card=document.querySelector(`.card[data-id="${id}"]`);
    if(card) card.classList.add('done');
  }
}

function render(phases,specialSections){
  let html='';

  phases.forEach(p=>{
    html+=`<h2 class="phase-title"><span>FASE ${p.num}:</span> ${p.title}</h2>`;
    html+=p.subtitle?`<p class="phase-subtitle">${p.subtitle}</p>`:'';
    html+='<div class="grid">';

    p.acts.forEach(a=>{
      const desc=a.sections.find(s=>s.title.includes('Descripción'));
      const done=isDone(a.id);
      const jsonData=JSON.stringify(a).replace(/'/g,"&apos;");

      html+=`<div class="card${done?' done':''}" data-id="${a.id}">
        ${a.img?`<img src="${a.img}">`:''}
        <div class="tag">${a.tag||''}</div>
        <h3>${a.title}</h3>
        ${desc?marked.parse(desc.content):''}
        <div class="done-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
          Actividad completada
        </div>
        <button class="activity-cta" onclick='openPanel(${jsonData})'>
          <span>Explorar</span>
          <span class="arrow">→</span>
        </button>
      </div>`;
    });

    html+='</div>';
  });

  specialSections.forEach((spec,i)=>{
    html+=`<div class="special-section" id="special-${i}">
      <button class="special-toggle" onclick="toggleSpecial(${i})">
        ${spec.title}
        <span class="chevron">▼</span>
      </button>
      <div class="special-body">${marked.parse(spec.content)}</div>
    </div>`;
  });

  document.getElementById("content").innerHTML=html;
}

function toggleSpecial(i){
  document.getElementById('special-'+i).classList.toggle('open');
}

// Cerrar panel con ESC
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') closePanel();
});

load();
</script>

</body>

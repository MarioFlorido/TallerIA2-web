<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller IA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

<style>
:root{
  --bg:#0a0d14;
  --panel:#ffffff;
  --card:#0f172a;
  --text:#f8fafc;
  --muted:#94a3b8;
  --accent:#7c3aed;
  --accent-soft:rgba(124,58,237,0.12);
  --border:rgba(255,255,255,0.06);
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.main{
  padding:60px 40px;
  max-width:1300px;
  margin:auto;
}

.hero h1{
  font-size:clamp(3.5rem,6vw,5rem);
  font-weight:900;
}

.hero p{
  margin-top:10px;
  font-size:1.2rem;
  color:var(--muted);
}

.phase-title{
  font-size:2.4rem;
  margin-top:80px;
  font-weight:800;
}

.phase-title span{color:var(--accent)}

.phase-subtitle{
  color:var(--muted);
  margin-bottom:28px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:26px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:16px;
  cursor:pointer;
  transition:.25s;
  border:1px solid var(--border);
  position:relative;
}

.card:hover{
  transform:translateY(-4px);
  border-color:var(--accent);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.card h3{
  font-size:1.5rem;
  margin-top:12px;
}

.tag{
  display:inline-block;
  font-size:.75rem;
  font-weight:700;
  padding:6px 10px;
  border-radius:999px;
  background:var(--accent-soft);
  color:var(--accent);
  margin-top:10px;
}

.card p{
  margin-top:10px;
  color:var(--muted);
  font-size:.95rem;
}

/* --- Card completada --- */
.card.done{
  border-color:rgba(34,197,94,0.4);
  background:linear-gradient(135deg, var(--card), rgba(34,197,94,0.06));
}

.card.done .done-label{
  display:flex;
}

.done-label{
  display:none;
  align-items:center;
  gap:6px;
  margin-top:14px;
  font-size:.8rem;
  font-weight:600;
  color:#22c55e;
}

.done-label svg{
  width:16px;
  height:16px;
  flex-shrink:0;
}

/* --- Panel lateral --- */
.overlay{
  position:fixed;
  inset:0;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.5);
  display:none;
  z-index:100;
}

.overlay.open{display:block}

.panel{
  position:fixed;
  right:0;
  top:0;
  width:50%;
  height:100vh;
  background:var(--panel);
  color:#111;
  transform:translateX(100%);
  transition:.35s;
  padding:50px;
  padding-bottom:120px;
  overflow-y:auto;
  box-sizing:border-box;
  z-index:101;
}

.panel.open{transform:translateX(0)}

.panel h2{
  font-size:2.4rem;
  font-weight:800;
}

.panel-section{
  margin-top:32px;
}

.panel-section h4{
  font-size:1.05rem;
  font-weight:700;
  color:var(--accent);
  margin-bottom:10px;
}

.panel-section p{
  line-height:1.7;
  color:#333;
}

.panel-section pre{
  background:#020617;
  color:#f9fafb;
  padding:18px;
  border-radius:10px;
  font-family:'JetBrains Mono', monospace;
  font-size:.85rem;
  overflow-x:auto;
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
}

button.done-btn{
  margin-top:40px;
  margin-bottom:20px;
  padding:12px 20px;
  background:var(--accent);
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
  font-size:.95rem;
  font-weight:600;
  transition:.2s;
}

button.done-btn:hover{
  background:#6d28d9;
}

button.done-btn.completed{
  background:#22c55e;
  pointer-events:none;
}

.special-section{
  margin-top:60px;
  padding:20px;
  background:rgba(255,255,255,0.03);
  border-radius:12px;
  border:1px solid var(--border);
  max-width:800px;
}

@media(max-width:768px){
  .panel{width:95%}
}
</style>
</head>

<body>

<div class="main">

<section class="hero">
  <h1>Taller IA</h1>
  <p>Aprendizaje activo con inteligencia artificial</p>
</section>

<div id="content"></div>

</div>

<div id="overlay" class="overlay" onclick="closePanel()"></div>
<div id="panel" class="panel"></div>

<script>
const STORAGE_KEY="progress";

function getSectionOrder(title){
  if(title==='Objetivo Educacional') return 1;
  if(title.startsWith('Info')) return 2;
  if(title==='Prompt Principal') return 3;
  if(title==='Para profundizar') return 4;
  return 99;
}

let lastScroll=0;

function getProgress(){
  return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
}

function saveProgress(id){
  let data=getProgress();
  data[id]=true;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

function isDone(id){
  return !!getProgress()[id];
}

async function load(){
  const res=await fetch('contenido.md');
  const md=await res.text();
  parse(md);
}

function parse(md){
  const lines=md.split('\n');
  let phases=[],phase=null,act=null,sec=null,buf=[];
  let specialSections=[],currentSpecial=null;

  function flush(){
    const t=buf.join('\n').trim();
    buf=[];
    if(!sec||!act||!t) return;
    act.sections.push({title:sec.title,content:t});
  }

  function flushSpecialContent(){
    const t=buf.join('\n').trim();
    buf=[];
    if(!currentSpecial||!t) return;
    currentSpecial.content+='\n'+t;
  }

  for(const line of lines){
    let m=line.match(/^# FASE (\d+): (.+)/);
    if(m){flush();phase={num:m[1],title:m[2],subtitle:'',acts:[]};phases.push(phase);continue}

    if(phase && !phase.acts.length && line.match(/^## /)){
      m=line.match(/^## (.+)/);
      phase.subtitle=m[1];continue}

    m=line.match(/^# (.+)$/);
    if(m && !m[1].includes('FASE')){
      if(currentSpecial)flushSpecialContent();else flush();
      sec=null;act=null;
      currentSpecial={title:m[1],content:''};
      specialSections.push(currentSpecial);
      phase=null;continue}

    m=line.match(/^### (\d+)\. (.+)/);
    if(m){flush();act={id:m[1],title:m[2],tag:'',img:'',sections:[]};if(phase)phase.acts.push(act);continue}

    m=line.match(/\*\*Tag:\*\*\s*(.+)/);
    if(m && act){act.tag=m[1];continue}

    m=line.match(/\*\*Imagen:\*\*\s*(.+)/);
    if(m && act){act.img=m[1];continue}

    m=line.match(/^#### (.+)/);
    if(m){if(act){flush();sec={title:m[1]}}else if(currentSpecial){flushSpecialContent();currentSpecial.content+='\n### '+m[1]+'\n'}continue}

    if(line.trim()===''){
      if((sec&&act)||currentSpecial)buf.push('');
      continue;
    }

    if(sec&&act)buf.push(line);
    else if(currentSpecial)buf.push(line);
  }

  if(currentSpecial)flushSpecialContent();else flush();

  phases.forEach(p=>p.acts.forEach(a=>{
    a.sections.sort((x,y)=>{
      return getSectionOrder(x.title) - getSectionOrder(y.title);
    });
  }));

  render(phases,specialSections);
}

function openPanel(a){
  lastScroll=window.scrollY;
  document.body.style.overflow='hidden';

  const done=isDone(a.id);

  document.getElementById("overlay").classList.add("open");

  document.getElementById("panel").innerHTML=`
    <div class="close" onclick="closePanel()">✕</div>
    <h2>${a.title}</h2>
    ${a.sections
      .filter(s=>!s.title.includes('Descripción'))
      .map(s=>`
      <div class="panel-section">
        <h4>${s.title}</h4>
        ${s.title.includes('Prompt')
          ? `<pre>${s.content.replace(/```/g,'')}</pre>`
          : marked.parse(s.content)}
      </div>`).join('')}
    <button class="done-btn${done?' completed':''}" id="doneBtn" onclick="markDone('${a.id}')">
      ${done?'✔ Actividad completada':'✔ Marcar completado'}
    </button>
  `;

  document.getElementById("panel").classList.add("open");
}

function closePanel(){
  document.body.style.overflow='auto';
  document.getElementById("panel").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
  window.scrollTo({top:lastScroll});
}

function markDone(id){
  saveProgress(id);

  // Actualizar botón del panel
  const btn=document.getElementById('doneBtn');
  if(btn){
    btn.classList.add('completed');
    btn.textContent='✔ Actividad completada';
  }

  // Actualizar tarjeta
  const card=document.querySelector(`.card[data-id="${id}"]`);
  if(card) card.classList.add('done');
}

function render(phases,specialSections){
  let html='';

  phases.forEach(p=>{
    html+=`<h2 class="phase-title"><span>FASE ${p.num}:</span> ${p.title}</h2>`;
    html+=p.subtitle?`<p class="phase-subtitle">${p.subtitle}</p>`:'';
    html+='<div class="grid">';

    p.acts.forEach(a=>{
      const desc=a.sections.find(s=>s.title.includes('Descripción'));
      const done=isDone(a.id);

      html+=`<div class="card${done?' done':''}" data-id="${a.id}" onclick='openPanel(${JSON.stringify(a).replace(/'/g,"&apos;")})'>
        ${a.img?`<img src="${a.img}">`:''}
        <div class="tag">${a.tag||''}</div>
        <h3>${a.title}</h3>
        ${desc?marked.parse(desc.content):''}
        <div class="done-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
          Actividad completada
        </div>
      </div>`;
    });

    html+='</div>';
  });

  specialSections.forEach(spec=>{
    html+=`<div class="special-section"><h2>${spec.title}</h2>${marked.parse(spec.content)}</div>`;
  });

  document.getElementById("content").innerHTML=html;
}

load();
</script>

</body>
</html>

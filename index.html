<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller de IA — Técnicas Avanzadas de Prompting y Pensamiento Crítico</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
:root {
  --bg: #f4f4f5;
  --bg-card: #ffffff;
  --bg-code: #18181b;
  --text: #09090b;
  --text-muted: #52525b;
  --text-dim: #a1a1aa;
  --border: #e4e4e7;

  /* Colores vibrantes y saturados */
  --phase-1: #ea580c;
  --phase-1-bg: #fff7ed;
  --phase-1-border: #fb923c;
  --phase-1-vibrant: #f97316;
  --phase-2: #e11d48;
  --phase-2-bg: #fff1f2;
  --phase-2-border: #fb7185;
  --phase-2-vibrant: #f43f5e;
  --phase-3: #2563eb;
  --phase-3-bg: #eff6ff;
  --phase-3-border: #60a5fa;
  --phase-3-vibrant: #3b82f6;
  --phase-4: #059669;
  --phase-4-bg: #ecfdf5;
  --phase-4-border: #34d399;
  --phase-4-vibrant: #10b981;

  --accent-info: #2563eb;
  --accent-bonus: #ea580c;
  --accent-reflect: #059669;
  --accent-warn: #e11d48;

  --radius: 10px;
  --radius-lg: 14px;
  --font-display: 'Outfit', system-ui, sans-serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.7;font-size:16px;-webkit-font-smoothing:antialiased}
::selection{background:var(--phase-1-vibrant);color:#fff}

/* ── HERO ── */
.hero{
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:100px 24px 80px;
  position:relative;overflow:hidden;
  background:linear-gradient(135deg, #1e40af 0%, #7c3aed 100%);
}

.hero-net{position:absolute;inset:0;overflow:hidden;z-index:0;pointer-events:none}
.hero-net svg{width:100%;height:100%;display:block}

.hero-badge{
  font-family:var(--font-display);font-size:.75rem;font-weight:800;
  letter-spacing:.12em;text-transform:uppercase;
  color:#fbbf24;background:rgba(255,255,255,.12);
  border:2px solid rgba(251,191,36,.5);
  padding:8px 20px;border-radius:6px;
  margin-bottom:36px;position:relative;z-index:1;
}
.hero h1{
  font-family:var(--font-display);
  font-size:clamp(1.2rem,2.8vw,1.8rem);
  line-height:1.35;letter-spacing:-.01em;
  max-width:900px;position:relative;z-index:1;
  color:rgba(255,255,255,.65);font-weight:600;
}
.hero h1 em{
  font-style:normal;display:block;
  color:#ffffff;
  font-size:clamp(4rem,9vw,8rem);
  line-height:1;letter-spacing:-.05em;font-weight:900;
  margin-top:8px;
}
.hero-sub{
  font-size:1.05rem;color:rgba(255,255,255,.6);
  max-width:520px;margin-top:20px;
  position:relative;z-index:1;font-weight:500;
}
.hero-author{
  font-family:var(--font-display);
  font-size:.82rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:rgba(255,255,255,.45);
  margin-top:16px;position:relative;z-index:1;
}
.hero-phases{display:flex;gap:10px;margin-top:48px;flex-wrap:wrap;justify-content:center;position:relative;z-index:1}
.hero-phase{
  display:flex;align-items:center;gap:10px;padding:10px 22px;
  border-radius:8px;background:rgba(255,255,255,.14);
  border:2px solid rgba(255,255,255,.28);
  font-size:.85rem;font-weight:700;color:rgba(255,255,255,.85);
  cursor:pointer;text-decoration:none;transition:all .25s;letter-spacing:-.01em;
  font-family:var(--font-display);
}
.hero-phase:hover{background:rgba(255,255,255,.22);color:#fff;transform:translateY(-2px);border-color:rgba(255,255,255,.45)}
.hero-phase .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* ── LAYOUT ── */
.container{max-width:1080px;margin:0 auto;padding:0 28px}

/* ── PHASE WRAP — fondos vibrantes ── */
.phase-wrap{padding-bottom:64px;position:relative}
.phase-wrap::before{
  content:'';position:absolute;inset:0;opacity:.08;
  background-size:40px 40px;
  background-image:linear-gradient(90deg,rgba(0,0,0,.02) 1px,transparent 1px),
                   linear-gradient(rgba(0,0,0,.02) 1px,transparent 1px);
}

/* Fondos sólidos vibrantes por fase */
.phase-wrap[data-phase="1"]{background:#fed7aa}
.phase-wrap[data-phase="2"]{background:#fecdd3}
.phase-wrap[data-phase="3"]{background:#bfdbfe}
.phase-wrap[data-phase="4"]{background:#a7f3d0}

/* ── PHASE HEADER ── */
.phase-header{padding:72px 28px 48px;text-align:center;position:relative}
.phase-chip{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--font-display);font-size:.7rem;font-weight:800;
  letter-spacing:.14em;text-transform:uppercase;
  padding:7px 18px;border-radius:6px;margin-bottom:18px;border:2px solid;
}
.phase-header[data-phase="1"] .phase-chip{color:var(--phase-1);background:#ffffff;border-color:var(--phase-1-vibrant)}
.phase-header[data-phase="2"] .phase-chip{color:var(--phase-2);background:#ffffff;border-color:var(--phase-2-vibrant)}
.phase-header[data-phase="3"] .phase-chip{color:var(--phase-3);background:#ffffff;border-color:var(--phase-3-vibrant)}
.phase-header[data-phase="4"] .phase-chip{color:var(--phase-4);background:#ffffff;border-color:var(--phase-4-vibrant)}
.phase-chip .chip-dot{width:6px;height:6px;border-radius:2px;background:currentColor}
.phase-title{
  font-family:var(--font-display);
  font-size:clamp(2rem,4.5vw,3rem);
  color:var(--text);font-weight:900;letter-spacing:-.03em;
}

/* ── ACTIVITY CARD ── */
.activity{background:#ffffff;border:2px solid;border-radius:var(--radius-lg);margin-bottom:32px;overflow:hidden;transition:transform .3s ease}
.activity:hover{transform:translateY(-4px)}

.activity[data-phase="1"]{border-color:var(--phase-1-vibrant)}
.activity[data-phase="2"]{border-color:var(--phase-2-vibrant)}
.activity[data-phase="3"]{border-color:var(--phase-3-vibrant)}
.activity[data-phase="4"]{border-color:var(--phase-4-vibrant)}

.activity-img{width:100%;height:260px;overflow:hidden;position:relative;background:var(--bg);display:flex;align-items:center;justify-content:center}
.activity[data-phase="1"] .activity-img{border-bottom:4px solid var(--phase-1-vibrant)}
.activity[data-phase="2"] .activity-img{border-bottom:4px solid var(--phase-2-vibrant)}
.activity[data-phase="3"] .activity-img{border-bottom:4px solid var(--phase-3-vibrant)}
.activity[data-phase="4"] .activity-img{border-bottom:4px solid var(--phase-4-vibrant)}
.activity-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease}
.activity:hover .activity-img img{transform:scale(1.04)}
.activity-img .img-placeholder{color:var(--text-dim);font-size:.75rem;font-family:var(--font-mono);padding:12px 20px;border-radius:8px;border:2px dashed var(--border);background:var(--bg-card)}

.activity-head{padding:28px 36px 22px;display:flex;align-items:flex-start;gap:18px}
.activity-num{font-family:var(--font-display);font-size:1.3rem;font-weight:900;line-height:1;min-width:52px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:10px;flex-shrink:0;border:2px solid}
.activity[data-phase="1"] .activity-num{color:var(--phase-1);background:var(--phase-1-bg);border-color:var(--phase-1-vibrant)}
.activity[data-phase="2"] .activity-num{color:var(--phase-2);background:var(--phase-2-bg);border-color:var(--phase-2-vibrant)}
.activity[data-phase="3"] .activity-num{color:var(--phase-3);background:var(--phase-3-bg);border-color:var(--phase-3-vibrant)}
.activity[data-phase="4"] .activity-num{color:var(--phase-4);background:var(--phase-4-bg);border-color:var(--phase-4-vibrant)}
.activity-head-text h2{font-family:var(--font-display);font-size:1.6rem;margin-bottom:8px;font-weight:800;letter-spacing:-.02em}
.activity-tag{display:inline-block;font-family:var(--font-display);font-size:.65rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:4px 12px;border-radius:5px;border:2px solid}
.activity[data-phase="1"] .activity-tag{color:var(--phase-1);background:var(--phase-1-bg);border-color:var(--phase-1-vibrant)}
.activity[data-phase="2"] .activity-tag{color:var(--phase-2);background:var(--phase-2-bg);border-color:var(--phase-2-vibrant)}
.activity[data-phase="3"] .activity-tag{color:var(--phase-3);background:var(--phase-3-bg);border-color:var(--phase-3-vibrant)}
.activity[data-phase="4"] .activity-tag{color:var(--phase-4);background:var(--phase-4-bg);border-color:var(--phase-4-vibrant)}

.activity-body{padding:10px 36px 36px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-bottom:24px}
@media(max-width:700px){.two-col{grid-template-columns:1fr}}
.activity-body h3{font-family:var(--font-display);font-size:.85rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px}
.activity-body p,.activity-body li{color:var(--text-muted);font-size:.95rem;line-height:1.8}
.activity-body strong{color:var(--text);font-weight:700}
.activity-body em{font-style:italic}
.activity-body ul,.activity-body ol{padding-left:22px;margin:10px 0}
.activity-body li{margin-bottom:5px}
.two-col+*{border-top:2px solid var(--border);padding-top:24px;margin-top:6px}

/* INFO BOX */
.info-box{background:#f9fafb;border:1px solid #d1d5db;border-radius:var(--radius);padding:20px 24px;margin:18px 0}
.info-box h4{font-family:var(--font-display);font-size:.75rem;font-weight:800;color:var(--text);margin-bottom:10px;letter-spacing:.06em;text-transform:uppercase}
.info-box p,.info-box li{font-size:.9rem;color:var(--text-muted)}
.info-box a{color:var(--accent-info);text-decoration:underline;text-underline-offset:3px;font-weight:600}
.info-box a:hover{opacity:.75}
.info-box ul{padding-left:20px;margin:8px 0;list-style:disc}
.info-box li{margin-bottom:5px}

/* PROMPT */
.prompt-section{margin-top:18px}
.prompt-toggle{display:flex;align-items:center;gap:12px;font-family:var(--font-display);font-size:.88rem;font-weight:700;letter-spacing:.01em;color:var(--text);cursor:pointer;padding:14px 18px;border:2px solid var(--border);border-radius:var(--radius);background:var(--bg);width:100%;text-align:left;transition:all .2s}
.prompt-toggle:hover{background:#ececee;border-color:#a1a1aa}
.prompt-toggle .arrow{display:inline-flex;width:22px;height:22px;align-items:center;justify-content:center;border-radius:5px;background:rgba(0,0,0,.08);font-size:.75rem;transition:transform .3s;font-weight:900}
.prompt-toggle.open .arrow{transform:rotate(90deg)}
.prompt-content{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.4,0,.2,1)}
.prompt-content.open{max-height:8000px}
pre{background:var(--bg-code);border:2px solid #3f3f46;border-radius:var(--radius);padding:22px 24px;margin:10px 0;overflow-x:auto;font-size:.86rem;line-height:1.8;color:#e4e4e7;font-family:var(--font-mono);white-space:pre-wrap;word-wrap:break-word}

/* BONUS & REFLECTION */
.bonus-section,.reflection-section{border-radius:var(--radius);padding:20px 24px;margin-top:18px;border:1px solid #d1d5db;background:#f9fafb}
.bonus-section>h4{color:var(--text);font-family:var(--font-display);font-size:.75rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.bonus-section p{color:var(--text-muted);font-size:.92rem}
.bonus-section strong{color:var(--text);font-weight:700}
.bonus-section h3{font-family:var(--font-display);font-size:.72rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin:20px 0 10px;padding-bottom:5px;border-bottom:1px solid #d1d5db}
.bonus-section h3:first-of-type{margin-top:16px}
.bonus-section ul{padding-left:0;list-style:none;margin:0 0 6px}
.bonus-section li{padding:8px 0;border-bottom:1px solid rgba(0,0,0,.06);font-size:.9rem;color:var(--text-muted);line-height:1.7}
.bonus-section li:last-child{border-bottom:none}
.reflection-section h4{color:var(--text);font-family:var(--font-display);font-size:.75rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.reflection-section p{color:var(--text-muted);font-size:.92rem}
.reflection-section strong{color:var(--text);font-weight:700}

/* ETHICS */
.ethics-wrap{background:#fff;padding:64px 0}
.ethics-section{max-width:1080px;margin:0 auto;padding:0 28px}
.ethics-card{background:var(--bg-card);border:2px solid var(--border);border-radius:var(--radius-lg);padding:44px;position:relative;overflow:hidden}
.ethics-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--phase-1-vibrant),var(--phase-2-vibrant),var(--phase-3-vibrant),var(--phase-4-vibrant))}
.ethics-card h2{font-family:var(--font-display);font-size:1.8rem;margin-bottom:10px;font-weight:900;letter-spacing:-.02em}
.ethics-card .principle{background:#f9fafb;border:1px solid #d1d5db;padding:18px 22px;border-radius:var(--radius);margin:22px 0;font-size:.96rem;color:var(--text-muted);font-weight:500}
.ethics-card .principle strong{color:var(--text);font-weight:700}
.ethics-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:28px}
@media(max-width:700px){.ethics-grid{grid-template-columns:1fr}}
.ethics-do{border-radius:var(--radius);padding:22px;background:#f9fafb;border:1px solid #d1d5db}
.ethics-dont{border-radius:var(--radius);padding:22px;background:#f9fafb;border:1px solid #d1d5db}
.ethics-do h4{color:var(--text);font-family:var(--font-display);font-size:.75rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.ethics-dont h4{color:var(--text);font-family:var(--font-display);font-size:.75rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.ethics-do li,.ethics-dont li{font-size:.9rem;color:var(--text-muted);margin-bottom:8px}

/* WARNING */
.warning-wrap{background:#fff;padding-bottom:64px}
.warning-banner{max-width:1080px;margin:0 auto;padding:0 28px}
.warning-inner{background:#f9fafb;border:1px solid #d1d5db;border-radius:var(--radius);padding:22px 26px}
.warning-inner h3{color:var(--text);font-family:var(--font-display);font-size:1.1rem;margin-bottom:10px;font-weight:800;letter-spacing:-.01em}
.warning-inner p,.warning-inner li{color:var(--text-muted);font-size:.92rem}
.warning-inner ul{padding-left:22px;margin:8px 0}

/* FOOTER */
footer{
  text-align:center;padding:48px 28px 36px;
  background:linear-gradient(135deg, #1e40af 0%, #7c3aed 100%);
  color:rgba(255,255,255,.5);
  font-size:.82rem;line-height:2.2;
}
footer strong{color:rgba(255,255,255,.8);font-weight:700;font-family:var(--font-display);letter-spacing:.03em}
footer a{color:rgba(255,255,255,.6);text-decoration:none;border-bottom:1px solid rgba(255,255,255,.25);transition:all .2s;padding-bottom:1px}
footer a:hover{color:rgba(255,255,255,.9);border-color:rgba(255,255,255,.6)}
footer .sep{margin:0 12px;opacity:.35}

/* ANIMATIONS */
.fade-in{opacity:0;transform:translateY(24px);transition:opacity .7s cubic-bezier(.4,0,.2,1),transform .7s cubic-bezier(.4,0,.2,1)}
.fade-in.visible{opacity:1;transform:translateY(0)}

#loading{display:flex;align-items:center;justify-content:center;min-height:60vh;color:var(--text-muted);font-size:1rem;font-weight:500}
#loading .spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--phase-1-vibrant);border-radius:50%;animation:spin .65s linear infinite;margin-right:14px}
@keyframes spin{to{transform:rotate(360deg)}}
#error-box{max-width:640px;margin:20vh auto;padding:44px;text-align:center}
#error-box code{background:var(--bg-code);color:#e4e4e7;padding:3px 10px;border-radius:5px;font-family:var(--font-mono);font-size:.95rem}
</style>
</head>

      </g>
    </svg>
  </div>

  <span class="hero-badge">Taller 2</span>
  <h1>Actividades Avanzadas de <em>Inteligencia Artificial</em></h1>
  <p class="hero-sub">Técnicas Avanzadas de Prompting y Pensamiento Crítico</p>
  <p class="hero-author">Mario Florido</p>
  <div class="hero-phases" id="hero-phases"></div>
</section>

<div id="content">
  <div id="loading"><span class="spinner"></span> Cargando contenido…</div>
</div>

<footer>
  <strong>Mario Florido</strong>
  <span class="sep">·</span>
  <a href="mailto:mario.florido@gmail.com">mario.florido@gmail.com</a>
  <br>
  Taller de IA — Técnicas Avanzadas de Prompting y Pensamiento Crítico
</footer>

<script>
const PHASE_NAMES = {'1':'Fundamentos','2':'Análisis','3':'Investigación','4':'Producción'};
marked.setOptions({ breaks: false, gfm: true });

async function loadContent() {
  try {
    const res = await fetch('contenido.md');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    parseAndRender(await res.text());
  } catch(e) {
    document.getElementById('content').innerHTML = `<div id="error-box">
      <h2 style="font-family:var(--font-display);margin-bottom:12px;color:var(--accent-warn)">No se pudo cargar el contenido</h2>
      <p style="color:var(--text-muted)">Asegúrate de que <code>contenido.md</code> está en la misma carpeta que <code>index.html</code></p>
      <p style="color:var(--text-dim);font-size:.85rem;margin-top:16px">${e.message}</p></div>`;
  }
}

function parseAndRender(md) {
  const lines = md.split('\n');
  const phases = [];
  let phase=null, act=null, sec=null, buf=[];
  let ethicsBuf=null, warnBuf=null, mode='normal';

  function flush() {
    const t=buf.join('\n').trim(); buf=[];
    if(mode==='ethics'){ethicsBuf=(ethicsBuf||'')+'\n'+t;return}
    if(mode==='warning'){warnBuf=(warnBuf||'')+'\n'+t;return}
    if(!sec||!act||!t)return;
    act.sections.push({type:sec.type,title:sec.title,content:t});
  }

  for(const line of lines){
    let m=line.match(/^# FASE (\d+):\s*(.+)/i);
    if(m){flush();mode='normal';phase={num:m[1],title:m[2].trim(),subtitle:'',activities:[]};phases.push(phase);act=null;sec=null;continue}
    if(line.match(/^# (ÉTICA|GUÍA DE USO ÉTICO)/i)){flush();mode='ethics';ethicsBuf='';act=null;sec=null;continue}
    if(line.match(/^# (AVISO|PRINCIPIO FUNDAMENTAL)/i)){flush();mode='warning';warnBuf='';act=null;sec=null;continue}
    if(mode==='ethics'||mode==='warning'){buf.push(line);continue}

    m=line.match(/^## (.+)/);
    if(m&&phase&&!act){phase.subtitle=m[1].trim();continue}
    if(line.trim()==='---')continue;

    m=line.match(/^### (\d+)\.\s*(.+)/);
    if(m){flush();act={num:m[1],title:m[2].trim(),tag:'',image:'',sections:[]};if(phase)phase.activities.push(act);sec=null;continue}

    m=line.match(/^>\s*\*\*Tag:\*\*\s*(.+)/);
    if(m&&act){act.tag=m[1].trim();continue}
    m=line.match(/^>\s*\*\*Imagen:\*\*\s*(.+)/);
    if(m&&act){act.image=m[1].trim();continue}

    m=line.match(/^#### (.+)/);
    if(m&&act){
      flush();const t=m[1].trim();
      if(t==='Objetivo Educacional')sec={type:'objetivo',title:t};
      else if(t==='Descripción Breve'||t==='Descripción')sec={type:'descripcion',title:t};
      else if(t.startsWith('Info:'))sec={type:'info',title:t.slice(5).trim()};
      else if(t.startsWith('Info'))sec={type:'info',title:t.replace(/^Info\s*/,'')};
      else if(t==='Prompt Principal')sec={type:'prompt',title:t};
      else if(t==='Bonus Extra'||t.startsWith('Terminología'))sec={type:'bonus',title:t};
      else if(t.startsWith('Pregunta de Reflexión'))sec={type:'reflexion',title:t};
      else sec={type:'generic',title:t};
      continue;
    }
    buf.push(line);
  }
  flush();
  render(phases,(ethicsBuf||'').trim(),(warnBuf||'').trim());
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function render(phases,ethicsMd,warningMd){
  let hh='';
  phases.forEach(p=>{
    hh+=`<a href="#phase${p.num}" class="hero-phase"><span class="dot" style="background:var(--phase-${p.num}-vibrant)"></span>${PHASE_NAMES[p.num]||p.title}</a>`;
  });
  document.getElementById('hero-phases').innerHTML=hh;

  let html='';
  phases.forEach((p)=>{
    html+=`<div class="phase-wrap" data-phase="${p.num}">
      <div class="phase-header" data-phase="${p.num}" id="phase${p.num}">
        <span class="phase-chip"><span class="chip-dot"></span> Fase ${p.num}: ${p.title}</span>
        <h2 class="phase-title">${p.subtitle}</h2>
      </div>
      <div class="container">`;

    p.activities.forEach(a=>{
      const pad=a.num.padStart(2,'0');
      let img='';
      if(a.image)img=`<div class="activity-img"><img src="${a.image}" alt="Actividad ${pad}" onerror="this.parentElement.innerHTML='<span class=img-placeholder>📷 ${esc(a.image)}</span>'"></div>`;

      let obj='',desc='',infos=[],promptTxt='',bonus='',bonusTitle='Bonus Extra',refl='';
      a.sections.forEach(s=>{
        const h=marked.parse(s.content);
        switch(s.type){
          case 'objetivo':obj=h;break;case 'descripcion':desc=h;break;
          case 'info':infos.push({title:s.title,html:h});break;
          case 'prompt':promptTxt=s.content;break;
          case 'bonus':bonus=h;bonusTitle=s.title||'Bonus Extra';break;
          case 'reflexion':refl=h;break;
        }
      });

      let code=promptTxt;
      const cm=promptTxt.match(/```[\s\S]*?\n([\s\S]*?)```/);
      if(cm)code=cm[1].trimEnd();

      const infosH=infos.map(i=>`<div class="info-box">${i.title?`<h4>${i.title}</h4>`:''}${i.html}</div>`).join('');

      html+=`<article class="activity fade-in" data-phase="${p.num}" id="act${a.num}">
        ${img}
        <div class="activity-head">
          <span class="activity-num">${pad}</span>
          <div class="activity-head-text">
            <h2>${a.title}</h2>
            ${a.tag?`<span class="activity-tag">${a.tag}</span>`:''}
          </div>
        </div>
        <div class="activity-body">
          <div class="two-col">
            <div><h3>Objetivo Educacional</h3>${obj}</div>
            <div><h3>Descripción</h3>${desc}</div>
          </div>
          ${infosH}
          ${promptTxt?`<div class="prompt-section">
            <button class="prompt-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
              <span class="arrow">▸</span> Prompt Principal
            </button>
            <div class="prompt-content"><pre>${esc(code)}</pre></div>
          </div>`:''}
          ${bonus?`<div class="bonus-section"><h4>${bonusTitle}</h4>${bonus}</div>`:''}
          ${refl?`<div class="reflection-section"><h4>Pregunta de Reflexión</h4>${refl}</div>`:''}
        </div>
      </article>`;
    });

    html+='</div></div>';
  });

  if(ethicsMd){
    const ep=new DOMParser().parseFromString('<div>'+marked.parse(ethicsMd)+'</div>','text/html').body.firstChild;
    let title='',principle='',doL='',dontL='',curH='';
    for(const n of ep.children){
      if(n.tagName==='H2')title=n.textContent;
      else if(n.tagName==='H3')curH=n.textContent;
      else if(n.tagName==='BLOCKQUOTE'){
        const p=n.querySelector('p');
        if(p)principle=p.innerHTML;
        curH='';
      }
      else if(n.tagName==='UL'){if(curH.toLowerCase().includes('usa'))doL=n.outerHTML;else if(curH.toLowerCase().includes('no'))dontL=n.outerHTML}
    }
    html+=`<div class="ethics-wrap"><div class="ethics-section"><div class="ethics-card">
      <h2>${title}</h2><div class="principle">${principle}</div>
      <div class="ethics-grid"><div class="ethics-do"><h4>USA LA IA PARA:</h4>${doL}</div>
      <div class="ethics-dont"><h4>NO LA USES PARA:</h4>${dontL}</div></div>
    </div></div></div>`;
  }

  if(warningMd){
    html+=`<div class="warning-wrap"><div class="warning-banner"><div class="warning-inner">${marked.parse(warningMd).replace(/<h2>/g,'<h3>').replace(/<\/h2>/g,'</h3>')}</div></div></div>`;
  }

  document.getElementById('content').innerHTML=html;

  const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')}),{threshold:.06});
  document.querySelectorAll('.fade-in').forEach(el=>obs.observe(el));
}

loadContent();
</script>
</body>
</html>

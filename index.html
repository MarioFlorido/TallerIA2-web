<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taller IA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

<style>
:root{
  --bg:#0b0f19;
  --card:#111827;
  --border:rgba(255,255,255,0.08);
  --text:#f9fafb;
  --muted:#9ca3af;
  --accent:#6366f1;
  --radius:16px;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at 20% 20%, #111827, #020617 70%);
  color:var(--text);
}

/* HERO */
.hero{
  padding:100px 20px 60px;
  text-align:center;
}

.hero h1{
  font-size:clamp(3rem,6vw,5rem);
  font-weight:900;
  background:linear-gradient(90deg,#fff,#818cf8);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  margin-top:15px;
  color:var(--muted);
}

/* NAV */
.hero-phases{
  margin-top:30px;
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
}

.hero-phase{
  padding:8px 16px;
  border-radius:999px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  text-decoration:none;
  color:#fff;
}

/* GRID */
.container{
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

.phase-title{
  font-size:2rem;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:24px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  cursor:pointer;
  transition:.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:12px;
  margin-bottom:12px;
}

.card-header{
  display:flex;
  gap:10px;
  align-items:center;
}

.num{
  font-weight:800;
  color:#818cf8;
}

.card h3{
  font-size:1.2rem;
}

.card p{
  margin-top:10px;
  color:var(--muted);
  font-size:.9rem;
}

/* PANEL */
.panel{
  position:fixed;
  top:0;
  right:0;
  width:50%;
  height:100%;
  background:#fff;
  color:#111;
  overflow:auto;
  padding:40px;
  transform:translateX(100%);
  transition:.3s;
  z-index:1000;
}

.panel.open{
  transform:translateX(0);
}

.panel-close{
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
  font-size:1.2rem;
}

/* PANEL CONTENT */
.panel h2{
  font-size:1.8rem;
  margin-bottom:10px;
}

.section{
  margin-top:20px;
}

.section h4{
  font-size:.75rem;
  text-transform:uppercase;
  color:#6b7280;
  margin-bottom:8px;
}

.section p,
.section li{
  font-size:.95rem;
  line-height:1.6;
}

/* PROMPT */
pre{
  background:#111;
  color:#e5e7eb;
  padding:16px;
  border-radius:10px;
  font-family:'JetBrains Mono';
  font-size:.8rem;
  white-space:pre-wrap;
}

/* ETHICS */
.ethics{
  max-width:900px;
  margin:80px auto;
  padding:40px;
  background:#fff;
  color:#111;
  border-radius:16px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px;
  color:var(--muted);
}
</style>
</head>

<body>

<section class="hero">
  <h1>Taller IA</h1>
  <p>Aprendizaje activo con inteligencia artificial</p>
  <div id="hero-phases" class="hero-phases"></div>
</section>

<div id="content"></div>

<div id="panel" class="panel"></div>

<footer>Mario Florido · Taller IA</footer>

<script>
const PHASE_NAMES={'1':'Fundamentos','2':'Análisis','3':'Investigación','4':'Producción'};
marked.setOptions({gfm:true});

async function load(){
  const res=await fetch('contenido.md');
  const md=await res.text();
  parse(md);
}

function parse(md){
  const lines=md.split('\n');

  let phases=[],phase=null,act=null,section=null;
  let ethics='',warning='',mode='normal';

  for(let l of lines){

    if(l.match(/^# ÉTICA/i)){mode='ethics';continue}
    if(l.match(/^# AVISO/i)){mode='warning';continue}

    if(mode==='ethics'){ethics+=l+'\n';continue}
    if(mode==='warning'){warning+=l+'\n';continue}

    let m=l.match(/^# FASE (\d+): (.+)/);
    if(m){phase={num:m[1],title:m[2],acts:[]};phases.push(phase);continue}

    m=l.match(/^### (\d+)\. (.+)/);
    if(m){act={num:m[1],title:m[2],img:'',sections:[]};phase.acts.push(act);continue}

    m=l.match(/Imagen:\*\* (.+)/);
    if(m&&act){act.img=m[1];continue}

    m=l.match(/^#### (.+)/);
    if(m){section={title:m[1],content:''};act.sections.push(section);continue}

    if(section){section.content+=l+'\n'}
  }

  render(phases,ethics,warning);
}

function openPanel(a){
  const panel=document.getElementById('panel');

  panel.innerHTML=`
    <div class="panel-close" onclick="closePanel()">✕</div>
    <h2>${a.title}</h2>
    ${a.sections.map(s=>`
      <div class="section">
        <h4>${s.title}</h4>
        ${s.title.includes('Prompt')
          ? `<pre>${s.content.replace(/```/g,'')}</pre>`
          : marked.parse(s.content)}
      </div>
    `).join('')}
  `;

  panel.classList.add('open');
}

function closePanel(){
  document.getElementById('panel').classList.remove('open');
}

function render(phases,ethics,warning){

  let html='',nav='';

  phases.forEach(p=>{
    nav+=`<a href="#p${p.num}" class="hero-phase">${PHASE_NAMES[p.num]}</a>`;

    html+=`<div class="container" id="p${p.num}">
      <h2 class="phase-title">${p.title}</h2>
      <div class="grid">`;

    p.acts.forEach(a=>{
      let desc = a.sections.find(s=>s.title.includes('Descripción'));
      html+=`
      <div class="card" onclick='openPanel(${JSON.stringify(a).replace(/'/g,"&apos;")})'>

        ${a.img?`<img src="${a.img}">`:''}

        <div class="card-header">
          <div class="num">${a.num}</div>
          <h3>${a.title}</h3>
        </div>

        ${desc?`<p>${marked.parse(desc.content).replace(/<[^>]+>/g,'').slice(0,200)}...</p>`:''}

      </div>`;
    });

    html+='</div></div>';
  });

  if(ethics){
    html+=`<div class="ethics">${marked.parse(ethics)}</div>`;
  }

  if(warning){
    html+=`<div class="ethics">${marked.parse(warning)}</div>`;
  }

  document.getElementById('content').innerHTML=html;
  document.getElementById('hero-phases').innerHTML=nav;
}

load();
</script>

</body>
</html>

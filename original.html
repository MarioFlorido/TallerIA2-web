<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller de IA — Técnicas Avanzadas de Prompting y Pensamiento Crítico</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
:root {
  --bg: #faf9f7;
  --bg-card: #ffffff;
  --bg-code: #f4f2ee;
  --bg-nav: rgba(250,249,247,0.92);
  --text: #1b1b20;
  --text-muted: #46464f;
  --text-dim: #8888a0;
  --border: #e6e3dc;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.03);
  --shadow-md: 0 4px 16px rgba(0,0,0,.06), 0 12px 40px rgba(0,0,0,.04);
  --shadow-lg: 0 8px 30px rgba(0,0,0,.08), 0 20px 60px rgba(0,0,0,.05);

  --phase-1: #e0930c;
  --phase-1-bg: #fef8ec;
  --phase-1-border: #f5d78e;
  --phase-2: #e24545;
  --phase-2-bg: #fef0f0;
  --phase-2-border: #f5a8a8;
  --phase-3: #2b8dd6;
  --phase-3-bg: #edf6fe;
  --phase-3-border: #a0cef0;
  --phase-4: #1aab5a;
  --phase-4-bg: #edfbf2;
  --phase-4-border: #8eddb5;

  --accent-info: #2b8dd6;
  --accent-bonus: #e0930c;
  --accent-reflect: #1aab5a;
  --accent-warn: #e24545;

  --radius: 14px;
  --radius-lg: 22px;
  --radius-pill: 100px;
  --font-display: 'Fraunces', Georgia, serif;
  --font-body: 'Outfit', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scroll-padding-top:80px}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.7;font-size:16px;-webkit-font-smoothing:antialiased}
::selection{background:var(--phase-1);color:#fff}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg-nav);backdrop-filter:blur(24px) saturate(1.4);border-bottom:1px solid var(--border);transition:transform .35s cubic-bezier(.4,0,.2,1)}
nav.hidden{transform:translateY(-100%)}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:6px;padding:0 24px;height:60px;overflow-x:auto;scrollbar-width:none}
.nav-inner::-webkit-scrollbar{display:none}
.nav-brand{font-family:var(--font-display);font-size:1.15rem;font-weight:700;white-space:nowrap;margin-right:16px;text-decoration:none;background:linear-gradient(135deg,var(--phase-1),var(--phase-2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-link{font-size:.76rem;font-weight:500;color:var(--text-dim);text-decoration:none;padding:5px 10px;border-radius:8px;white-space:nowrap;transition:all .2s}
.nav-link:hover,.nav-link.active{color:var(--text);background:rgba(0,0,0,.05)}
.nav-phase{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:4px 10px;border-radius:var(--radius-pill);margin-left:6px;white-space:nowrap}
.nav-phase[data-phase="1"]{color:var(--phase-1);background:var(--phase-1-bg)} .nav-phase[data-phase="2"]{color:var(--phase-2);background:var(--phase-2-bg)} .nav-phase[data-phase="3"]{color:var(--phase-3);background:var(--phase-3-bg)} .nav-phase[data-phase="4"]{color:var(--phase-4);background:var(--phase-4-bg)}

/* ── HERO ── */
.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:120px 24px 80px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:
  radial-gradient(ellipse 700px 500px at 25% 35%,rgba(224,147,12,.12),transparent),
  radial-gradient(ellipse 500px 600px at 75% 65%,rgba(43,141,214,.08),transparent),
  radial-gradient(ellipse 400px 300px at 50% 80%,rgba(226,69,69,.06),transparent)}
.hero::after{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0v60M0 30h60' stroke='%23000' stroke-opacity='.02' stroke-width='.5'/%3E%3C/svg%3E");opacity:.6}
.hero-badge{font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--phase-1);background:var(--phase-1-bg);border:1px solid var(--phase-1-border);padding:8px 22px;border-radius:var(--radius-pill);margin-bottom:36px;position:relative;z-index:1}
.hero h1{font-family:var(--font-display);font-size:clamp(2.6rem,6.5vw,5rem);line-height:1.08;max-width:820px;position:relative;z-index:1;color:var(--text);font-weight:700}
.hero h1 em{font-style:italic;font-weight:400;background:linear-gradient(135deg,var(--phase-1) 0%,var(--phase-2) 50%,var(--phase-3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:1.12rem;color:var(--text-muted);max-width:520px;margin-top:20px;position:relative;z-index:1;font-weight:400}
.hero-phases{display:flex;gap:10px;margin-top:48px;flex-wrap:wrap;justify-content:center;position:relative;z-index:1}
.hero-phase{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius);background:var(--bg-card);border:1px solid var(--border);font-size:.82rem;font-weight:500;color:var(--text-muted);cursor:pointer;text-decoration:none;transition:all .3s;box-shadow:var(--shadow-sm)}
.hero-phase:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.hero-phase .dot{width:10px;height:10px;border-radius:50%}

/* ── LAYOUT ── */
.container{max-width:1020px;margin:0 auto;padding:0 24px}

/* ── PHASE HEADER ── */
.phase-header{padding:80px 24px 48px;text-align:center;position:relative;margin-top:20px}
.phase-header::before{content:'';position:absolute;inset:0 0 30%;border-radius:0 0 40% 40%;z-index:0}
.phase-header[data-phase="1"]::before{background:linear-gradient(180deg,var(--phase-1-bg),transparent)} .phase-header[data-phase="2"]::before{background:linear-gradient(180deg,var(--phase-2-bg),transparent)} .phase-header[data-phase="3"]::before{background:linear-gradient(180deg,var(--phase-3-bg),transparent)} .phase-header[data-phase="4"]::before{background:linear-gradient(180deg,var(--phase-4-bg),transparent)}
.phase-chip{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:6px 16px;border-radius:var(--radius-pill);margin-bottom:16px;position:relative;z-index:1}
.phase-header[data-phase="1"] .phase-chip{color:var(--phase-1);background:var(--bg-card);border:1px solid var(--phase-1-border)} .phase-header[data-phase="2"] .phase-chip{color:var(--phase-2);background:var(--bg-card);border:1px solid var(--phase-2-border)} .phase-header[data-phase="3"] .phase-chip{color:var(--phase-3);background:var(--bg-card);border:1px solid var(--phase-3-border)} .phase-header[data-phase="4"] .phase-chip{color:var(--phase-4);background:var(--bg-card);border:1px solid var(--phase-4-border)}
.phase-chip .chip-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.phase-title{font-family:var(--font-display);font-size:clamp(1.8rem,4vw,2.5rem);color:var(--text);position:relative;z-index:1;font-weight:700}

/* ── ACTIVITY CARD ── */
.activity{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:36px;overflow:hidden;transition:all .35s cubic-bezier(.4,0,.2,1);box-shadow:var(--shadow-sm);position:relative}
.activity::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.activity[data-phase="1"]::before{background:linear-gradient(90deg,var(--phase-1),#f5c842)} .activity[data-phase="2"]::before{background:linear-gradient(90deg,var(--phase-2),#f07070)} .activity[data-phase="3"]::before{background:linear-gradient(90deg,var(--phase-3),#5bb8f5)} .activity[data-phase="4"]::before{background:linear-gradient(90deg,var(--phase-4),#40d980)}
.activity:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:transparent}

.activity-img{width:100%;height:260px;overflow:hidden;position:relative;background:linear-gradient(135deg,var(--bg),var(--bg-code));display:flex;align-items:center;justify-content:center}
.activity-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s}
.activity:hover .activity-img img{transform:scale(1.03)}
.activity-img .img-placeholder{color:var(--text-dim);font-size:.8rem;font-family:var(--font-mono);padding:12px 20px;border-radius:10px;border:2px dashed var(--border);background:var(--bg-card)}

.activity-head{padding:28px 36px 24px;display:flex;align-items:flex-start;gap:18px}
.activity-num{font-family:var(--font-display);font-size:2.2rem;line-height:1;min-width:46px;font-weight:700}
.activity[data-phase="1"] .activity-num{color:var(--phase-1)} .activity[data-phase="2"] .activity-num{color:var(--phase-2)} .activity[data-phase="3"] .activity-num{color:var(--phase-3)} .activity[data-phase="4"] .activity-num{color:var(--phase-4)}
.activity-head-text h2{font-family:var(--font-display);font-size:1.5rem;margin-bottom:6px;font-weight:700}
.activity-tag{display:inline-block;font-size:.68rem;font-weight:600;letter-spacing:.06em;padding:5px 14px;border-radius:var(--radius-pill)}
.activity[data-phase="1"] .activity-tag{color:var(--phase-1);background:var(--phase-1-bg);border:1px solid var(--phase-1-border)} .activity[data-phase="2"] .activity-tag{color:var(--phase-2);background:var(--phase-2-bg);border:1px solid var(--phase-2-border)} .activity[data-phase="3"] .activity-tag{color:var(--phase-3);background:var(--phase-3-bg);border:1px solid var(--phase-3-border)} .activity[data-phase="4"] .activity-tag{color:var(--phase-4);background:var(--phase-4-bg);border:1px solid var(--phase-4-border)}

.activity-body{padding:8px 36px 36px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-bottom:24px}
@media(max-width:700px){.two-col{grid-template-columns:1fr}}
.activity-body h3{font-family:var(--font-display);font-size:1rem;margin-bottom:10px;color:var(--text);font-weight:700}
.activity-body p,.activity-body li{color:var(--text-muted);font-size:.91rem;line-height:1.78}
.activity-body strong{color:var(--text);font-weight:600}
.activity-body em{font-style:italic}
.activity-body ul,.activity-body ol{padding-left:20px;margin:8px 0}
.activity-body li{margin-bottom:4px}

/* INFO BOX */
.info-box{background:var(--phase-3-bg);border:1px solid var(--phase-3-border);border-radius:var(--radius);padding:20px 24px;margin:20px 0;position:relative;overflow:hidden}
.info-box h4{font-size:.8rem;font-weight:700;color:var(--accent-info);margin-bottom:8px;letter-spacing:.02em}
.info-box p,.info-box li{font-size:.87rem;color:var(--text-muted);font-style:italic}
.info-box a{color:var(--accent-info);text-decoration:none;border-bottom:1px solid rgba(43,141,214,.3);transition:all .2s}
.info-box a:hover{border-color:var(--accent-info);background:rgba(43,141,214,.05)}
.info-box ul{padding-left:20px;margin:6px 0;list-style:disc}
.info-box li{margin-bottom:4px}

/* PROMPT */
.prompt-section{margin-top:24px}
.prompt-toggle{display:flex;align-items:center;gap:10px;font-family:var(--font-body);font-size:.92rem;font-weight:600;color:var(--text);cursor:pointer;padding:14px 20px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);width:100%;text-align:left;transition:all .2s}
.prompt-toggle:hover{background:var(--bg-code);border-color:#ccc}
.prompt-toggle .arrow{display:inline-flex;width:22px;height:22px;align-items:center;justify-content:center;border-radius:6px;background:rgba(0,0,0,.06);font-size:.75rem;transition:transform .3s}
.prompt-toggle.open .arrow{transform:rotate(90deg)}
.prompt-content{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.4,0,.2,1)}
.prompt-content.open{max-height:8000px}
pre{background:var(--bg-code);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin:12px 0;overflow-x:auto;font-size:.83rem;line-height:1.7;color:#3a3a48;font-family:var(--font-mono);white-space:pre-wrap;word-wrap:break-word}

/* BONUS & REFLECTION */
.bonus-section,.reflection-section{border-radius:var(--radius);padding:20px 24px;margin-top:20px;position:relative;overflow:hidden}
.bonus-section{background:var(--phase-1-bg);border:1px solid var(--phase-1-border)}
.bonus-section h4{color:var(--accent-bonus);font-size:.8rem;font-weight:700;margin-bottom:8px}
.bonus-section p{color:var(--text-muted);font-size:.9rem}
.bonus-section strong{color:var(--text)}
.reflection-section{background:var(--phase-4-bg);border:1px solid var(--phase-4-border)}
.reflection-section h4{color:var(--accent-reflect);font-size:.8rem;font-weight:700;margin-bottom:8px}
.reflection-section p{color:var(--text-muted);font-size:.9rem}
.reflection-section strong{color:var(--text)}

/* ETHICS */
.ethics-section{max-width:1020px;margin:80px auto 0;padding:0 24px}
.ethics-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:48px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.ethics-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--phase-1),var(--phase-2),var(--phase-3),var(--phase-4))}
.ethics-card h2{font-family:var(--font-display);font-size:1.7rem;margin-bottom:8px;font-weight:700}
.ethics-card .principle{background:var(--phase-3-bg);border-left:4px solid var(--accent-info);padding:18px 22px;border-radius:0 var(--radius) var(--radius) 0;margin:24px 0;font-size:.94rem;color:var(--text-muted)}
.ethics-card .principle strong{color:var(--text)}
.ethics-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:28px}
@media(max-width:700px){.ethics-grid{grid-template-columns:1fr}}
.ethics-do{border-radius:var(--radius);padding:24px;background:var(--phase-4-bg);border:1px solid var(--phase-4-border)}
.ethics-dont{border-radius:var(--radius);padding:24px;background:var(--phase-2-bg);border:1px solid var(--phase-2-border)}
.ethics-do h4{color:var(--phase-4);font-size:.82rem;font-weight:700;margin-bottom:12px}
.ethics-dont h4{color:var(--phase-2);font-size:.82rem;font-weight:700;margin-bottom:12px}
.ethics-do li,.ethics-dont li{font-size:.87rem;color:var(--text-muted);margin-bottom:6px}

/* WARNING */
.warning-banner{max-width:1020px;margin:40px auto 0;padding:0 24px}
.warning-inner{background:var(--phase-2-bg);border:1px solid var(--phase-2-border);border-radius:var(--radius);padding:24px 28px}
.warning-inner h3{color:var(--accent-warn);font-family:var(--font-display);font-size:1.05rem;margin-bottom:8px;font-weight:700}
.warning-inner p,.warning-inner li{color:var(--text-muted);font-size:.9rem}
.warning-inner ul{padding-left:20px;margin:6px 0}

footer{text-align:center;padding:64px 24px 40px;color:var(--text-dim);font-size:.8rem}

/* ANIMATIONS */
.fade-in{opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.4,0,.2,1),transform .7s cubic-bezier(.4,0,.2,1)}
.fade-in.visible{opacity:1;transform:translateY(0)}
.divider{height:1px;background:var(--border);max-width:1020px;margin:0 auto}

#loading{display:flex;align-items:center;justify-content:center;min-height:60vh;color:var(--text-muted);font-size:1rem}
#loading .spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--phase-1);border-radius:50%;animation:spin .6s linear infinite;margin-right:12px}
@keyframes spin{to{transform:rotate(360deg)}}
#error-box{max-width:600px;margin:20vh auto;padding:40px;text-align:center}
#error-box code{background:var(--bg-code);padding:2px 8px;border-radius:6px;font-family:var(--font-mono);font-size:.9rem}
</style>
</head>
<body>

<nav id="navbar"><div class="nav-inner" id="nav-links"></div></nav>

<section class="hero" id="hero">
  <span class="hero-badge">Taller 2</span>
  <h1>Actividades Avanzadas de <em>Inteligencia Artificial</em></h1>
  <p class="hero-sub">Técnicas Avanzadas de Prompting y Pensamiento Crítico</p>
  <div class="hero-phases" id="hero-phases"></div>
</section>

<div id="content">
  <div id="loading"><span class="spinner"></span> Cargando contenido…</div>
</div>

<footer>Taller de IA — Técnicas Avanzadas de Prompting y Pensamiento Crítico</footer>

<script>
const PHASE_NAMES = {'1':'Fundamentos','2':'Análisis Crítico','3':'Investigación','4':'Producción'};
marked.setOptions({ breaks: false, gfm: true });

async function loadContent() {
  try {
    const res = await fetch('contenido.md');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    parseAndRender(await res.text());
  } catch(e) {
    document.getElementById('content').innerHTML = `<div id="error-box">
      <h2 style="font-family:var(--font-display);margin-bottom:12px;color:var(--accent-warn)">No se pudo cargar el contenido</h2>
      <p style="color:var(--text-muted)">Asegúrate de que <code>contenido.md</code> está en la misma carpeta que <code>index.html</code></p>
      <p style="color:var(--text-dim);font-size:.85rem;margin-top:16px">${e.message}</p></div>`;
  }
}

function parseAndRender(md) {
  const lines = md.split('\n');
  const phases = [];
  let phase=null, act=null, sec=null, buf=[];
  let ethicsBuf=null, warnBuf=null, mode='normal';

  function flush() {
    const t=buf.join('\n').trim(); buf=[];
    if(mode==='ethics'){ethicsBuf=(ethicsBuf||'')+'\n'+t;return}
    if(mode==='warning'){warnBuf=(warnBuf||'')+'\n'+t;return}
    if(!sec||!act||!t)return;
    act.sections.push({type:sec.type,title:sec.title,content:t});
  }

  for(const line of lines){
    let m=line.match(/^# FASE (\d+):\s*(.+)/i);
    if(m){flush();mode='normal';phase={num:m[1],title:m[2].trim(),subtitle:'',activities:[]};phases.push(phase);act=null;sec=null;continue}
    if(line.match(/^# ÉTICA/i)){flush();mode='ethics';ethicsBuf='';act=null;sec=null;continue}
    if(line.match(/^# AVISO/i)){flush();mode='warning';warnBuf='';act=null;sec=null;continue}
    if(mode==='ethics'||mode==='warning'){buf.push(line);continue}

    m=line.match(/^## (.+)/);
    if(m&&phase&&!act){phase.subtitle=m[1].trim();continue}
    if(line.trim()==='---')continue;

    m=line.match(/^### (\d+)\.\s*(.+)/);
    if(m){flush();act={num:m[1],title:m[2].trim(),tag:'',image:'',sections:[]};if(phase)phase.activities.push(act);sec=null;continue}

    m=line.match(/^>\s*\*\*Tag:\*\*\s*(.+)/);
    if(m&&act){act.tag=m[1].trim();continue}
    m=line.match(/^>\s*\*\*Imagen:\*\*\s*(.+)/);
    if(m&&act){act.image=m[1].trim();continue}

    m=line.match(/^#### (.+)/);
    if(m&&act){
      flush();const t=m[1].trim();
      if(t==='Objetivo Educacional')sec={type:'objetivo',title:t};
      else if(t==='Descripción')sec={type:'descripcion',title:t};
      else if(t.startsWith('Info:'))sec={type:'info',title:t.slice(5).trim()};
      else if(t==='Info')sec={type:'info',title:''};
      else if(t==='Prompt Principal')sec={type:'prompt',title:t};
      else if(t==='Bonus Extra')sec={type:'bonus',title:t};
      else if(t.startsWith('Pregunta de Reflexión'))sec={type:'reflexion',title:t};
      else sec={type:'generic',title:t};
      continue;
    }
    buf.push(line);
  }
  flush();
  render(phases,(ethicsBuf||'').trim(),(warnBuf||'').trim());
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function render(phases,ethicsMd,warningMd){
  const nav=document.getElementById('nav-links');
  let nh='<a href="#hero" class="nav-brand">Taller IA</a>';
  let hh='';
  phases.forEach(p=>{
    nh+=`<span class="nav-phase" data-phase="${p.num}">Fase ${p.num}</span>`;
    hh+=`<a href="#phase${p.num}" class="hero-phase"><span class="dot" style="background:var(--phase-${p.num})"></span>${PHASE_NAMES[p.num]||p.title}</a>`;
    p.activities.forEach(a=>{
      const short=a.title.length>14?a.title.substring(0,14)+'…':a.title;
      nh+=`<a href="#act${a.num}" class="nav-link">${a.num}. ${short}</a>`;
    });
  });
  nav.innerHTML=nh;
  document.getElementById('hero-phases').innerHTML=hh;

  let html='';
  phases.forEach((p,pi)=>{
    html+=`<div class="phase-header" data-phase="${p.num}" id="phase${p.num}">
      <span class="phase-chip"><span class="chip-dot"></span> Fase ${p.num}: ${p.title}</span>
      <h2 class="phase-title">${p.subtitle}</h2></div><div class="container">`;

    p.activities.forEach(a=>{
      const pad=a.num.padStart(2,'0');
      let img='';
      if(a.image)img=`<div class="activity-img"><img src="${a.image}" alt="Actividad ${pad}" onerror="this.parentElement.innerHTML='<span class=img-placeholder>📷 ${esc(a.image)}</span>'"></div>`;

      let obj='',desc='',infos=[],promptTxt='',bonus='',refl='';
      a.sections.forEach(s=>{
        const h=marked.parse(s.content);
        switch(s.type){
          case 'objetivo':obj=h;break;case 'descripcion':desc=h;break;
          case 'info':infos.push({title:s.title,html:h});break;
          case 'prompt':promptTxt=s.content;break;case 'bonus':bonus=h;break;case 'reflexion':refl=h;break;
        }
      });

      let code=promptTxt;
      const cm=promptTxt.match(/```[\s\S]*?\n([\s\S]*?)```/);
      if(cm)code=cm[1].trimEnd();

      const infosH=infos.map(i=>`<div class="info-box">${i.title?`<h4>${i.title}</h4>`:''}${i.html}</div>`).join('');

      html+=`<article class="activity fade-in" data-phase="${p.num}" id="act${a.num}">
        ${img}
        <div class="activity-head">
          <span class="activity-num">${pad}</span>
          <div class="activity-head-text">
            <h2>${a.title}</h2>
            ${a.tag?`<span class="activity-tag">${a.tag}</span>`:''}
          </div>
        </div>
        <div class="activity-body">
          <div class="two-col">
            <div><h3>Objetivo Educacional</h3>${obj}</div>
            <div><h3>Descripción</h3>${desc}</div>
          </div>
          ${infosH}
          ${promptTxt?`<div class="prompt-section">
            <button class="prompt-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
              <span class="arrow">▸</span> Prompt Principal
            </button>
            <div class="prompt-content"><pre>${esc(code)}</pre></div>
          </div>`:''}
          ${bonus?`<div class="bonus-section"><h4>Bonus Extra</h4>${bonus}</div>`:''}
          ${refl?`<div class="reflection-section"><h4>Pregunta de Reflexión</h4>${refl}</div>`:''}
        </div>
      </article>`;
    });

    html+='</div>';
    if(pi<phases.length-1)html+='<div class="divider"></div>';
  });

  if(ethicsMd){
    const ep=new DOMParser().parseFromString('<div>'+marked.parse(ethicsMd)+'</div>','text/html').body.firstChild;
    let title='',principle='',doL='',dontL='',curH='';
    for(const n of ep.children){
      if(n.tagName==='H2')title=n.textContent;
      else if(n.tagName==='H3')curH=n.textContent;
      else if(n.tagName==='P'&&curH.includes('Principio')){principle=n.innerHTML;curH=''}
      else if(n.tagName==='UL'){if(curH.includes('USA'))doL=n.outerHTML;else if(curH.includes('NO'))dontL=n.outerHTML}
    }
    html+=`<div class="ethics-section"><div class="ethics-card">
      <h2>${title}</h2><div class="principle">${principle}</div>
      <div class="ethics-grid"><div class="ethics-do"><h4>USA LA IA PARA:</h4>${doL}</div>
      <div class="ethics-dont"><h4>NO LA USES PARA:</h4>${dontL}</div></div></div></div>`;
  }

  if(warningMd){
    html+=`<div class="warning-banner"><div class="warning-inner">${marked.parse(warningMd).replace(/<h2>/g,'<h3>').replace(/<\/h2>/g,'</h3>')}</div></div>`;
  }

  document.getElementById('content').innerHTML=html;

  const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')}),{threshold:.06});
  document.querySelectorAll('.fade-in').forEach(el=>obs.observe(el));

  let lastY=0;
  window.addEventListener('scroll',()=>{const y=window.scrollY;document.getElementById('navbar').classList.toggle('hidden',y>lastY&&y>200);lastY=y});

  const secs=document.querySelectorAll('.activity'),lnks=document.querySelectorAll('.nav-link');
  window.addEventListener('scroll',()=>{let cur='';secs.forEach(s=>{if(window.scrollY>=s.offsetTop-120)cur=s.id});lnks.forEach(l=>l.classList.toggle('active',l.getAttribute('href')==='#'+cur))});
}

loadContent();
</script>
</body>
</html>

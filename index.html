<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller de IA — Técnicas Avanzadas de Prompting y Pensamiento Crítico</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
:root {
  --bg: #f4f4f5;
  --bg-card: #ffffff;
  --bg-code: #18181b;
  --text: #09090b;
  --text-muted: #52525b;
  --text-dim: #a1a1aa;
  --border: #e4e4e7;

  --shadow-sm: 0 1px 2px rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.09), 0 1px 3px rgba(0,0,0,.05);
  --shadow-lg: 0 12px 32px rgba(0,0,0,.13), 0 4px 8px rgba(0,0,0,.06);

  --phase-1: #d97706;
  --phase-1-bg: #fef3c7;
  --phase-1-border: #f59e0b;
  --phase-2: #dc2626;
  --phase-2-bg: #fee2e2;
  --phase-2-border: #ef4444;
  --phase-3: #2563eb;
  --phase-3-bg: #dbeafe;
  --phase-3-border: #3b82f6;
  --phase-4: #059669;
  --phase-4-bg: #d1fae5;
  --phase-4-border: #10b981;

  --accent-info: #2563eb;
  --accent-bonus: #d97706;
  --accent-reflect: #059669;
  --accent-warn: #dc2626;

  --radius: 8px;
  --radius-lg: 12px;
  --font-display: 'Space Grotesk', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.7;font-size:16px;-webkit-font-smoothing:antialiased}
::selection{background:var(--phase-1);color:#fff}

/* ── HERO ── */
.hero{
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:100px 24px 80px;
  position:relative;overflow:hidden;
  background:#1e3a8a;
}

/* Network SVG container */
.hero-net{position:absolute;inset:0;overflow:hidden;z-index:0;pointer-events:none}
.hero-net svg{width:100%;height:100%;display:block}

.hero-badge{
  font-family:var(--font-display);font-size:.7rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  color:#f59e0b;background:rgba(255,255,255,.08);
  border:1px solid rgba(245,158,11,.45);
  padding:6px 16px;border-radius:4px;
  margin-bottom:32px;position:relative;z-index:1;
}
.hero h1{
  font-family:var(--font-display);
  font-size:clamp(1.1rem,2.5vw,1.6rem);
  line-height:1.4;letter-spacing:-.01em;
  max-width:860px;position:relative;z-index:1;
  color:rgba(255,255,255,.6);font-weight:500;
}
.hero h1 em{
  font-style:normal;display:block;
  color:#ffffff;
  font-size:clamp(3.4rem,8.5vw,7rem);
  line-height:1;letter-spacing:-.04em;font-weight:700;
  margin-top:6px;
}
.hero-sub{
  font-size:.95rem;color:rgba(255,255,255,.55);
  max-width:480px;margin-top:18px;
  position:relative;z-index:1;font-weight:400;
}
.hero-author{
  font-family:var(--font-display);
  font-size:.78rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:rgba(255,255,255,.4);
  margin-top:14px;position:relative;z-index:1;
}
.hero-phases{display:flex;gap:8px;margin-top:44px;flex-wrap:wrap;justify-content:center;position:relative;z-index:1}
.hero-phase{
  display:flex;align-items:center;gap:8px;padding:9px 18px;
  border-radius:6px;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.22);
  font-size:.8rem;font-weight:600;color:rgba(255,255,255,.8);
  cursor:pointer;text-decoration:none;transition:all .2s;letter-spacing:-.01em;
}
.hero-phase:hover{background:rgba(255,255,255,.18);color:#fff;transform:translateY(-2px)}
.hero-phase .dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* ── LAYOUT ── */
.container{max-width:1020px;margin:0 auto;padding:0 24px}

/* ── PHASE WRAP — alternating solid backgrounds ── */
.phase-wrap{padding-bottom:56px}
.phase-wrap:nth-child(odd){background:#ffffff}
.phase-wrap:nth-child(even){background:#eff6ff}

/* ── PHASE HEADER ── */
.phase-header{padding:64px 24px 40px;text-align:center}
.phase-chip{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--font-display);font-size:.65rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  padding:5px 14px;border-radius:4px;margin-bottom:14px;border:1px solid;
}
.phase-header[data-phase="1"] .phase-chip{color:var(--phase-1);background:var(--bg-card);border-color:var(--phase-1-border)}
.phase-header[data-phase="2"] .phase-chip{color:var(--phase-2);background:var(--bg-card);border-color:var(--phase-2-border)}
.phase-header[data-phase="3"] .phase-chip{color:var(--phase-3);background:var(--bg-card);border-color:var(--phase-3-border)}
.phase-header[data-phase="4"] .phase-chip{color:var(--phase-4);background:var(--bg-card);border-color:var(--phase-4-border)}
.phase-chip .chip-dot{width:5px;height:5px;border-radius:1px;background:currentColor}
.phase-title{font-family:var(--font-display);font-size:clamp(1.6rem,3.5vw,2.2rem);color:var(--text);font-weight:700;letter-spacing:-.02em}

/* ── ACTIVITY CARD ── */
.activity{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:28px;overflow:hidden;transition:box-shadow .25s ease,transform .25s ease;box-shadow:var(--shadow-sm)}
.activity:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}

/* Fixed colored stripe at bottom of image */
.activity-img{width:100%;height:240px;overflow:hidden;position:relative;background:var(--bg);display:flex;align-items:center;justify-content:center}
.activity[data-phase="1"] .activity-img{border-bottom:3px solid var(--phase-1)}
.activity[data-phase="2"] .activity-img{border-bottom:3px solid var(--phase-2)}
.activity[data-phase="3"] .activity-img{border-bottom:3px solid var(--phase-3)}
.activity[data-phase="4"] .activity-img{border-bottom:3px solid var(--phase-4)}
.activity-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease}
.activity:hover .activity-img img{transform:scale(1.02)}
.activity-img .img-placeholder{color:var(--text-dim);font-size:.75rem;font-family:var(--font-mono);padding:10px 18px;border-radius:6px;border:1px dashed var(--border);background:var(--bg-card)}

.activity-head{padding:24px 32px 20px;display:flex;align-items:flex-start;gap:16px}
.activity-num{font-family:var(--font-display);font-size:1.1rem;font-weight:700;line-height:1;min-width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0;border:1px solid}
.activity[data-phase="1"] .activity-num{color:var(--phase-1);background:var(--phase-1-bg);border-color:var(--phase-1-border)}
.activity[data-phase="2"] .activity-num{color:var(--phase-2);background:var(--phase-2-bg);border-color:var(--phase-2-border)}
.activity[data-phase="3"] .activity-num{color:var(--phase-3);background:var(--phase-3-bg);border-color:var(--phase-3-border)}
.activity[data-phase="4"] .activity-num{color:var(--phase-4);background:var(--phase-4-bg);border-color:var(--phase-4-border)}
.activity-head-text h2{font-family:var(--font-display);font-size:1.35rem;margin-bottom:6px;font-weight:700;letter-spacing:-.02em}
.activity-tag{display:inline-block;font-family:var(--font-display);font-size:.62rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 10px;border-radius:4px;border:1px solid}
.activity[data-phase="1"] .activity-tag{color:var(--phase-1);background:var(--phase-1-bg);border-color:var(--phase-1-border)}
.activity[data-phase="2"] .activity-tag{color:var(--phase-2);background:var(--phase-2-bg);border-color:var(--phase-2-border)}
.activity[data-phase="3"] .activity-tag{color:var(--phase-3);background:var(--phase-3-bg);border-color:var(--phase-3-border)}
.activity[data-phase="4"] .activity-tag{color:var(--phase-4);background:var(--phase-4-bg);border-color:var(--phase-4-border)}

.activity-body{padding:8px 32px 32px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-bottom:20px}
@media(max-width:700px){.two-col{grid-template-columns:1fr}}
.activity-body h3{font-family:var(--font-display);font-size:.8rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px}
.activity-body p,.activity-body li{color:var(--text-muted);font-size:.9rem;line-height:1.8}
.activity-body strong{color:var(--text);font-weight:600}
.activity-body em{font-style:italic}
.activity-body ul,.activity-body ol{padding-left:20px;margin:8px 0}
.activity-body li{margin-bottom:4px}
.two-col+*{border-top:1px solid var(--border);padding-top:20px;margin-top:4px}

/* INFO BOX */
.info-box{background:var(--phase-3-bg);border:1px solid var(--phase-3-border);border-radius:var(--radius);padding:18px 22px;margin:16px 0}
.info-box h4{font-family:var(--font-display);font-size:.72rem;font-weight:700;color:var(--accent-info);margin-bottom:8px;letter-spacing:.04em;text-transform:uppercase}
.info-box p,.info-box li{font-size:.86rem;color:var(--text-muted)}
.info-box a{color:var(--accent-info);text-decoration:underline;text-underline-offset:3px}
.info-box a:hover{opacity:.75}
.info-box ul{padding-left:18px;margin:6px 0;list-style:disc}
.info-box li{margin-bottom:4px}

/* PROMPT */
.prompt-section{margin-top:16px}
.prompt-toggle{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-size:.82rem;font-weight:600;letter-spacing:.01em;color:var(--text);cursor:pointer;padding:12px 16px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);width:100%;text-align:left;transition:all .15s}
.prompt-toggle:hover{background:#ececee;border-color:#d4d4d8}
.prompt-toggle .arrow{display:inline-flex;width:20px;height:20px;align-items:center;justify-content:center;border-radius:4px;background:rgba(0,0,0,.07);font-size:.7rem;transition:transform .25s}
.prompt-toggle.open .arrow{transform:rotate(90deg)}
.prompt-content{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.4,0,.2,1)}
.prompt-content.open{max-height:8000px}
pre{background:var(--bg-code);border:1px solid #3f3f46;border-radius:var(--radius);padding:20px 22px;margin:8px 0;overflow-x:auto;font-size:.82rem;line-height:1.75;color:#e4e4e7;font-family:var(--font-mono);white-space:pre-wrap;word-wrap:break-word}

/* BONUS & REFLECTION */
.bonus-section,.reflection-section{border-radius:var(--radius);padding:18px 22px;margin-top:16px}
.bonus-section{background:var(--phase-1-bg);border:1px solid var(--phase-1-border)}
.bonus-section>h4{color:var(--accent-bonus);font-family:var(--font-display);font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.bonus-section p{color:var(--text-muted);font-size:.88rem}
.bonus-section strong{color:var(--text)}
.bonus-section h3{font-family:var(--font-display);font-size:.68rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--accent-bonus);margin:18px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--phase-1-border)}
.bonus-section h3:first-of-type{margin-top:14px}
.bonus-section ul{padding-left:0;list-style:none;margin:0 0 4px}
.bonus-section li{padding:7px 0;border-bottom:1px solid rgba(0,0,0,.05);font-size:.86rem;color:var(--text-muted);line-height:1.65}
.bonus-section li:last-child{border-bottom:none}
.reflection-section{background:var(--phase-4-bg);border:1px solid var(--phase-4-border)}
.reflection-section h4{color:var(--accent-reflect);font-family:var(--font-display);font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.reflection-section p{color:var(--text-muted);font-size:.88rem}
.reflection-section strong{color:var(--text)}

/* ETHICS */
.ethics-wrap{background:#fff;padding:56px 0}
.ethics-section{max-width:1020px;margin:0 auto;padding:0 24px}
.ethics-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:40px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.ethics-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--phase-1),var(--phase-2),var(--phase-3),var(--phase-4))}
.ethics-card h2{font-family:var(--font-display);font-size:1.5rem;margin-bottom:8px;font-weight:700;letter-spacing:-.02em}
.ethics-card .principle{background:var(--phase-3-bg);border:1px solid var(--phase-3-border);padding:16px 20px;border-radius:var(--radius);margin:20px 0;font-size:.92rem;color:var(--text-muted)}
.ethics-card .principle strong{color:var(--text)}
.ethics-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px}
@media(max-width:700px){.ethics-grid{grid-template-columns:1fr}}
.ethics-do{border-radius:var(--radius);padding:20px;background:var(--phase-4-bg);border:1px solid var(--phase-4-border)}
.ethics-dont{border-radius:var(--radius);padding:20px;background:var(--phase-2-bg);border:1px solid var(--phase-2-border)}
.ethics-do h4{color:var(--phase-4);font-family:var(--font-display);font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.ethics-dont h4{color:var(--phase-2);font-family:var(--font-display);font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
.ethics-do li,.ethics-dont li{font-size:.86rem;color:var(--text-muted);margin-bottom:6px}

/* WARNING */
.warning-wrap{background:#fff;padding-bottom:56px}
.warning-banner{max-width:1020px;margin:0 auto;padding:0 24px}
.warning-inner{background:var(--phase-2-bg);border:1px solid var(--phase-2-border);border-radius:var(--radius);padding:20px 24px}
.warning-inner h3{color:var(--accent-warn);font-family:var(--font-display);font-size:1rem;margin-bottom:8px;font-weight:700;letter-spacing:-.01em}
.warning-inner p,.warning-inner li{color:var(--text-muted);font-size:.88rem}
.warning-inner ul{padding-left:20px;margin:6px 0}

/* FOOTER */
footer{
  text-align:center;padding:40px 24px 32px;
  background:#1e3a8a;color:rgba(255,255,255,.45);
  font-size:.78rem;line-height:2;
}
footer strong{color:rgba(255,255,255,.75);font-weight:600;font-family:var(--font-display);letter-spacing:.02em}
footer a{color:rgba(255,255,255,.5);text-decoration:none;border-bottom:1px solid rgba(255,255,255,.2);transition:all .2s;padding-bottom:1px}
footer a:hover{color:rgba(255,255,255,.85);border-color:rgba(255,255,255,.5)}
footer .sep{margin:0 10px;opacity:.3}

/* ANIMATIONS */
.fade-in{opacity:0;transform:translateY(20px);transition:opacity .6s cubic-bezier(.4,0,.2,1),transform .6s cubic-bezier(.4,0,.2,1)}
.fade-in.visible{opacity:1;transform:translateY(0)}

#loading{display:flex;align-items:center;justify-content:center;min-height:60vh;color:var(--text-muted);font-size:.95rem}
#loading .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--phase-1);border-radius:50%;animation:spin .6s linear infinite;margin-right:12px}
@keyframes spin{to{transform:rotate(360deg)}}
#error-box{max-width:600px;margin:20vh auto;padding:40px;text-align:center}
#error-box code{background:var(--bg-code);color:#e4e4e7;padding:2px 8px;border-radius:4px;font-family:var(--font-mono);font-size:.9rem}
</style>
</head>
<body>

<section class="hero" id="hero">
  <!-- Geometric network pattern -->
  <div class="hero-net" aria-hidden="true">
    <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <!-- Edges / lines -->
      <g stroke="#ffffff" stroke-width="1" fill="none">
        <line x1="144" y1="180" x2="432" y2="315" stroke-opacity=".1"/>
        <line x1="144" y1="180" x2="288" y2="405" stroke-opacity=".09"/>
        <line x1="144" y1="180" x2="72"  y2="495" stroke-opacity=".07"/>
        <line x1="360" y1="540" x2="216" y2="765" stroke-opacity=".1"/>

        <line x1="360" y1="540" x2="504" y2="720" stroke-opacity=".09"/>
        <line x1="576" y1="135" x2="432" y2="315" stroke-opacity=".11"/>
        <line x1="576" y1="135" x2="720" y2="180" stroke-opacity=".1"/>
        <line x1="792" y1="675" x2="648" y2="495" stroke-opacity=".1"/>
        <line x1="792" y1="675" x2="504" y2="720" stroke-opacity=".09"/>
        <line x1="792" y1="675" x2="756" y2="810" stroke-opacity=".08"/>
        <line x1="1008" y1="270" x2="864" y2="405" stroke-opacity=".12"/>
        <line x1="1008" y1="270" x2="1296" y2="225" stroke-opacity=".09"/>
        <line x1="1008" y1="270" x2="720"  y2="180" stroke-opacity=".1"/>
        <line x1="1224" y1="450" x2="1080" y2="720" stroke-opacity=".09"/>
        <line x1="1224" y1="450" x2="1152" y2="585" stroke-opacity=".11"/>
        <line x1="1224" y1="450" x2="1368" y2="360" stroke-opacity=".1"/>
        <line x1="216"  y1="765" x2="72"   y2="495" stroke-opacity=".08"/>
        <line x1="864"  y1="405" x2="648"  y2="495" stroke-opacity=".12"/>
        <line x1="864"  y1="405" x2="720"  y2="180" stroke-opacity=".09"/>
        <line x1="432"  y1="315" x2="288"  y2="405" stroke-opacity=".1"/>
        <line x1="432"  y1="315" x2="648"  y2="495" stroke-opacity=".08"/>

        <line x1="288"  y1="405" x2="72"   y2="495" stroke-opacity=".08"/>
        <line x1="720"  y1="180" x2="936"  y2="135" stroke-opacity=".1"/>
        <line x1="1152" y1="585" x2="1368" y2="360" stroke-opacity=".09"/>
      </g>
      <!-- Nodes -->
      <g fill="#ffffff">
        <!-- small nodes -->
        <circle cx="144"  cy="180"  r="3" fill-opacity=".18"/>
        <circle cx="360"  cy="540"  r="3" fill-opacity=".18"/>
        <circle cx="576"  cy="135"  r="3" fill-opacity=".15"/>

        <circle cx="1224" cy="450"  r="3" fill-opacity=".18"/>
        <circle cx="216"  cy="765"  r="3" fill-opacity=".14"/>
        <circle cx="432"  cy="315"  r="3" fill-opacity=".18"/>
        <circle cx="1080" cy="720"  r="3" fill-opacity=".15"/>
        <circle cx="288"  cy="405"  r="3" fill-opacity=".16"/>
        <circle cx="504"  cy="720"  r="3" fill-opacity=".14"/>
        <circle cx="72"   cy="495"  r="3" fill-opacity=".13"/>
        <circle cx="756"  cy="810"  r="3" fill-opacity=".13"/>
        <circle cx="936"  cy="135"  r="3" fill-opacity=".15"/>
        <circle cx="1368" cy="360"  r="3" fill-opacity=".15"/>
        <!-- medium nodes -->
        <circle cx="720"  cy="180"  r="4.5" fill-opacity=".22"/>
        <circle cx="648"  cy="495"  r="4.5" fill-opacity=".22"/>
        <circle cx="1296" cy="225"  r="4.5" fill-opacity=".2"/>

        <!-- accent nodes -->
        <circle cx="864"  cy="405"  r="6" fill-opacity=".28"/>
        <circle cx="1008" cy="270"  r="6" fill-opacity=".28"/>
        <!-- glow rings on accent nodes -->
        <circle cx="864"  cy="405"  r="11" fill-opacity="0" stroke="#ffffff" stroke-opacity=".07" stroke-width="1"/>
        <circle cx="1008" cy="270"  r="11" fill-opacity="0" stroke="#ffffff" stroke-opacity=".07" stroke-width="1"/>
      </g>
    </svg>
  </div>

  <span class="hero-badge">Taller 2</span>
  <h1>Actividades Avanzadas de <em>Inteligencia Artificial</em></h1>
  <p class="hero-sub">Técnicas Avanzadas de Prompting y Pensamiento Crítico</p>
  <p class="hero-author">Mario Florido</p>
  <div class="hero-phases" id="hero-phases"></div>
</section>

<div id="content">
  <div id="loading"><span class="spinner"></span> Cargando contenido…</div>
</div>

<footer>
  <strong>Mario Florido</strong>
  <span class="sep">·</span>
  <a href="mailto:mario.florido@gmail.com">mario.florido@gmail.com</a>
  <br>
  Taller de IA — Técnicas Avanzadas de Prompting y Pensamiento Crítico
</footer>

<script>
const PHASE_NAMES = {'1':'Fundamentos','2':'Análisis','3':'Investigación','4':'Producción'};
marked.setOptions({ breaks: false, gfm: true });

async function loadContent() {
  try {
    const res = await fetch('contenido.md');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    parseAndRender(await res.text());
  } catch(e) {
    document.getElementById('content').innerHTML = `<div id="error-box">
      <h2 style="font-family:var(--font-display);margin-bottom:12px;color:var(--accent-warn)">No se pudo cargar el contenido</h2>
      <p style="color:var(--text-muted)">Asegúrate de que <code>contenido.md</code> está en la misma carpeta que <code>index.html</code></p>
      <p style="color:var(--text-dim);font-size:.85rem;margin-top:16px">${e.message}</p></div>`;
  }
}

function parseAndRender(md) {
  const lines = md.split('\n');
  const phases = [];
  let phase=null, act=null, sec=null, buf=[];
  let ethicsBuf=null, warnBuf=null, mode='normal';

  function flush() {
    const t=buf.join('\n').trim(); buf=[];
    if(mode==='ethics'){ethicsBuf=(ethicsBuf||'')+'\n'+t;return}
    if(mode==='warning'){warnBuf=(warnBuf||'')+'\n'+t;return}
    if(!sec||!act||!t)return;
    act.sections.push({type:sec.type,title:sec.title,content:t});
  }

  for(const line of lines){
    let m=line.match(/^# FASE (\d+):\s*(.+)/i);
    if(m){flush();mode='normal';phase={num:m[1],title:m[2].trim(),subtitle:'',activities:[]};phases.push(phase);act=null;sec=null;continue}
    if(line.match(/^# ÉTICA/i)){flush();mode='ethics';ethicsBuf='';act=null;sec=null;continue}
    if(line.match(/^# AVISO/i)){flush();mode='warning';warnBuf='';act=null;sec=null;continue}
    if(mode==='ethics'||mode==='warning'){buf.push(line);continue}

    m=line.match(/^## (.+)/);
    if(m&&phase&&!act){phase.subtitle=m[1].trim();continue}
    if(line.trim()==='---')continue;

    m=line.match(/^### (\d+)\.\s*(.+)/);
    if(m){flush();act={num:m[1],title:m[2].trim(),tag:'',image:'',sections:[]};if(phase)phase.activities.push(act);sec=null;continue}

    m=line.match(/^>\s*\*\*Tag:\*\*\s*(.+)/);
    if(m&&act){act.tag=m[1].trim();continue}
    m=line.match(/^>\s*\*\*Imagen:\*\*\s*(.+)/);
    if(m&&act){act.image=m[1].trim();continue}

    m=line.match(/^#### (.+)/);
    if(m&&act){
      flush();const t=m[1].trim();
      if(t==='Objetivo Educacional')sec={type:'objetivo',title:t};
      else if(t==='Descripción')sec={type:'descripcion',title:t};
      else if(t.startsWith('Info:'))sec={type:'info',title:t.slice(5).trim()};
      else if(t==='Info')sec={type:'info',title:''};
      else if(t==='Prompt Principal')sec={type:'prompt',title:t};
      else if(t==='Bonus Extra'||t.startsWith('Terminología'))sec={type:'bonus',title:t};
      else if(t.startsWith('Pregunta de Reflexión'))sec={type:'reflexion',title:t};
      else sec={type:'generic',title:t};
      continue;
    }
    buf.push(line);
  }
  flush();
  render(phases,(ethicsBuf||'').trim(),(warnBuf||'').trim());
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function render(phases,ethicsMd,warningMd){
  let hh='';
  phases.forEach(p=>{
    hh+=`<a href="#phase${p.num}" class="hero-phase"><span class="dot" style="background:var(--phase-${p.num})"></span>${{'1':'Fundamentos','2':'Análisis','3':'Investigación','4':'Producción'}[p.num]||p.title}</a>`;
  });
  document.getElementById('hero-phases').innerHTML=hh;

  let html='';
  phases.forEach((p)=>{
    html+=`<div class="phase-wrap">
      <div class="phase-header" data-phase="${p.num}" id="phase${p.num}">
        <span class="phase-chip"><span class="chip-dot"></span> Fase ${p.num}: ${p.title}</span>
        <h2 class="phase-title">${p.subtitle}</h2>
      </div>
      <div class="container">`;

    p.activities.forEach(a=>{
      const pad=a.num.padStart(2,'0');
      let img='';
      if(a.image)img=`<div class="activity-img"><img src="${a.image}" alt="Actividad ${pad}" onerror="this.parentElement.innerHTML='<span class=img-placeholder>📷 ${esc(a.image)}</span>'"></div>`;

      let obj='',desc='',infos=[],promptTxt='',bonus='',bonusTitle='Bonus Extra',refl='';
      a.sections.forEach(s=>{
        const h=marked.parse(s.content);
        switch(s.type){
          case 'objetivo':obj=h;break;case 'descripcion':desc=h;break;
          case 'info':infos.push({title:s.title,html:h});break;
          case 'prompt':promptTxt=s.content;break;
          case 'bonus':bonus=h;bonusTitle=s.title||'Bonus Extra';break;
          case 'reflexion':refl=h;break;
        }
      });

      let code=promptTxt;
      const cm=promptTxt.match(/```[\s\S]*?\n([\s\S]*?)```/);
      if(cm)code=cm[1].trimEnd();

      const infosH=infos.map(i=>`<div class="info-box">${i.title?`<h4>${i.title}</h4>`:''}${i.html}</div>`).join('');

      html+=`<article class="activity fade-in" data-phase="${p.num}" id="act${a.num}">
        ${img}
        <div class="activity-head">
          <span class="activity-num">${pad}</span>
          <div class="activity-head-text">
            <h2>${a.title}</h2>
            ${a.tag?`<span class="activity-tag">${a.tag}</span>`:''}
          </div>
        </div>
        <div class="activity-body">
          <div class="two-col">
            <div><h3>Objetivo Educacional</h3>${obj}</div>
            <div><h3>Descripción</h3>${desc}</div>
          </div>
          ${infosH}
          ${promptTxt?`<div class="prompt-section">
            <button class="prompt-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
              <span class="arrow">▸</span> Prompt Principal
            </button>
            <div class="prompt-content"><pre>${esc(code)}</pre></div>
          </div>`:''}
          ${bonus?`<div class="bonus-section"><h4>${bonusTitle}</h4>${bonus}</div>`:''}
          ${refl?`<div class="reflection-section"><h4>Pregunta de Reflexión</h4>${refl}</div>`:''}
        </div>
      </article>`;
    });

    html+='</div></div>';
  });

  if(ethicsMd){
    const ep=new DOMParser().parseFromString('<div>'+marked.parse(ethicsMd)+'</div>','text/html').body.firstChild;
    let title='',principle='',doL='',dontL='',curH='';
    for(const n of ep.children){
      if(n.tagName==='H2')title=n.textContent;
      else if(n.tagName==='H3')curH=n.textContent;
      else if(n.tagName==='P'&&curH.includes('Principio')){principle=n.innerHTML;curH=''}
      else if(n.tagName==='UL'){if(curH.includes('USA'))doL=n.outerHTML;else if(curH.includes('NO'))dontL=n.outerHTML}
    }
    html+=`<div class="ethics-wrap"><div class="ethics-section"><div class="ethics-card">
      <h2>${title}</h2><div class="principle">${principle}</div>
      <div class="ethics-grid"><div class="ethics-do"><h4>USA LA IA PARA:</h4>${doL}</div>
      <div class="ethics-dont"><h4>NO LA USES PARA:</h4>${dontL}</div></div>
    </div></div></div>`;
  }

  if(warningMd){
    html+=`<div class="warning-wrap"><div class="warning-banner"><div class="warning-inner">${marked.parse(warningMd).replace(/<h2>/g,'<h3>').replace(/<\/h2>/g,'</h3>')}</div></div></div>`;
  }

  document.getElementById('content').innerHTML=html;

  const obs=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')}),{threshold:.06});
  document.querySelectorAll('.fade-in').forEach(el=>obs.observe(el));
}

loadContent();
</script>
</body>
</html>

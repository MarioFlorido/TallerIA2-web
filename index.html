<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taller IA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

<style>
:root{
  --bg:#f6f8fb;
  --panel:#ffffff;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --accent:#7c3aed;
  --accent-soft:rgba(124,58,237,0.08);
  --border:rgba(15,23,42,0.06);
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.main{
  padding:60px 40px;
  max-width:1300px;
  margin:auto;
}

/* HERO */
.hero{
  display:grid;
  grid-template-columns:1.6fr 1fr;
  gap:20px;
  align-items:center;
  margin-bottom:30px;
  background:var(--accent);
  border-radius:24px;
  padding:56px 50px;
  color:white;
}

.hero-content h1{
  font-size:clamp(2.8rem,5vw,4rem);
  font-weight:900;
  line-height:1.05;
  margin:16px 0 0;
}

.hero-content p{
  margin-top:16px;
  font-size:1.1rem;
  opacity:.9;
}

.hero-badge{
  font-size:.7rem;
  font-weight:700;
  letter-spacing:2px;
  text-transform:uppercase;
  background:rgba(255,255,255,0.2);
  padding:6px 12px;
  border-radius:999px;
}

.phase-title{
  font-size:2.2rem;
  margin-top:90px;
  font-weight:800;
}

.phase-title span{color:var(--accent)}

.phase-subtitle{
  color:var(--muted);
  margin-bottom:30px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:28px;
}

/* NUEVO BLOQUE (no tarjeta típica) */
.card{
  position:relative;
  padding:18px;
  background:linear-gradient(180deg,#ffffff 0%,#fbfbfd 100%);
  border:1px solid var(--border);
  border-radius:16px;
  cursor:pointer;
  transition:.25s;
}

/* Variación automática */
.card:nth-child(3n){
  background:linear-gradient(180deg,#ffffff 0%,#f7f9fc 100%);
}

.card:nth-child(4n){
  border-left:3px solid var(--accent);
  padding-left:14px;
}

.card:nth-child(5n){
  border-radius:24px 12px 24px 12px;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 12px 30px rgba(15,23,42,0.08);
}

/* Imagen más protagonista */
.card img{
  width:100%;
  height:170px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:12px;
}

.card:nth-child(even) img{
  height:210px;
}

/* TAG más limpio */
.tag{
  font-size:.7rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--muted);
  margin-bottom:6px;
}

/* Título */
.card h3{
  font-size:1.2rem;
  font-weight:600;
  margin:0 0 6px;
}

/* Texto */
.card p{
  font-size:.95rem;
  color:var(--muted);
  line-height:1.5;
}

/* COMPLETADO */
.card.done{
  opacity:.6;
}

.card.done::after{
  content:"✓";
  position:absolute;
  top:10px;
  right:12px;
  color:#22c55e;
  font-weight:700;
}

/* PANEL */
.overlay{
  position:fixed;
  inset:0;
  backdrop-filter:blur(8px);
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:100;
}

.overlay.open{display:block}

.panel{
  position:fixed;
  right:0;
  top:0;
  width:50%;
  height:100vh;
  background:white;
  transform:translateX(100%);
  transition:.35s;
  padding:50px;
  overflow-y:auto;
  z-index:101;
  box-shadow:-20px 0 40px rgba(0,0,0,0.08);
}

.panel.open{transform:translateX(0)}

.panel h2{
  font-size:2rem;
  font-weight:800;
}

.panel-section{
  margin-top:30px;
}

.panel-section h4{
  font-size:1rem;
  color:var(--accent);
  margin-bottom:8px;
}

.panel-section pre{
  background:#020617;
  color:#f9fafb;
  padding:16px;
  border-radius:10px;
  font-family:'JetBrains Mono', monospace;
  font-size:.85rem;
}

/* BOTÓN PROMPT */
.prompt-toggle-btn{
  width:100%;
  background:var(--muted);
  color:white;
  border:none;
  padding:10px;
  border-radius:6px;
  cursor:pointer;
  font-weight:600;
}

.prompt-code{
  max-height:0;
  overflow:hidden;
  transition:max-height .4s ease;
}

.prompt-code.open{
  max-height:2000px;
}

/* BOTÓN DONE */
.panel-footer{
  margin-top:40px;
  display:flex;
  justify-content:center;
}

button.done-btn{
  padding:10px 24px;
  border:2px solid #22c55e;
  background:none;
  border-radius:8px;
  color:#22c55e;
  cursor:pointer;
}

button.done-btn.completed{
  background:#22c55e;
  color:white;
}

/* FOOTER */
.footer{
  margin-top:100px;
  text-align:center;
  color:var(--muted);
}

@media(max-width:768px){
  .panel{width:95%}
  .hero{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="main">

<section class="hero">
  <div class="hero-content">
    <span class="hero-badge">Universidad de Alicante · 2025</span>
    <h1>Taller avanzado<br>de IA</h1>
    <p><strong>Aprendizaje activo</strong> con inteligencia artificial</p>
  </div>
</section>

<div id="content"></div>

<footer class="footer">
  <p>Taller avanzado de inteligencia artificial</p>
  <p><a href="mailto:mario.florido@ua.es">mario.florido@ua.es</a></p>
  <p>Universidad de Alicante • 2025</p>
</footer>

</div>

<div id="overlay" class="overlay" onclick="closePanel()"></div>
<div id="panel" class="panel"></div>

<script>
const STORAGE_KEY="progress";

function getSectionOrder(title){
  if(title==='Objetivo Educacional') return 1;
  if(title.startsWith('Info')) return 2;
  if(title==='Prompt Principal') return 3;
  if(title==='Para profundizar') return 4;
  return 99;
}

let lastScroll=0;

function getProgress(){
  return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
}

function saveProgress(id){
  let data=getProgress();
  data[id]=true;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

function removeProgress(id){
  let data=getProgress();
  delete data[id];
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

function isDone(id){
  return !!getProgress()[id];
}

async function load(){
  const res=await fetch('contenido.md');
  const md=await res.text();
  parse(md);
}

function parse(md){
  const lines=md.split('\n');
  let phases=[],phase=null,act=null,sec=null,buf=[];
  let specialSections=[],currentSpecial=null;

  function flush(){
    const t=buf.join('\n').trim();
    buf=[];
    if(!sec||!act||!t) return;
    act.sections.push({title:sec.title,content:t});
  }

  function flushSpecialContent(){
    const t=buf.join('\n').trim();
    buf=[];
    if(!currentSpecial||!t) return;
    currentSpecial.content+='\n'+t;
  }

  for(const line of lines){
    let m=line.match(/^# FASE (\d+): (.+)/);
    if(m){flush();phase={num:m[1],title:m[2],subtitle:'',acts:[]};phases.push(phase);continue}

    if(phase && !phase.acts.length && line.match(/^## /)){
      m=line.match(/^## (.+)/);
      phase.subtitle=m[1];continue}

    m=line.match(/^### (\d+)\. (.+)/);
    if(m){flush();act={id:m[1],title:m[2],tag:'',img:'',sections:[]};if(phase)phase.acts.push(act);continue}

    m=line.match(/\*\*Tag:\*\*\s*(.+)/);
    if(m && act){act.tag=m[1];continue}

    m=line.match(/\*\*Imagen:\*\*\s*(.+)/);
    if(m && act){act.img=m[1];continue}

    m=line.match(/^#### (.+)/);
    if(m){if(act){flush();sec={title:m[1]}}continue}

    if(line.trim()===''){
      if(sec&&act)buf.push('');
      continue;
    }

    if(sec&&act)buf.push(line);
  }

  flush();

  phases.forEach(p=>p.acts.forEach(a=>{
    a.sections.sort((x,y)=>{
      return getSectionOrder(x.title) - getSectionOrder(y.title);
    });
  }));

  render(phases);
}

function togglePrompt(btn){
  btn.classList.toggle('open');
  btn.nextElementSibling.classList.toggle('open');
}

function openPanel(a){
  lastScroll=window.scrollY;
  document.body.style.overflow='hidden';
  document.getElementById("overlay").classList.add("open");

  let sectionsHtml='';
  a.sections.forEach(s=>{
    if(s.title.includes('Prompt')){
      sectionsHtml+=`
      <div class="panel-section">
        <h4>${s.title}</h4>
        <button class="prompt-toggle-btn" onclick="event.stopPropagation();togglePrompt(this)">Ver Prompt</button>
        <div class="prompt-code"><pre>${s.content.replace(/```/g,'')}</pre></div>
      </div>`;
    } else {
      sectionsHtml+=`
      <div class="panel-section">
        <h4>${s.title}</h4>
        ${marked.parse(s.content)}
      </div>`;
    }
  });

  document.getElementById("panel").innerHTML=`
    <h2>${a.title}</h2>
    ${sectionsHtml}
    <div class="panel-footer">
      <button class="done-btn" onclick="toggleDone('${a.id}')">Marcar completada</button>
    </div>
  `;

  document.getElementById("panel").classList.add("open");
}

function closePanel(){
  document.body.style.overflow='auto';
  document.getElementById("panel").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
  window.scrollTo({top:lastScroll});
}

function toggleDone(id){
  if(isDone(id)) removeProgress(id);
  else saveProgress(id);

  location.reload();
}

function render(phases){
  let html='';

  phases.forEach(p=>{
    html+=`<h2 class="phase-title"><span>FASE ${p.num}:</span> ${p.title}</h2>`;
    html+=p.subtitle?`<p class="phase-subtitle">${p.subtitle}</p>`:'';
    html+='<div class="grid">';

    p.acts.forEach(a=>{
      const desc=a.sections.find(s=>s.title.includes('Descripción'));
      const done=isDone(a.id);

      html+=`<div class="card${done?' done':''}" onclick='openPanel(${JSON.stringify(a).replace(/'/g,"&apos;")})'>
        ${a.img?`<img src="${a.img}">`:''}
        <div class="tag">${a.tag||''}</div>
        <h3>${a.title}</h3>
        ${desc?marked.parse(desc.content):''}
      </div>`;
    });

    html+='</div>';
  });

  document.getElementById("content").innerHTML=html;
}

load();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taller IA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

<style>
:root{
  --bg:#0b0f19;
  --panel:#ffffff;
  --card:#111827;
  --text:#f9fafb;
  --muted:#9ca3af;
  --accent:#6366f1;
}

.light{
  --bg:#f4f4f5;
  --panel:#ffffff;
  --card:#ffffff;
  --text:#111;
  --muted:#6b7280;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* MAIN */
.main{
  padding:60px;
  max-width:1400px;
  margin:auto;
}

/* HERO */
.hero h1{
  font-size:clamp(4rem,7vw,6rem);
  font-weight:900;
  letter-spacing:-0.03em;
}

.hero p{
  font-size:1.2rem;
  color:var(--muted);
}

/* PHASE */
.phase-title{
  font-size:2.8rem;
  color:var(--accent);
  margin-top:70px;
}

.phase-subtitle{
  font-size:1.1rem;
  color:var(--muted);
  margin-top:10px;
  margin-bottom:30px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:28px;
  margin-top:20px;
}

/* CARD */
.card{
  background:var(--card);
  padding:22px;
  border-radius:14px;
  cursor:pointer;
  transition:.25s;
  border:2px solid transparent;
}

.card:hover{
  transform:translateY(-3px);
  border-color:var(--accent);
}

.card.active{
  border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(99,102,241,0.2);
}

.card.completed{
  border-color:#22c55e;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:10px;
}

.card h3{
  font-size:1.4rem;
  margin-top:10px;
}

.tag{
  font-size:.85rem;
  font-weight:600;
  color:var(--accent);
  margin-bottom:10px;
}

.card p{
  color:var(--muted);
  line-height:1.6;
}

/* OVERLAY */
.overlay{
  position:fixed;
  inset:0;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,0.4);
  display:none;
}

.overlay.open{display:block}

/* PANEL */
.panel{
  position:fixed;
  right:0;
  top:0;
  width:50%;
  height:100%;
  background:var(--panel);
  color:#111;
  transform:translateX(100%);
  transition:.35s cubic-bezier(.4,0,.2,1);
  padding:50px;
  overflow:auto;
  box-shadow:-30px 0 80px rgba(0,0,0,0.25);
}

.panel.open{transform:translateX(0)}

@media(max-width:768px){
  .panel{width:95%}
}

.close{
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
  font-size:1.5rem;
}

/* PANEL CONTENT */
.panel h2{
  font-size:2.2rem;
}

.panel-section{
  margin-top:36px;
}

.panel-section h4{
  font-size:.85rem;
  color:#6b7280;
  margin-bottom:10px;
  text-transform:uppercase;
  font-weight:700;
}

.panel-section pre{
  background:#111827;
  color:#f9fafb;
  padding:18px;
  border-radius:10px;
  font-family:'JetBrains Mono';
  font-size:.85rem;
  overflow-x:auto;
}

/* BUTTON */
.controls{
  position:fixed;
  top:20px;
  right:20px;
}

button{
  padding:8px 16px;
  background:var(--accent);
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

/* PROGRESS */
.card.completed::after{
  content:'✓';
  position:absolute;
  top:12px;
  right:12px;
  background:#22c55e;
  color:white;
  width:26px;
  height:26px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* SPECIAL SECTION */
.special-section{
  margin-top:70px;
  padding:40px;
  background:var(--card);
  border-radius:14px;
  border-left:4px solid var(--accent);
}

.special-section h2{
  font-size:2.2rem;
  color:var(--accent);
  margin-top:0;
}

.special-section h3{
  font-size:1.4rem;
  margin-top:30px;
  margin-bottom:15px;
}

.special-section ul{
  line-height:1.8;
}

.special-section li{
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="main">

<div class="controls">
  <button onclick="toggleTheme()">🌙/☀️</button>
</div>

<section class="hero">
  <h1>Taller IA</h1>
  <p>Aprendizaje activo con inteligencia artificial</p>
</section>

<div id="content"></div>

</div>

<div id="overlay" class="overlay" onclick="closePanel()"></div>
<div id="panel" class="panel"></div>

<script>
const STORAGE_KEY="progress";
const SECTION_ORDER = [
  'Objetivo Educacional',
  'Descripción',
  'Generar un texto previo',
  'Temas especialmente complejos',
  'Ejemplos para experimentar',
  'Ejemplos de papers',
  'Un trabajo creado',
  'Afirmaciones pseudocientíficas',
  'Ejemplos',
  'Info',
  'Prompt Principal',
  'Pregunta de Reflexión',
  'Bonus Extra',
  'Terminología empleada',
  'Desafío',
  'Pregunta de Reflexión Extra'
];

let lastScroll=0;

function toggleTheme(){
  document.body.classList.toggle("light");
}

function saveProgress(id){
  let data=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
  data[id]=true;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

function isDone(id){
  let data=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
  return data[id];
}

async function load(){
  const res=await fetch('contenido.md');
  const md=await res.text();
  parse(md);
}

function parse(md){
  const lines=md.split('\n');
  let phases=[],phase=null,act=null,sec=null,buf=[];
  let specialSections=[],currentSpecial=null;

  function flush(){
    const t=buf.join('\n').trim();
    buf=[];
    if(!sec||!act||!t)return;
    act.sections.push({type:sec.type,title:sec.title,content:t});
  }

  function flushSpecialContent(){
    const t=buf.join('\n').trim();
    buf=[];
    if(!currentSpecial||!t)return;
    currentSpecial.content+='\n'+t;
  }

  for(const line of lines){
    // DETECTAR FASE NORMAL
    let m=line.match(/^# FASE (\d+): (.+)/);
    if(m){
      flush();
      phase={num:m[1],title:m[2],subtitle:'',acts:[]};
      phases.push(phase);
      continue;
    }

    // DETECTAR SUBTÍTULO DE FASE (línea después de # FASE)
    if(phase && !phase.acts.length && line.match(/^## /)){
      m=line.match(/^## (.+)/);
      phase.subtitle=m[1];
      continue;
    }

    // DETECTAR SECCIÓN ESPECIAL (Guía Ética, etc.)
    m=line.match(/^# (.+)$/);
    if(m && !m[1].includes('FASE')){
      flush();
      currentSpecial={title:m[1],content:''};
      specialSections.push(currentSpecial);
      phase=null; // Salir de modo "fase"
      continue;
    }

    // DETECTAR ACTIVIDAD DENTRO DE FASE
    m=line.match(/^### (\d+)\. (.+)/);
    if(m){
      flush();
      act={id:m[1],title:m[2],tag:'',img:'',sections:[]};
      if(phase)phase.acts.push(act);
      continue;
    }

    // DETECTAR TAG
    m=line.match(/Tag:\*\* (.+)/);
    if(m && act)act.tag=m[1];

    // DETECTAR IMAGEN
    m=line.match(/Imagen:\*\* (.+)/);
    if(m && act)act.img=m[1];

    // DETECTAR SUBSECCIÓN (h4)
    m=line.match(/^#### (.+)/);
    if(m){
      if(act){
        flush();
        sec={title:m[1],type:m[1]};
      } else if(currentSpecial){
        flushSpecialContent();
        currentSpecial.content+='\n### '+m[1]+'\n';
      }
      continue;
    }

    // ACUMULAR CONTENIDO
    if(sec && act){
      buf.push(line);
    } else if(currentSpecial){
      buf.push(line);
    }
  }
  
  flush();
  flushSpecialContent();

  // ORDENAR SUBSECCIONES
  phases.forEach(p=>{
    p.acts.forEach(a=>{
      a.sections.sort((x,y)=>{
        const ix=SECTION_ORDER.indexOf(x.title);
        const iy=SECTION_ORDER.indexOf(y.title);
        return (ix===-1?999:ix)-(iy===-1?999:iy);
      });
    });
  });

  render(phases,specialSections);
}

function openPanel(a,el){
  lastScroll=window.scrollY;

  document.querySelectorAll('.card').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');

  document.getElementById("overlay").classList.add("open");

  // Separar subsecciones: aquí la descripción sí entra en el panel
  const descSection=a.sections.find(s=>s.title.includes('Descripción'));
  const otherSections=a.sections.filter(s=>!s.title.includes('Descripción'));

  document.getElementById("panel").innerHTML=`
    <div class="close" onclick="closePanel()">✕</div>
    <h2>${a.title}</h2>
    
    ${otherSections
      .map(s=>`
      <div class="panel-section">
        <h4>${s.title}</h4>
        ${s.title.includes('Prompt')
          ? `<pre>${s.content.replace(/```/g,'')}</pre>`
          : marked.parse(s.content)}
      </div>`).join('')}

    <button onclick="markDone('${a.id}')">✔ Marcar completado</button>
  `;

  document.getElementById("panel").classList.add("open");
}

function closePanel(){
  document.getElementById("panel").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
  window.scrollTo({top:lastScroll});
}

function markDone(id){
  saveProgress(id);
  document.querySelector(`[data-id="${id}"]`).classList.add("completed");
  closePanel();
}

function render(phases,specialSections){
  let html='';

  // RENDERIZAR FASES CON ACTIVIDADES
  phases.forEach(p=>{
    html+=`
    <h2 class="phase-title">FASE ${p.num}: ${p.title}</h2>
    ${p.subtitle?`<p class="phase-subtitle">${p.subtitle}</p>`:''}
    <div class="grid">
    `;

    p.acts.forEach(a=>{
      const desc=a.sections.find(s=>s.title.includes('Descripción'));

      html+=`
      <div class="card ${isDone(a.id)?'completed':''}" data-id="${a.id}" onclick='openPanel(${JSON.stringify(a).replace(/'/g,"&apos;")},this)'>
        ${a.img?`<img src="${a.img}">`:''}
        <h3>${a.title}</h3>
        <div class="tag">${a.tag||''}</div>
        ${desc?marked.parse(desc.content):''}
      </div>`;
    });

    html+='</div>';
  });

  // RENDERIZAR SECCIONES ESPECIALES (Guía Ética)
  specialSections.forEach(spec=>{
    html+=`
    <div class="special-section">
      <h2>${spec.title}</h2>
      ${marked.parse(spec.content)}
    </div>
    `;
  });

  document.getElementById("content").innerHTML=html;
}

load();
</script>

</body>
</html>

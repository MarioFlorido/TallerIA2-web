<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taller IA</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

<style>
:root{
  --bg:#0b0f19;
  --panel:#ffffff;
  --card:#111827;
  --text:#f9fafb;
  --muted:#9ca3af;
  --accent:#6366f1;
}

.light{
  --bg:#f4f4f5;
  --panel:#ffffff;
  --card:#ffffff;
  --text:#111;
  --muted:#6b7280;
}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.2);
  padding:20px;
  backdrop-filter:blur(10px);
}

.sidebar a{
  display:block;
  margin-bottom:10px;
  color:var(--muted);
  text-decoration:none;
}

/* MAIN */
.main{
  flex:1;
  padding:40px;
}

/* HERO */
.hero h1{
  font-size:4rem;
  font-weight:900;
}

.hero p{color:var(--muted)}

/* PHASE */
.phase-title{
  font-size:2.4rem;
  color:var(--accent);
  margin-top:40px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:24px;
}

/* CARD */
.card{
  background:var(--card);
  padding:20px;
  border-radius:12px;
  cursor:pointer;
  position:relative;
}

.card.completed{
  outline:2px solid #22c55e;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.tag{
  font-size:.7rem;
  color:var(--accent);
  margin-top:5px;
}

.card p{
  color:var(--muted);
  font-size:.9rem;
}

/* PANEL */
.overlay{
  position:fixed;
  inset:0;
  backdrop-filter:blur(8px);
  background:rgba(0,0,0,0.4);
  display:none;
}

.overlay.open{display:block}

.panel{
  position:fixed;
  right:0;
  top:0;
  width:50%;
  height:100%;
  background:var(--panel);
  color:#111;
  transform:translateX(100%);
  transition:.3s;
  padding:40px;
  overflow:auto;
}

.panel.open{transform:translateX(0)}

.close{
  position:absolute;
  top:20px;
  right:20px;
  cursor:pointer;
}

/* BUTTONS */
.controls{
  position:fixed;
  top:20px;
  right:20px;
}

button{
  margin-left:10px;
  padding:6px 10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="sidebar" id="sidebar"></div>

<div class="main">
  <div class="controls">
    <button onclick="toggleTheme()">🌙/☀️</button>
  </div>

  <section class="hero">
    <h1>Taller IA</h1>
    <p>Aprendizaje activo con inteligencia artificial</p>
  </section>

  <div id="content"></div>
</div>

<div id="overlay" class="overlay" onclick="closePanel()"></div>
<div id="panel" class="panel"></div>

<script>
const STORAGE_KEY="progress";

function toggleTheme(){
  document.body.classList.toggle("light");
}

function saveProgress(id){
  let data=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
  data[id]=true;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

function isDone(id){
  let data=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
  return data[id];
}

async function load(){
  const res=await fetch('contenido.md');
  const md=await res.text();
  parse(md);
}

function parse(md){
  const lines=md.split('\n');

  let phases=[],phase=null,act=null,section=null;

  for(let l of lines){

    let m=l.match(/^# FASE (\d+): (.+)/);
    if(m){phase={num:m[1],title:m[2],acts:[]};phases.push(phase);continue}

    m=l.match(/^### (\d+)\. (.+)/);
    if(m){act={id:m[1],title:m[2],img:'',tag:'',sections:[]};phase.acts.push(act);continue}

    m=l.match(/Tag:\*\* (.+)/);
    if(m){act.tag=m[1];continue}

    m=l.match(/Imagen:\*\* (.+)/);
    if(m){act.img=m[1];continue}

    m=l.match(/^#### (.+)/);
    if(m){section={title:m[1],content:''};act.sections.push(section);continue}

    if(section){section.content+=l+'\n'}
  }

  render(phases);
}

function openPanel(a){
  document.getElementById("overlay").classList.add("open");

  document.getElementById("panel").innerHTML=`
    <div class="close" onclick="closePanel()">✕</div>
    <h2>${a.title}</h2>

    ${a.sections
      .filter(s=>!s.title.includes('Descripción'))
      .map(s=>`
      <div style="margin-top:20px">
        <h4>${s.title}</h4>
        ${s.title.includes('Prompt')
          ? `<pre>${s.content.replace(/```/g,'')}</pre>`
          : marked.parse(s.content)}
      </div>`).join('')}

    <button onclick="markDone('${a.id}')">✔ Marcar completado</button>
  `;

  document.getElementById("panel").classList.add("open");
}

function closePanel(){
  document.getElementById("panel").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}

function markDone(id){
  saveProgress(id);
  document.querySelectorAll(`[data-id="${id}"]`).forEach(el=>{
    el.classList.add("completed");
  });
}

function render(phases){

  let html='',sidebar='';

  phases.forEach(p=>{
    sidebar+=`<a href="#p${p.num}">${p.title}</a>`;

    html+=`<div id="p${p.num}">
      <h2 class="phase-title">${p.title}</h2>
      <div class="grid">`;

    p.acts.forEach(a=>{
      let desc=a.sections.find(s=>s.title.includes('Descripción'));

      html+=`
      <div class="card ${isDone(a.id)?'completed':''}" data-id="${a.id}" onclick='openPanel(${JSON.stringify(a).replace(/'/g,"&apos;")})'>

        ${a.img?`<img src="${a.img}">`:''}

        <h3>${a.title}</h3>
        <div class="tag">${a.tag||''}</div>

        ${desc?marked.parse(desc.content):''}

      </div>`;
    });

    html+='</div></div>';
  });

  document.getElementById("content").innerHTML=html;
  document.getElementById("sidebar").innerHTML=sidebar;
}

load();
</script>

</body>
</html>
